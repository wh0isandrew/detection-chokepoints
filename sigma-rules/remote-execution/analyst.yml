title: Impacket-Style Remote Execution — Network Logon, IPC$ Access, Suspicious Service
id: a3b7c9d1-e3f5-4a7b-9c1d-1e2f3a4b5c6d
status: experimental
description: >
  Detects Impacket/NetExec SMB execution: network logon + IPC$ share access + suspicious
  service creation from the same source in a short window.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://www.socinvestigation.com/threat-hunting-with-eventid-5145-object-access-detailed-file-share/
  - https://github.com/fortra/impacket
  - https://media.kasperskycontenthub.com/wp-content/uploads/sites/43/2022/06/23093553/Common-TTPs-of-the-modern-ransomware_low-res.pdf
author: "@iimp0ster"
date: 2025/01/15
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - attack.execution
  - attack.t1569.002
  - detection.maturity.analyst
logsource:
  product: windows
  service: system
detection:
  # Focus on the clearest signal: service installed from temp path after logon
  # The IPC$ correlation must be done at the SIEM/pipeline level
  selection_service_install:
    EventID: 7045
  filter_suspicious_path:
    ImagePath|contains:
      - '\Windows\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
  filter_command_exec:
    ImagePath|contains:
      - '%COMSPEC%'
      - 'cmd.exe /Q /c'
      - 'cmd.exe /C'
    # NOTE: The |re: modifier is not part of the official Sigma specification.
    # This filter requires SIEM-specific implementation (KQL, SPL).
    # See companion queries in analyst notes for production-ready regex matching.
  filter_random_service:
    # Impacket psexec generates random 8-char alphabetic service names (e.g., "TrPFXzGH").
    # Sigma has no native regex modifier. This check requires SIEM-side implementation:
    #   - KQL:  ServiceName matches regex @"^[A-Za-z]{6,12}$"
    #   - SPL:  | where match(ServiceName, "^[A-Za-z]{6,12}$")
    # As a Sigma approximation, we flag short single-word service names that lack
    # typical vendor prefixes. Tune this list to your environment.
    ServiceName|contains:
      - 'YOURPLACEHOLDER'  # Replace with SIEM-native regex; this is a stub to keep the rule parseable
  filter_legit_software:
    # Tune for your environment — add legitimate software that triggers this rule
    ImagePath|contains:
      - '\placeholder_tune_for_your_env.exe'
  condition: selection_service_install and (filter_suspicious_path or filter_command_exec or filter_random_service) and not filter_legit_software
falsepositives:
  - Authorized use of PsExec or Impacket by red teams (check with security team)
  - SCCM/Intune deployments that use temporary service paths (verify source IP)
  - Legitimate remote admin via sc.exe from known admin workstations
level: high
