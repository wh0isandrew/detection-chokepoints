title: Suspicious Service Created After Network Logon — Remote Execution Pattern
id: f2a6b8c0-d2e4-4f6a-8b0c-0d1e2f3a4b5c
status: experimental
description: >
  Detects service installations with random names or binaries in user-writable paths.
  Characteristic of Impacket psexec.py and NetExec SMB execution modules.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://attack.mitre.org/techniques/T1047/
  - https://www.socinvestigation.com/threat-hunting-with-eventid-5145-object-access-detailed-file-share/
  - https://github.com/fortra/impacket
author: "@iimp0ster"
date: 2025/01/15
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - attack.execution
  - attack.t1569.002
  - detection.maturity.hunt
logsource:
  product: windows
  service: system
detection:
  selection_service_install:
    EventID: 7045
  # Service binary located in suspicious paths (user-writable, temp locations)
  filter_suspicious_path:
    ImagePath|contains:
      - '\Windows\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
      - '\AppData\Local\Temp\'
      - '\AppData\Roaming\'
  # OR service binary executes cmd/powershell (common for shell-based execution)
  filter_shell_execution:
    ImagePath|contains:
      - 'cmd.exe'
      - 'powershell.exe'
      - 'pwsh.exe'
  filter_legit_software:
    # Tune for your environment — add legitimate software that triggers this rule
    ImagePath|contains:
      - '\placeholder_tune_for_your_env.exe'
  condition: selection_service_install and (filter_suspicious_path or filter_shell_execution) and not filter_legit_software
falsepositives:
  - Legitimate software installers that temporarily use Windows\Temp (verify binary is signed)
  - Some legitimate monitoring agents that run from non-standard paths
  - Custom IT deployment scripts that create temporary services
level: medium
