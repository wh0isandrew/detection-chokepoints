title: New Service Installation — Remote Execution Baseline
id: e1f5a7b9-c1d3-4e5f-7a8b-9c0d1e2f3a4b
status: experimental
description: >
  Detects new service installations (EID 7045). Baseline rule for mapping service
  creation patterns. Logon correlation requires SIEM-side join with EID 4624.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://attack.mitre.org/techniques/T1021/006/
  - https://www.socinvestigation.com/threat-hunting-with-eventid-5145-object-access-detailed-file-share/
author: "@iimp0ster"
date: 2025/01/15
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - attack.execution
  - detection.maturity.research
logsource:
  product: windows
  service: system
detection:
  selection:
    EventID: 7045
    # Any new service installation — extremely broad
  filter_legit_software:
    # Tune for your environment — add legitimate software that triggers this rule
    ImagePath|contains:
      - '\placeholder_tune_for_your_env.exe'
  condition: selection and not filter_legit_software
falsepositives:
  - Software installation via MSI packages
  - Windows Update installing drivers and services
  - Legitimate remote administration (SCCM, Ansible, PDQ Deploy)
  - IT staff using PsExec or similar tools for authorized administration
  - Antivirus/EDR product updates
level: informational
