title: Web Shell — Web Server Spawning Shell Interpreter
id: e5b7d9f1-4c6e-4a0b-2d3f-6c8d0e2f4162
status: experimental
description: >
  Detects web server processes spawning OS shell interpreters or common reconnaissance
  utilities. File creation detection requires separate Sysmon EID 11 monitoring.
references:
  - https://attack.mitre.org/techniques/T1505/003/
  - https://attack.mitre.org/techniques/T1190/
  - https://media.defense.gov/2020/Jun/09/2002313081/-1/-1/0/CSI-DETECT-AND-PREVENT-WEB-SHELL-MALWARE-20200422.PDF
  - https://www.microsoft.com/en-us/security/blog/2022/12/12/iis-modules-the-evolution-of-web-shells-and-how-to-detect-them/
  - https://arxiv.org/abs/2601.22182
  - https://cloud.google.com/blog/topics/threat-intelligence/pst-want-shell-proxyshell-exploiting-microsoft-exchange-servers
author: "@iimp0ster"
date: 2026/03/08
tags:
  - attack.persistence
  - attack.t1505.003
  - attack.initial_access
  - attack.t1190
  - attack.execution
  - attack.t1059.003
  - attack.t1059.001
  - detection.maturity.hunt
logsource:
  category: process_creation
  product: windows
detection:
  # Pattern A: Web server process spawning known shell interpreters or recon utilities
  selection_spawn_web_parent:
    ParentImage|endswith:
      - '\w3wp.exe'
      - '\httpd.exe'
      - '\apache.exe'
      - '\apache2.exe'
      - '\nginx.exe'
      - '\php-cgi.exe'
      - '\php.exe'
      - '\php-fpm.exe'
      - '\tomcat.exe'
      - '\tomcat9.exe'
      - '\tomcat10.exe'
      - '\java.exe'
      - '\javaw.exe'
  selection_spawn_child_shells:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\certutil.exe'
      - '\bitsadmin.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\msiexec.exe'
      - '\wmic.exe'
      - '\whoami.exe'
      - '\net.exe'
      - '\net1.exe'
      - '\ipconfig.exe'
      - '\systeminfo.exe'
      - '\netstat.exe'
      - '\curl.exe'
      - '\wget.exe'
  filter_legit_software:
    # Tune for your environment — add legitimate software that triggers this rule
    Image|endswith:
      - '\placeholder_tune_for_your_env.exe'
  condition: (selection_spawn_web_parent and selection_spawn_child_shells) and not filter_legit_software
falsepositives:
  - Legitimate CMS-triggered shell scripts via webhooks (Drupal, WordPress deployment)
  - Development environments where web server invokes build scripts
  - wkhtmltopdf or ImageMagick shell wrappers called by web applications
  - Java application servers invoking legitimate scripts via Runtime.exec()
  - Authorized administrative scripts triggered via web-based management interfaces
level: medium
