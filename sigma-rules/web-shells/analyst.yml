title: Web Shell — High-Confidence Execution via Web Server Spawning Shell with Suspicious Command
id: f6c8e0a2-5d7f-4b1c-3e4a-7d9e1f302573
status: experimental
description: >
  Detects web server processes spawning shell interpreters with reconnaissance,
  exfiltration, or encoded command indicators in the command line.
references:
  - https://attack.mitre.org/techniques/T1505/003/
  - https://attack.mitre.org/techniques/T1190/
  - https://attack.mitre.org/techniques/T1059/001/
  - https://media.defense.gov/2020/Jun/09/2002313081/-1/-1/0/CSI-DETECT-AND-PREVENT-WEB-SHELL-MALWARE-20200422.PDF
  - https://www.microsoft.com/en-us/security/blog/2022/12/12/iis-modules-the-evolution-of-web-shells-and-how-to-detect-them/
  - https://arxiv.org/abs/2601.22182
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-158a
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-060b
author: "@iimp0ster"
date: 2026/03/08
tags:
  - attack.persistence
  - attack.t1505.003
  - attack.initial_access
  - attack.t1190
  - attack.execution
  - attack.t1059.001
  - attack.t1059.003
  - detection.maturity.analyst
logsource:
  category: process_creation
  product: windows
detection:
  # Shared filter: parent must be a web server process
  selection_web_server_parent:
    ParentImage|endswith:
      - '\w3wp.exe'
      - '\httpd.exe'
      - '\apache.exe'
      - '\apache2.exe'
      - '\nginx.exe'
      - '\php-cgi.exe'
      - '\php.exe'
      - '\php-fpm.exe'
      - '\tomcat.exe'
      - '\tomcat9.exe'
      - '\tomcat10.exe'
      - '\java.exe'
      - '\javaw.exe'

  # Selection A: cmd.exe spawned by web server with recon/exfil/download command
  selection_cmd_recon:
    Image|endswith: '\cmd.exe'
    CommandLine|contains:
      - 'whoami'
      - 'net user'
      - 'net group'
      - 'net localgroup'
      - 'ipconfig'
      - 'systeminfo'
      - 'netstat'
      - 'tasklist'
      - 'quser'
      - 'qwinsta'
      - 'dir '
      - 'type '
      - 'copy '
      - 'move '
      - 'certutil'
      - 'bitsadmin'
      - 'mshta'
      - 'curl'
      - 'wget'
      - 'nltest'
      - 'arp '
      - 'ping '
      - 'nslookup'
      - 'reg query'
      - 'reg add'
      - 'schtasks'
      - 'at '
      - 'net use'
      - 'wmic'

  # Selection B: PowerShell with encoded command or downloader/execution pattern
  selection_powershell_encoded:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-enc'
      - '-EncodedCommand'
      - '-e '
      - 'IEX'
      - 'Invoke-Expression'
      - 'DownloadString'
      - 'DownloadFile'
      - 'WebClient'
      - 'Net.WebClient'
      - 'FromBase64String'
      - 'ToBase64String'
      - 'BitsTransfer'
      - 'Start-BitsTransfer'
      - 'Invoke-WebRequest'
      - '-nop'
      - '-noprofile'
      - 'bypass'
      - 'hidden'
      - 'Add-MpPreference'
      - 'Set-MpPreference'
      - 'whoami'
      - 'net user'
      - 'net group'

  filter_legit_software:
    # Tune for your environment — add legitimate software that triggers this rule
    Image|endswith:
      - '\placeholder_tune_for_your_env.exe'
  condition: selection_web_server_parent and (selection_cmd_recon or selection_powershell_encoded) and not filter_legit_software
falsepositives:
  - Legitimate web applications that invoke system utilities as part of documented functionality (file conversion, health checks)
  - Authorized administrative web interfaces that invoke PowerShell for server management
  - Development environments where web applications execute scripts for testing
level: high
