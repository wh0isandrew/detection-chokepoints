title: EDR Bypass — Security Process Termination or Service Impairment via Admin Tool
id: b2e4d6f8-1a3c-5e7f-9b0d-3f5a7c9e1b2d
status: experimental
description: >
  Detects sc.exe, net.exe, or taskkill.exe explicitly targeting security agent processes
  or services for stop, delete, or forced kill operations.
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1562/004/
  - https://www.secureworks.com/blog/ransomhub-uses-edrkilshifter-to-disable-security-tools
  - https://www.sophos.com/en-us/press-office/press-releases/2023/05/sophos-uncovers-new-ransomware-driver-abusing-tool-terminator
  - https://github.com/Yaxser/CobaltStrike-BOF
author: "@iimp0ster"
date: 2026/03/08
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.t1562.004
  - detection.maturity.hunt
logsource:
  category: process_creation
  product: windows
detection:
  # Selection A: sc.exe or net.exe stopping/deleting a named security service
  selection_sc_stop:
    Image|endswith:
      - '\sc.exe'
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - 'stop'
      - 'delete'
    CommandLine|contains:
      - 'SophosFileScanner'
      - 'SAVService'
      - 'SavService'
      - 'Sophos'
      - 'MsMpSvc'
      - 'WinDefend'
      - 'SecurityHealthService'
      - 'SenseIr'
      - 'MDCoreSvc'
      - 'CSFalconService'
      - 'CSAgent'
      - 'SentinelAgent'
      - 'SentinelOne'
      - 'CylanceSvc'
      - 'CylanceUI'
      - 'cb'
      - 'CarbonBlack'
      - 'bdagent'
      - 'bdredline'
      - 'EPProtectedService'
      - 'EPSecurityService'
      - 'ekrn'
      - 'ESET'
      - 'kavfs'
      - 'klim6'
      - 'Kaspersky'
      - 'McShield'
      - 'masvc'
      - 'McAfeeFramework'
      - 'TmListen'
      - 'ntrtscan'
      - 'TrendMicro'
      - 'TRAPS'
      - 'cyverak'
      - 'cyvrmtgn'
      - 'Palo Alto'
      - 'cyserver'
  # Selection B: taskkill /IM targeting named security agent executables
  selection_taskkill:
    Image|endswith: '\taskkill.exe'
    CommandLine|contains:
      - '/IM'
      - '/F'
    CommandLine|contains:
      - 'MsMpEng.exe'
      - 'msmpeng.exe'
      - 'SophosFileScanner.exe'
      - 'SAVService.exe'
      - 'SentinelAgent.exe'
      - 'SentinelOne.exe'
      - 'CSFalconService.exe'
      - 'CSAgent.exe'
      - 'CylanceSvc.exe'
      - 'cb.exe'
      - 'cbsensor.exe'
      - 'bdagent.exe'
      - 'bdredline.exe'
      - 'TRAPS.exe'
      - 'cyserver.exe'
      - 'ekrn.exe'
      - 'egui.exe'
      - 'kavfs.exe'
  filter_legit_software:
    # Tune for your environment — add legitimate software that triggers this rule
    Image|endswith:
      - '\placeholder_tune_for_your_env.exe'
  condition: (selection_sc_stop or selection_taskkill) and not filter_legit_software
falsepositives:
  - Authorized EDR/AV product upgrades performed by IT operations via orchestration tools
  - Legitimate product uninstallation by software management platforms (SCCM, Intune)
  - Security operations testing and validation workflows
  - Vendor-led troubleshooting sessions with authorized remote access
level: medium
