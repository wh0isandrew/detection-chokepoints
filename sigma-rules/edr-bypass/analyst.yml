title: EDR Bypass — Named Security Process Terminated by sc.exe or taskkill (High Confidence)
id: c3f5a7b9-2d4e-4f8a-0c1e-4a6b8c0d2e4f
status: experimental
description: >
  Detects sc.exe/taskkill.exe/netsh.exe targeting named security agent processes or
  services for termination, deletion, or WFP filter installation (EDRSilencer).
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1562/004/
  - https://www.secureworks.com/blog/ransomhub-uses-edrkilshifter-to-disable-security-tools
  - https://www.sophos.com/en-us/press-office/press-releases/2023/05/sophos-uncovers-new-ransomware-driver-abusing-tool-terminator
  - https://www.huntress.com/blog/edrkillshifter-analysis
  - https://www.microsoft.com/en-us/security/blog/2024/07/29/ransomhub-ransomware/
  - https://github.com/SOCFortress/EDRSilencer
author: "@iimp0ster"
date: 2026/03/08
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.t1562.004
  - detection.maturity.analyst
logsource:
  category: process_creation
  product: windows
detection:
  # Selection A: sc.exe explicitly stopping or deleting a named high-value security service
  selection_sc_named_service:
    Image|endswith:
      - '\sc.exe'
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - 'stop'
      - 'delete'
    CommandLine|contains:
      - 'SophosFileScanner'
      - 'SAVService'
      - 'WinDefend'
      - 'CSFalconService'
      - 'CSAgent'
      - 'SentinelAgent'
      - 'CylanceSvc'
      - 'cbsensor'
      - 'bdagent'
      - 'EPSecurityService'
      - 'EPProtectedService'
      - 'kavfs'
      - 'McShield'
      - 'ntrtscan'
      - 'TRAPS'
      - 'cyserver'
      - 'MDCoreSvc'
      - 'SenseIr'
  # Selection B: taskkill force-killing a named security process image
  selection_taskkill_named:
    Image|endswith: '\taskkill.exe'
    CommandLine|contains|all:
      - '/F'
    CommandLine|contains:
      - 'MsMpEng.exe'
      - 'SophosFileScanner.exe'
      - 'SentinelAgent.exe'
      - 'CSFalconService.exe'
      - 'CylanceSvc.exe'
      - 'cb.exe'
      - 'cbsensor.exe'
      - 'bdagent.exe'
      - 'ekrn.exe'
      - 'kavfs.exe'
      - 'ntrtscan.exe'
      - 'TRAPS.exe'
    # NOTE: This selection catches netsh-based WFP filter manipulation only.
    # The compiled EDRSilencer binary calls WFP APIs (FwpmFilterAdd0) directly
    # without invoking netsh.exe. For compiled-variant detection, monitor for
    # fwpuclnt.dll loads by non-system processes or EDR heartbeat loss.
  # Selection C: EDRSilencer — WFP filter add via netsh to block EDR network communication
  selection_wfp_filter:
    Image|endswith: '\netsh.exe'
    CommandLine|contains|all:
      - 'wfp'
      - 'filter'
      - 'add'
  filter_legit_software:
    # Tune for your environment — add legitimate software that triggers this rule
    Image|endswith:
      - '\placeholder_tune_for_your_env.exe'
  condition: (selection_sc_named_service or selection_taskkill_named or selection_wfp_filter) and not filter_legit_software
falsepositives:
  - Authorized product removal during a major EDR platform migration (should be via orchestration, not ad-hoc CLI)
  - Sophos/CrowdStrike/SentinelOne vendor-led support session with explicit authorization
  - Automated upgrade scripts from approved security management platforms
level: high
