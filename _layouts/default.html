<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}" />
  <title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/theme-arcade.css' | relative_url }}" />
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Restore saved theme before first paint to prevent flash -->
  <script>
    (function () {
      var saved = localStorage.getItem('dc-theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body class="min-h-screen flex flex-col">

  {% include nav.html %}

  <main id="main-content">
    {{ content }}
  </main>

  <footer class="site-footer py-8 px-6">
    <div class="footer-inner max-w-[1280px] mx-auto flex flex-wrap items-center justify-between gap-4 text-sm">
      <span>
        <a href="{{ '/' | relative_url }}">Detection Chokepoints</a>
        - community detection engineering resource
      </span>
      <span class="footer-links flex flex-wrap gap-5">
        <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}" target="_blank" rel="noopener">
          GitHub
        </a>
        <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">Contribute</a>
        <a href="https://attack.mitre.org/" target="_blank" rel="noopener">MITRE ATT&amp;CK</a>
      </span>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('dc-theme', next);
      });
    })();
  </script>

  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
</body>
</html>
