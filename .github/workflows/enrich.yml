name: Enrich Infrastructure Data

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (1 hour after update-masq-infra)
  workflow_dispatch:        # Allow manual trigger for testing

permissions:
  contents: write           # Required to push data branch
  pull-requests: write      # Required to open the review PR

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests mmh3 python-dateutil

      # Restore cached DNS lookups, VT responses, and Triage submission state
      # across weekly runs so we don't re-query what we already know.
      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: enrich-cache-${{ github.run_id }}
          restore-keys: |
            enrich-cache-

      - name: Ingest ClickGrab nightly reports
        run: python scripts/ingest_clickgrab.py

      - name: Enrich infrastructure (IPinfo Lite + VirusTotal)
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          VT_API_KEY:   ${{ secrets.VT_API_KEY }}
        run: python scripts/enrich_infra.py

      # Sandbox step is opt-in: set the ENABLE_SANDBOX Actions variable to 'true'
      # in repo Settings → Variables to activate. All Triage submissions are
      # permanently public — only enable for already-confirmed-public IOCs.
      - name: Submit payloads to Triage sandbox
        if: vars.ENABLE_SANDBOX == 'true'
        env:
          TRIAGE_TOKEN: ${{ secrets.TRIAGE_TOKEN }}
        run: python scripts/sandbox_submit.py

      - name: Cluster campaigns
        run: python scripts/cluster_campaigns.py

      - name: Build merged data file
        run: python scripts/build_data.py

      - name: Open PR with updated data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/masq_infra.json

          if git diff --staged --quiet; then
            echo "No changes to masq_infra.json — skipping PR"
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="data/enrich-clickgrab-${DATE}"

          git checkout -b "$BRANCH"
          git commit -m "chore: enrichment pipeline update [${DATE}]"
          git push --force -u origin "$BRANCH"

          PR_BODY=$(printf 'Weekly ClickGrab enrichment pipeline update.\n\nAdds ASN/geo distribution, country choropleth data, domain age histogram, campaign clusters, and Triage payload families to `_data/masq_infra.json`.\n\nReview the stat changes below, then merge to publish to the live site.')
          if ! gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q "OPEN"; then
            gh pr create \
              --title "chore: enrichment pipeline update [${DATE}]" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          else
            echo "PR for $BRANCH already open — data updated on existing branch"
          fi
