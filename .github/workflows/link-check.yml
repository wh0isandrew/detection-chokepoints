name: Link Check (Built Site)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Aggregate chokepoint data
        run: python scripts/aggregate.py

      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "/detection-chokepoints"
        env:
          JEKYLL_ENV: production

      - name: Install HTMLProofer
        run: gem install html-proofer -v '~> 5.2'

      - name: Check internal links in _site
        run: |
          htmlproofer ./_site \
            --disable-external \
            --checks Links,Images,Scripts \
            --assume-extension .html \
            --ignore-files "/assets\/lures\//" \
            --swap-urls "^/detection-chokepoints:"
