name: Update ClickGrab Trends

# Weekly refresh of the CI-maintainable ClickFix trends feeds in
# _data/clickgrab_trends.yml: MHaggis ClickGrab nightly crawls (VOLUME — sites
# crawled) + Carson Williams' domain gist (landscape count). Maintains a single
# rolling review PR on a fixed branch — never pushes to main, never piles up.
# Append-only and idempotent (docs/DECISIONS.md #010/#011), so re-runs are safe;
# the 14-day lookback backfills any gap between weekly runs.
#
# NOT run in CI — manual/local refresh only, because these rebuild from the full
# local dataset that a fresh CI checkout cannot hold:
#   - scripts/build_domain_monthly.py  behavioural command classification; needs
#       the manually exported Carson ClickFix Hunter XLSX (DECISIONS #012/#013).
#   - scripts/build_lure_keywords.py    lure-page OSINT keywords; rebuilds from the
#       full cache/clickgrab/days/ history, of which CI fetches only a 14-day
#       window — running it here would shrink the committed full-history file.

on:
  workflow_dispatch:          # manual / on-demand
  schedule:
    - cron: '0 6 * * 1'       # Mondays 06:00 UTC — 14-day lookback backfills the week (MHaggis nightly publishes ~01:50 UTC)

permissions:
  contents: write             # push the data branch
  pull-requests: write        # open the review PR

concurrency:
  group: update-clickgrab     # don't overlap runs racing on the same data branch
  cancel-in-progress: false

jobs:
  update-clickgrab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests PyYAML

      # 14-day window: covers normal daily cadence plus any review-PR backlog
      # (the generator dedups by watermark, so overlap never double-counts).
      - name: Ingest ClickGrab nightly reports (raw blobs)
        env:
          CLICKGRAB_LOOKBACK_DAYS: '14'
        run: python scripts/ingest_clickgrab.py

      - name: Ingest Carson ClickFix domain gist
        run: python scripts/ingest_carson_domains.py

      - name: Append new days to trends data
        run: python scripts/analyze_clickgrab.py

      # Single rolling PR: a fixed branch is rebuilt from main and force-pushed
      # each run, so at most one ClickGrab PR is ever open. It never piles up and
      # never mutually conflicts the way per-day dated branches did.
      - name: Publish updated trends data (rolling PR)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only the aggregate YAML is tracked; cache/ (raw payloads) is gitignored.
          git add _data/clickgrab_trends.yml
          if git diff --staged --quiet; then
            echo "No new ClickGrab days — nothing to update."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="data/clickgrab-auto"      # fixed rolling branch — one PR, no pileup
          TITLE="chore: update clickgrab trends data [${DATE}]"

          # Reset the branch to current HEAD (main + staged delta) and force-push,
          # so the open PR always shows a clean append-only diff vs main.
          git checkout -B "$BRANCH"
          git commit -m "$TITLE"
          git push --force -u origin "$BRANCH"

          PR_BODY=$(printf 'Automated ClickGrab trends update.\n\nAppends new ClickFix delivery-chain days from MHaggis ClickGrab (raw blobs) and refreshes the Carson ClickFix domain-landscape count. Append-only: historical sections (payload_examples, domain_monthly, staging_domains) are unchanged; review the daily/monthly/totals/meta delta below, then merge to publish.')
          if gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q "OPEN"; then
            gh pr edit "$BRANCH" --title "$TITLE" --body "$PR_BODY"
            echo "Refreshed existing rolling PR for $BRANCH."
          else
            gh pr create \
              --title "$TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          fi
