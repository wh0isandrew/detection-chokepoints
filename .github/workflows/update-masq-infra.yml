name: Update Masq-Infra Data

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:        # Allow manual trigger for on-demand runs

permissions:
  contents: write           # Required to push data branch
  pull-requests: write      # Required to open the review PR

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests mmh3 shodan python-dateutil

      # Restore cached DNS lookups, VT responses, and HA submission state
      # across weekly runs so we don't re-query what we already know.
      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: enrich-cache-${{ github.run_id }}
          restore-keys: |
            enrich-cache-

      - name: Run infra data pipeline
        env:
          URLSCAN_API_KEY:  ${{ secrets.URLSCAN_API_KEY }}
          SHODAN_API_KEY:   ${{ secrets.SHODAN_API_KEY }}
          MB_API_KEY:       ${{ secrets.MB_API_KEY }}
          VT_API_KEY:       ${{ secrets.VT_API_KEY }}
          VALIDIN_API_KEY:  ${{ secrets.VALIDIN_API_KEY }}
          URLHAUS_API_KEY:  ${{ secrets.URLHAUS_API_KEY }}
        run: python scripts/update_masq_infra.py

      - name: Ingest ClickGrab nightly reports
        env:
          # GITHUB_TOKEN for authenticated GitHub API + LFS Batch API access.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ingest_clickgrab.py

      - name: Enrich infrastructure (IPinfo Lite + VirusTotal)
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          VT_API_KEY:   ${{ secrets.VT_API_KEY }}
        run: python scripts/enrich_infra.py

      - name: Query Hybrid Analysis for existing payload reports
        env:
          HA_API_KEY: ${{ secrets.HA_API_KEY }}
        run: python scripts/ha_lookup.py

      # Sandbox step is opt-in: set the ENABLE_SANDBOX Actions variable to 'true'
      # in repo Settings → Variables to activate. All Hybrid Analysis submissions
      # are permanently public — only enable for already-confirmed-public IOCs.
      - name: Submit payloads to Hybrid Analysis sandbox
        if: vars.ENABLE_SANDBOX == 'true'
        env:
          HA_API_KEY: ${{ secrets.HA_API_KEY }}
        run: python scripts/sandbox_submit.py

      - name: Cluster campaigns
        run: python scripts/cluster_campaigns.py

      - name: Build merged data file
        run: python scripts/build_data.py

      - name: Open PR with updated data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/masq_infra.json

          if git diff --staged --quiet; then
            echo "No changes to masq_infra.json — skipping PR"
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="data/masq-infra-${DATE}"

          git checkout -b "$BRANCH"
          git commit -m "chore: update masq-infra data [${DATE}]"
          git push --force -u origin "$BRANCH"

          PR_BODY=$(printf 'Weekly masq-infra pipeline update.\n\nRuns the full stack: URLScan/Shodan/VT infra fetch → ClickGrab ingestion → IPinfo+VT enrichment → Hybrid Analysis IOC lookup → campaign clustering → data merge.\n\nReview the stat changes below, then merge to publish to the live site.')
          if ! gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q "OPEN"; then
            gh pr create \
              --title "chore: update masq-infra data [${DATE}]" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          else
            echo "PR for $BRANCH already open — data updated on existing branch"
          fi
