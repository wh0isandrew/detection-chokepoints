name: Update Masq-Infra Data

on:
  workflow_dispatch:        # Allow manual trigger for on-demand runs

permissions:
  contents: write           # Required to push data branch
  pull-requests: write      # Required to open the review PR

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests httpx python-dotenv mmh3 shodan python-dateutil tldextract anthropic pandas

      # Restore cached DNS lookups, VT responses, and enrichment state
      # across runs so we don't re-query what we already know.
      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: enrich-cache-${{ github.run_id }}
          restore-keys: |
            enrich-cache-

      - name: Collect IOC feeds
        env:
          MB_API_KEY:        ${{ secrets.MB_API_KEY }}
          URLSCAN_API_KEY:   ${{ secrets.URLSCAN_API_KEY }}
          URLHAUS_API_KEY:   ${{ secrets.URLHAUS_API_KEY }}
          THREATFOX_API_KEY: ${{ secrets.THREATFOX_API_KEY }}
        run: python scripts/collect_ioc_feeds.py

      - name: Collect infrastructure hunts
        env:
          SHODAN_API_KEY:  ${{ secrets.SHODAN_API_KEY }}
          VALIDIN_API_KEY: ${{ secrets.VALIDIN_API_KEY }}
          URLSCAN_API_KEY: ${{ secrets.URLSCAN_API_KEY }}
          MB_API_KEY:      ${{ secrets.MB_API_KEY }}
        run: python scripts/collect_infra_hunts.py

      - name: Fetch payload delivery chains
        env:
          URLSCAN_API_KEY: ${{ secrets.URLSCAN_API_KEY }}
          VT_API_KEY:      ${{ secrets.VT_API_KEY }}
        run: python scripts/fetch_payload_chains.py

      - name: Triage records with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VT_API_KEY:        ${{ secrets.VT_API_KEY }}
          MB_API_KEY:        ${{ secrets.MB_API_KEY }}
        run: python scripts/claude_triage.py

      - name: Cluster campaigns
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/cluster_campaigns.py

      - name: Build merged data file
        run: python scripts/build_data.py

      - name: Append weekly history snapshot
        run: python scripts/append_history.py

      - name: Open PR with updated data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/masq_infra.json _data/masq_infra_history.json

          if git diff --staged --quiet; then
            echo "No changes to masq_infra.json — skipping PR"
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="data/masq-infra-${DATE}"

          git checkout -b "$BRANCH"
          git commit -m "chore: update masq-infra data [${DATE}]"
          git push --force -u origin "$BRANCH"

          PR_BODY=$(printf 'Masq-infra pipeline update.\n\nRuns the full stack: IOC feed collection → infrastructure hunts → payload chain fetching → Claude triage → campaign clustering → data merge.\n\nReview the stat changes below, then merge to publish to the live site.')
          if ! gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q "OPEN"; then
            gh pr create \
              --title "chore: update masq-infra data [${DATE}]" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          else
            echo "PR for $BRANCH already open — data updated on existing branch"
          fi
