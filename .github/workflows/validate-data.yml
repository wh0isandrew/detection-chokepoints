name: Validate Data

# Schema/format gate for contributed data. Runs on PRs that touch chokepoint
# entries, their referenced detection rules, or the generated trends data files,
# and fails the check on any violation: chokepoint schema errors (missing
# required fields, bad enums, malformed UUID/date/MITRE ids, a Sigma path that
# does not exist) or a trends _data file missing a section/meta key its page
# template depends on.
on:
  pull_request:
    paths:
      - "chokepoints/**"
      - "sigma-rules/**"
      - "iok-rules/**"
      - "_data/**"
      - "scripts/validate_schema.py"
      - "schema/chokepoint-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate chokepoint + trends data
        run: python scripts/validate_schema.py
