version: 2
# Updates are GROUPED (one PR per ecosystem bundling all bumps) and run MONTHLY,
# so a scan produces at most ~4 PRs/month instead of one PR per dependency.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      ruby:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      pip:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
