    note: Returns 404 at time of scan. Cloudflare AS13335. Dormant infrastructure — registered on the product name, not yet
      serving content or already rotated.
  infrastructure:
  - value: All four observed codex-cli squatting domains registered within the April–May 2026 window matching the Codex CLI
      public launch. Three are Cloudflare-fronted (codexhub.click, codexcli.gr.com, codexcli.homes); one uses commodity hosting
      (codex-cli.org, GTHost AS63023). The Cloudflare-fronted cluster suggests a single operator with access to a standard
      Cloudflare account deploying multiple domain squats.
    note: 'Pivot recommended: query URLScan for additional domains registered post-April 2026 matching codex* + cli* patterns.
      Hunt.io cert pivot on codexhub.click TLS cert may surface sibling domains not yet scanned.'
  behaviors:
  - value: The Codex CLI is distributed via npm (npm install -g @openai/codex) and GitHub releases — not a downloadable installer
      page. This shifts the adversary delivery model away from favicon-pivot-detectable download pages toward SEO-poisoning
      and typosquat domain registration targeting developer search intent. No favicon hash pivot is currently available due
      to Cloudflare bot protection on openai.com blocking direct favicon fetch.
    note: 'Evolution marker: watch for ClickFix paste-to-run pages appearing on these domains — the Claude Code hunt found
      the same pattern (mshta / curl-to-shell) on Cloudflare Pages sites with similar domain age profiles.'
