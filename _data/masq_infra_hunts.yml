    note: null
  - value: ChatGPT_Installer.exe is a 2.3 MB Inno Setup PE32 wrapper. Static strings include 'pdq' fragments in the compressed
      payload section, suggesting a PDQ-branded component may be bundled inside. Authenticode signer is MROScanner OU (Estonian
      shell company) via SSL.com — not a known software vendor. Behavioral analysis (process tree, network connections, dropped
      files, registry persistence) has not been completed.
    note: Sandbox analysis pending. Submit SHA-256 17dc646d645252196a19e87752fa21dbe7b626cd71a9dacddebd9a2ed8f1e16e to tria.ge
      or any.run with a Windows 10 profile and a US residential IP for behavioral confirmation. Update source_url to sandbox
