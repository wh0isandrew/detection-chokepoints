detection_gaps:
- threat_name: ChatGPT-Impersonation-MROScanner-Installer
  slug: 2026-05-16-chatgpt-windows-mroscanner
  coverage_note: tracking.js content and tracking.php POST response were observed during initial collection via direct adversary-infrastructure
    access, which violates pipeline rules. Those facts are re-sourced here to the URLScan result page that surfaces the same
    DOM/script data. Authenticode cert details (ttps[3], behaviors[3]) and payload SHA-256 (iocs[4]) were obtained from static
    analysis of the downloaded EXE — no VT or tria.ge report exists yet. These entries need re-sourcing to a sandbox report
    URL once analysis completes.
- threat_name: Claude-Code-Impersonation-ClickFix-Install-Modal
  slug: 2026-05-17-claude-code-clickfix-install-modal
  coverage_note: install-modal-commands.js and tracking.js content were observed during initial collection via direct adversary-infrastructure
    access (Cloudflare Pages domains), which violates pipeline rules. Those facts are re-sourced here to the URLScan result
    pages that captured the same script content. No sandbox report found for Windows HTA or Mac shell payloads at time of
    collection.
- threat_name: LM-Studio-Domain-Squatting-API-Endpoint-Impersonation
  slug: 2026-05-17-lmstudio-domain-squatting
  coverage_note: Favicon hash pivot (94ce33...) returned only 11 hits — all AI tool directories, no delivery infrastructure.
    Confirmed threat found via title + domain-pattern pivots. Validin pDNS lookup on lmstudio.co.com returned ECONNREFUSED
    (service unavailable at time of hunt — no historical IP resolution data obtained). No installer file delivery found anywhere
    in the hunt. Threat model here is API endpoint impersonation, not binary delivery.
- threat_name: Notion-Masquerade-Delivery-Survey
  slug: 2026-05-17-notion-masquerade-coverage
  coverage_note: 'Favicon hash pivot for Notion (/front-static/favicon.ico, SHA-256 541fc85f...) returned 5,692 non-Notion
    hits — structurally too noisy because Notion is used as a backend CMS by thousands of legitimate third-party sites (Super.so,
    Potion.so, direct embeds), which copy the favicon verbatim. File-type narrowing (filename:*.exe, *.msi) requires a URLScan
    API account and was unavailable for anonymous queries. Title pivot ''Download Notion'' returned 36 hits, most from 2024-2025;
    no active Windows/Mac delivery campaign detected in the last 90 days. One Android APK squatter (notiondownload.com) found
    and documented. Two suspicious non-Notion favicon-match domains inspected (activate.rizznote.co.uk = legitimate brand;
    verif.dalireddit.pro = Russian verification service using Notion iframe — not delivery). VirusTotal domain lookup blocked
    (React SPA, not accessible via unauthenticated WebFetch). Recommended next steps: (1) Obtain URLScan API key to enable
    filename:*.exe/msi filter on the favicon pivot. (2) Use Validin pDNS to check notiondownload.com for co-hosted delivery
    infrastructure. (3) Monitor URLScan tag ''notion'' for new delivery-tagged submissions.'
- threat_name: OpenAI-Codex-CLI-Domain-Squatting-Credential-Harvest
  slug: 2026-05-17-openai-codex-cli-domain-squatting
  coverage_note: 'Favicon hash pivot unavailable: openai.com/favicon.ico and openai.com/codex are both behind Cloudflare bot
    protection, returning JS challenge pages to automated requests. The known openai.com favicon hash from a prior hunt (9747c13c...)
    could not be re-verified as current. Hunt pivoted to title-based and domain-pattern queries. No confirmed malware file
    delivery found — all observed infrastructure is credential-harvesting or domain-squatting pattern. Sandbox analysis not
    applicable (no binaries). VirusTotal domain lookups attempted but blocked (React SPA, unauthenticated WebFetch cannot
    render).'
