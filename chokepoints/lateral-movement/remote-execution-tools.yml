Name: Remote Execution Tools (HackTools)
Id: d4e6f8a0-2b3c-5d7e-9f1a-4c6b8d0e2f4a
MitreIds:
- T1021.002
- T1021.003
- T1021.006
- T1047
- T1053.005
- T1569.002
Tactics:
- Lateral Movement
- Execution
Techniques:
- 'Remote Services: SMB/Windows Admin Shares'
- 'Remote Services: Distributed Component Object Model'
- 'Remote Services: Windows Remote Management'
- Windows Management Instrumentation
- 'Scheduled Task/Job: Scheduled Task'
- 'System Services: Service Execution'
DetectionPriority: HIGH
ThreatPrevalence: HIGH
DetectionDifficulty: MEDIUM
Description: 'Offensive security tools (Impacket, NetExec, CrackMapExec, Evil-WinRM) used for remote code execution across
  Windows environments. These frameworks wrap legitimate Windows protocols (SMB, WMI, WinRM, RPC) to execute code on remote
  systems using valid admin credentials. Despite tool diversity, the chokepoint is invariant: valid admin credentials, network
  access to target ports, and a remote execution primitive (service creation, WMI process, scheduled task) are always required.

  '
LastUpdated: '2026-03-07'
Author: '@iimp0ster'
Variations:
