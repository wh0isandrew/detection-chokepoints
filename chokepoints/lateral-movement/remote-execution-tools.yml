Prerequisites:
- Network access to target on at least one required protocol port (SMB 445, WMI/RPC 135, WinRM 5985/5986)
- Remote execution surface enabled on target (Server service for SMB, WinRM service, WMI, or Task Scheduler)
Chokepoints:
- Stage: Network Authentication
  Input: Attacker has valid admin credentials (password, hash, or ticket)
  Invariant: Valid admin credentials (local or domain) must be obtained before any remote execution attempt
  Observable: 'Windows Security EID 4624 (Logon Type 3, Network) with admin account. EID 4672 (Special Privilege
    Logon). Source IP is typically not a known admin workstation.'
  WhyCantBypass: All remote execution tools require authenticated access. No valid credentials means authentication failure
    at every attempted protocol regardless of which tool is used
  LogSources:
  - Windows Security Event ID 4624 (Network Logon)
  - Windows Security Event ID 4672 (Special Privilege Logon)
  - Windows Security Event ID 4648 (Logon with Explicit Credentials)
  - Windows Security Event ID 4769 (Kerberos Service Ticket Request)
  DetectionTier: Research
  SigmaRef: ''
- Stage: Remote Process/Service Creation
  Input: Authenticated admin session established on target
  Invariant: 'Tool invokes a Windows execution primitive on the remote host: service creation (SMB), WMI process spawn, scheduled
    task creation, or WinRM command'
  Observable: 'Sysmon EID 1 showing services.exe or wmiprvse.exe spawning cmd.exe/powershell.exe. Windows Security
    EID 7045 (Service Installed) for psexec-style tools. EID 4688 with cross-logon session correlation.'
  WhyCantBypass: A command must run on the target via one of these four primitives. No other execution surface exists over
    these authenticated protocols. Tools must first establish an authenticated session over a protocol port (445, 135, 5985/5986).
    No reachable port means no remote execution regardless of credential validity
  LogSources:
  - Windows Security Event ID 4697 / System 7045 (Service Installed)
  - Windows Security Event ID 5145 (IPC$/svcctl share access)
  - Sysmon Event ID 1 (wmiprvse.exe or services.exe spawning cmd.exe/powershell.exe)
  DetectionTier: Analyst
  SigmaRef: sigma-rules/remote-execution/analyst.yml
  BypassNote: LOTL tools (winrs.exe, wmic /node:, Enter-PSSession, Invoke-Command) produce identical telemetry to Impacket
    but with signed Microsoft binaries. Detection must be purely behavioral with no reliance on tool signatures
- Stage: Lateral Spread
  Input: Remote command interpreter is running on one or more targets
  Invariant: The same credential and execution primitive sequence repeats across multiple hosts in a short window or follows
    a deliberate pivot path
  Observable: 'Windows Security EID 4624 showing the same account authenticating to multiple hosts within minutes.
    Sysmon EID 3 showing same source IP connecting to multiple RFC1918 destinations on SMB/WinRM ports.'
  WhyCantBypass: Lateral movement by definition requires replication of the credential-plus-primitive pattern on each subsequent
    host. The telemetry is identical on every hop
  LogSources:
  - Windows Security Event ID 4624 (multiple target hosts, short window)
  - Sysmon Event ID 3 (same source IP, multiple RFC1918 destinations)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/remote-execution/hunt.yml
EvolutionTimeline:
- Date: 2016-Q1
  Event: CrackMapExec released as multi-protocol framework
  Change: Multi-protocol framework combining SMB, WMI, and WinRM in one tool; detection must cover all protocols.
  DetectionImpact: Detection must cover multiple protocols, not just SMB
  Variants: []
  EventType: event
- Date: 2019-Q2
  Event: Evil-WinRM released as dedicated WinRM exploitation tool
  Change: Dedicated WinRM exploitation tool released; WinRM authentication spike detection becomes important.
  DetectionImpact: WinRM authentication spike detection becomes important
  Variants: []
  EventType: event
- Date: 2023-Q3
  Event: NetExec forked from CrackMapExec
  Change: Active CrackMapExec fork adds LDAP and SSH support; no fundamental change to underlying Windows API behavior.
  DetectionImpact: No fundamental change to underlying Windows API behaviors
  Variants: []
  EventType: event
- Date: 2023-Q4
  Event: CrackMapExec officially archived
  Change: CME archived December 6, 2023; behavioral detection remains valid but CME-specific hash/signature rules stop receiving
    updates.
  DetectionImpact: Behavioral detection remains valid; tool-specific hash/signature-based detection for CME becomes stale
  Variants: []
  EventType: event
- Date: 2025-01
  Event: Impacket adds rdp_shadow.py (PR#2064)
  Change: Native RDP session hijacking (rdp_shadow.py) added to Impacket suite via PR#2064.
  DetectionImpact: Existing RDP session manipulation detection (Event ID 4624 LogonType 10) applies
  Variants: []
  EventType: event
Detections:
- Level: Research
  Description: Identify network logon events followed by service creation or remote process execution
  LogSources:
  - Windows Security Event ID 4624 (Successful Logon)
  - Windows Security Event ID 4688 (Process Creation)
  - Windows System Event ID 7045 (Service Installed)
  Logic: 'Network logon (4624 LogonType 3) by a local Administrators or Domain Admins member, followed within 60 seconds by a service creation (7045) or process creation with an elevated token.'
  ExpectedFPRate: High
  UseCase: Baseline normal admin activity; understand legitimate remote administration patterns
  SigmaRule: sigma-rules/remote-execution/research.yml
- Level: Hunt
  Description: Network logon with suspicious service creation (random name or unusual path) or WMI parent process
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Windows Security Event ID 4624 (Logon)
  - Windows Security Event ID 4697 (Service Installed)
  - Windows System Event ID 7045 (Service Installed)
  Logic: 'Network logon (4624 LogonType 3) AND one of: service created with a random 8-10 char alphanumeric name or binary path in \Windows\Temp\, \Users\Public\, or \ProgramData\; OR process created with parent wmiprvse.exe or services.exe spawning cmd.exe or powershell.exe from unusual paths.'
  ExpectedFPRate: Medium
  UseCase: Active hunt for lateral movement campaigns; identifies PsExec-style and WMI execution
  SigmaRule: sigma-rules/remote-execution/hunt.yml
- Level: Analyst
  Description: Network logon + IPC$ access + suspicious service or multiple hosts in spray pattern
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 3 (Network Connection)
  - Windows Security Event ID 4624 (Logon)
  - Windows Security Event ID 4697/7045 (Service)
  - Windows Security Event ID 5145 (Detailed File Share)
  Logic: 'Network logon (4624 LogonType 3) AND IPC$ share access (5145 ShareName=IPC$) AND service creation with a random 8-10 char name or binary in \Windows\Temp\ or \Users\Public\ or command cmd.exe/powershell.exe. Also fires on spray pattern: same source IP hitting 3+ hosts within 10 minutes, RFC1918 to RFC1918.'
  ExpectedFPRate: Low
  UseCase: SOC alerting for active lateral movement; direct IR escalation trigger
  SigmaRule: sigma-rules/remote-execution/analyst.yml
