OsintSources:
  - Platform: Shodan
    Query: 'port:5985 product:"Microsoft HTTPAPI"'
    URL: "https://www.shodan.io/search?query=port%3A5985+product%3A%22Microsoft+HTTPAPI%22"
    Notes: "Finds internet-exposed WinRM endpoints; narrow with 'org:' or 'net:' filters to audit your own attack surface — run a second query on port 5986 for the HTTPS variant."
  - Platform: Shodan
    Query: 'ssl.jarm:07d14d16d21d21d00042d41d00041de5fb3038104f457d92ba37e62256d5 port:443'
    URL: "https://www.shodan.io/search?query=ssl.jarm%3A07d14d16d21d21d00042d41d00041de5fb3038104f457d92ba37e62256d5"
    Notes: "Clusters of hosts sharing this default Cobalt Strike JARM fingerprint are likely team servers; more resilient to infrastructure rotation than IP/domain blocklists."
  - Platform: GitHub Code Search
    Query: '"wmiexec" OR "smbexec" OR "atexec" path:*.py'
    URL: "https://github.com/search?q=%22wmiexec%22+OR+%22smbexec%22+OR+%22atexec%22+path%3A*.py&type=code"
    Notes: "Finds community tools built on Impacket execution primitives; use for defender awareness of new modules extending the execution surface."
KnownBypasses:
  - Bypass: Using legitimate service names that blend in with existing services
    Mitigation: Maintain a baseline of approved services; alert on any new service creation.
  - Bypass: NTLM relay attacks instead of direct credential use
    Mitigation: Enable SMB signing and LDAP signing; disable NTLM where operationally feasible.
  - Bypass: Using legitimate admin tools (psexec.exe from Sysinternals)
    Mitigation: Enforce software allowlisting and monitor hash for known-good vs. impersonated versions.
  - Bypass: Living Off the Land — built-in Windows admin tools (winrs.exe, wmic /node:, Enter-PSSession)
    Mitigation: Restrict WinRM and WMI access via Windows Firewall; require PAW for remote administration.
  - Bypass: Kerberos-based lateral movement (Overpass-the-Hash, Pass-the-Ticket, Silver/Golden Tickets)
    Mitigation: Enable AES encryption for Kerberos; protect the krbtgt account; monitor for anomalous TGS requests.

YaraRules:
