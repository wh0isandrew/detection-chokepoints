Detections:
- Level: Research
  Description: Detect non-default scripting interpreter binaries appearing on systems where they are not expected
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 11 (File Create)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: 'Any process creation or file create for known scripting interpreter binaries (python.exe, python3.exe, pythonw.exe, php.exe, php-cgi.exe, node.exe, ruby.exe, perl.exe, lua.exe, wish.exe, tclsh.exe, Rscript.exe, dart.exe, deno.exe, bun.exe, AutoHotkey.exe, AutoHotkey64.exe) from user-writable paths like C:\Temp, C:\Users\*\Downloads, C:\Users\*\AppData, or C:\Windows\Temp. Exclude Program Files, development tool directories, and package manager caches. Run to baseline the allowlist.'
  ExpectedFPRate: High
  UseCase: >
    Baseline which interpreters exist in the environment. Identify systems where
    unexpected interpreters appear. Feed into allowlist for Hunt-level filtering.
  SigmaRule: sigma-rules/byosi/research.yml

- Level: Hunt
  Description: Non-default interpreter executing from suspicious path with script argument or network activity
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 3 (Network Connection)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: 'Interpreter process from outside an approved development directory AND one of: CommandLine references a script file (.py, .pyc, .php, .js, .rb, .pl, .lua, .tcl, .r, .ahk, .dart, .ts), OR CommandLine uses inline execution flags (-e, -c, --eval, -exec, -r), OR within 60 seconds the process opens an outbound connection to a non-RFC1918 destination. Exclude CI/CD runners and developer workstations by hostname or OU.'
  ExpectedFPRate: Medium
  UseCase: >
    Active threat hunting for BYOSI deployment. Correlates interpreter execution with
    script loading or network callback, the two behaviors that distinguish malicious
    from benign interpreter presence.
  SigmaRule: sigma-rules/byosi/hunt.yml

- Level: Analyst
  Description: Non-default interpreter spawned by suspicious parent, executing scripts from temp paths with outbound C2
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 3 (Network Connection)
  - Sysmon Event ID 11 (File Create)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: 'Within a 120-second window: interpreter binary dropped to C:\Temp, %APPDATA%, %LOCALAPPDATA%, Downloads, or Windows\Temp, THEN executed with parent powershell/cmd/wscript/mshta/explorer and CommandLine referencing a temp-dir script or inline execution flags, THEN outbound to a non-RFC1918, non-Microsoft IP. Exclude developer machines, CI/CD build agents, and package manager update processes.'
  ExpectedFPRate: Low
  UseCase: >
    SOC alerting; direct escalation trigger for active BYOSI deployment. The three-stage
    correlation (interpreter drop → execution → C2 callback) is highly specific to
    malicious BYOSI activity. Treat as active intrusion indicator.
  SigmaRule: sigma-rules/byosi/analyst.yml

