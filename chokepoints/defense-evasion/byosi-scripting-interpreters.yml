Name: BYOSI Scripting Interpreters
Id: ed830139-29ec-4235-8d30-87bee83e6933
MitreIds:
- T1059.006
- T1059.007
- T1059
- T1027.010
- T1218
Tactics:
- Defense Evasion
- Execution
Techniques:
- 'Command and Scripting Interpreter: Python'
- 'Command and Scripting Interpreter: JavaScript'
- Command and Scripting Interpreter
- 'Obfuscated Files or Information: Command Obfuscation'
- System Binary Proxy Execution
DetectionPriority: HIGH
ThreatPrevalence: EMERGING
DetectionDifficulty: HIGH
Description: >
  Adversaries bring legitimate, vendor-signed scripting interpreters (Python, PHP, Node.js,
  Ruby, Perl, AutoHotKey, etc.) onto a target system and execute malicious scripts through
  them, bypassing EDR solutions that focus on binary analysis and API hooking. Because
  every interpreter binary is validly signed by its vendor, EDRs whitelist or deprioritize
  the process. The malicious logic lives in plain-text script files that most EDR engines
  do not scan. The chokepoint is invariant: regardless of which interpreter is chosen,
  the attacker must (1) write or download a non-default interpreter binary to disk,
  (2) execute that interpreter as a new process, and (3) have the interpreter load and
  run attacker-controlled script content that performs the actual malicious action (C2
  callback, credential theft, lateral movement). Each of these three stages produces
  telemetry that survives tool rotation across all 13+ supported interpreter languages.
LastUpdated: '2026-03-29'
Author: '@iimp0ster'

Chokepoints:
- Stage: Interpreter Delivery
  Invariant: A scripting interpreter binary not normally present on the system must be written to disk or extracted from an archive.
  WhyCantBypass: The interpreter is a compiled binary required to parse and execute scripts — it cannot be replaced by a native OS component without losing language compatibility.
  LogSources:
  - Sysmon Event ID 11 (File Create)
  - Sysmon Event ID 1 (Process Creation — archive extraction)
  - Windows Security Event ID 4688 (Process Creation)
  DetectionTier: Research
  SigmaRef: sigma-rules/byosi/research.yml
- Stage: Interpreter Execution
  Invariant: The non-default interpreter binary must be launched as a new process to run attacker scripts.
  WhyCantBypass: Script files require their matching interpreter process to execute — there is no way to run Python/PHP/Node scripts without spawning the interpreter.
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Windows Security Event ID 4688 (Process Creation)
  - Sysmon Event ID 7 (Image Loaded — interpreter DLLs)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/byosi/hunt.yml
- Stage: Malicious Script Action
  Invariant: The interpreter must load attacker-controlled script content and perform an observable action (network connection, file write, process spawn, credential access).
  WhyCantBypass: The script must interact with the OS to achieve its objective — C2 callbacks require network, data theft requires file/process access, persistence requires registry/filesystem writes.
  LogSources:
  - Sysmon Event ID 3 (Network Connection)
  - Sysmon Event ID 1 (Child Process Creation)
  - Sysmon Event ID 11 (File Create)
  - Sysmon Event ID 12/13 (Registry Create/Set Value)
  DetectionTier: Analyst
  SigmaRef: sigma-rules/byosi/analyst.yml
  BypassNote: >
    If the interpreter uses built-in socket libraries for C2 without spawning child
    processes, detection relies on network telemetry from the interpreter process itself.

Variations:
- Name: BYOSI PHP Shell (oldkingcone)
  FirstSeen: 2024-Q2
  Status: Active
  SourceURL: https://github.com/oldkingcone/BYOSI
  Notes: >
    Original BYOSI proof-of-concept. Downloads PHP for Windows, extracts to C:\Temp\php,
    fetches a PHP implant script, and executes it. Four lines of PowerShell evade
    CrowdStrike, Trellix, and SentinelOne in tested environments. SentinelOne confirmed
    unable to scan PHP file types.
  VariantId: byosi-php-shell
- Name: PolyDrop (Multi-Language BYOSI)
  FirstSeen: 2024-Q3
  Status: Active
  SourceURL: https://github.com/MalwareSupportGroup/PolyDrop
  Notes: >
    Expanded BYOSI toolkit supporting 13 scripting languages (Python, Ruby, Perl, Lua,
    PHP, Node.js, Tcl, R, Dart, Deno, Bun, Nim, Crystal). Rapid payload deployment
    across Windows, macOS, and Linux. Vulners AI risk score 7.2 High.
  VariantId: polydrop-multi-language
- Name: IronNetInjector (Turla APT — IronPython BYOI)
  FirstSeen: 2021-Q1
  Status: Active
  SourceURL: https://unit42.paloaltonetworks.com/ironnetinjector/
  Notes: >
    Turla APT uses IronPython interpreter embedded via .NET to load malicious Python
    scripts that inject Turla tools into memory. Documented by Palo Alto Unit 42.
    Demonstrates nation-state adoption of BYOI tradecraft for in-memory execution
    without touching PowerShell.
  VariantId: ironnetinjector-turla-ironpython
- Name: Node.js Malware Delivery (ClickFix → NodeLoader)
  FirstSeen: 2025-Q1
  Status: Active
  SourceURL: https://www.microsoft.com/en-us/security/blog/2025/04/15/threat-actors-misuse-node-js-to-deliver-malware-and-other-malicious-payloads/
  Notes: >
    Microsoft documented threat actors downloading node.exe via PowerShell (often
    delivered through ClickFix social engineering) and executing inline JavaScript for
    C2 and data exfiltration. NodeLoader variant uses sudo-prompt module for privilege
    escalation, delivering cryptominers and infostealers.
  VariantId: nodejs-malware-delivery-clickfix
- Name: Lu0Bot (Node.js C2)
  FirstSeen: 2023-Q2
  Status: Active
  SourceURL: https://any.run/cybersecurity-blog/lu0bot-analysis/
  Notes: >
    Node.js-based malware where the interpreter accepts encrypted JavaScript as input.
    Uses WMIC for system reconnaissance. Demonstrates portable Node.js runtime bundled
    with encrypted payload scripts for full C2 capability.
  VariantId: lu0bot-nodejs-c2
- Name: Python Bytecode Evasion (PYC Execution)
  FirstSeen: 2023-Q4
  Status: Emerging
  SourceURL: https://www.csoonline.com/article/575475/attackers-use-python-compiled-bytecode-to-evade-detection.html
  Notes: >
    Attackers hide malicious logic in compiled Python bytecode (.pyc) files that are
    directly executable by the Python interpreter but invisible to security scanners
    that only inspect .py source files. ReversingLabs called it potentially the first
    supply chain attack exploiting PYC execution.
  VariantId: python-bytecode-pyc-evasion
- Name: BYOI .NET Embedded Interpreters (Boolang, IronPython)
  FirstSeen: 2020-Q1
  Status: Active
  SourceURL: https://www.blackhillsinfosec.com/red-teamers-cookbook-byoi-bring-your-own-interpreter/
  Notes: >
    Red team tradecraft embedding Boolang, IronPython, or other .NET-compatible
    interpreters inside C# assemblies. Executes third-party scripting languages entirely
    in memory via .NET runtime without touching PowerShell or cmd.exe. Popularized by
    Marcello Salvati (Black Hills InfoSec) at DerbyCon 2019.
  VariantId: byoi-dotnet-embedded-interpreters
- Name: AutoHotKey Script Abuse
  FirstSeen: 2024-Q1
  Status: Emerging
  Notes: >
    Threat actors bundle AutoHotKey interpreter with malicious .ahk scripts to deploy
    keyloggers, credential stealers, and RATs. The AHK interpreter is signed and
    trusted, allowing script execution to bypass application whitelisting.
  VariantId: autohotkey-script-abuse

Prerequisites:
- Ability to write files to disk on the target system (interpreter binary + script payload)
- The scripting interpreter must be a legitimately signed binary compatible with the target OS
- Attacker-controlled script content must be accessible to the interpreter (local file, inline argument, or remote fetch)
- No application whitelisting policy blocking execution of the specific interpreter binary from non-standard paths

EvolutionTimeline:
- Date: 2019-Q3
  Event: BYOI concept formalized at DerbyCon by Marcello Salvati
  Change: >
    Demonstrated embedding Boolang and IronPython interpreters inside .NET assemblies
    for in-memory script execution. Established BYOI as a red team tradecraft category
    distinct from Living Off the Land.
  DetectionImpact: >
    Existing PowerShell and cmd.exe detections completely bypassed. No detection
    coverage for third-party interpreter execution via .NET embedding.
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event
- Date: 2021-Q1
  Event: Turla APT deploys IronNetInjector using IronPython BYOI
  Change: >
    First documented nation-state adoption of BYOI. Turla uses IronPython to load
    malware tools into memory, avoiding PowerShell logging and AMSI entirely.
  DetectionImpact: >
    AMSI and ScriptBlock logging ineffective. Detection requires monitoring .NET
    assembly loads and IronPython-specific DLLs (IronPython.dll, Microsoft.Scripting.dll).
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event
- Date: 2023-Q2
  Event: Lu0Bot demonstrates Node.js as a full C2 platform
  Change: >
    Node.js bundled with encrypted JavaScript payloads for persistent C2. Demonstrates
    that any Turing-complete interpreter can replace traditional compiled implants.
  DetectionImpact: >
    node.exe process creation from non-development systems becomes a detection signal.
    Network connections from node.exe to unknown external IPs gain significance.
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event
- Date: 2024-Q2
  Event: BYOSI proof-of-concept evades CrowdStrike, Trellix, and SentinelOne
  Change: >
    Four lines of PowerShell download PHP interpreter and execute a PHP implant,
    establishing external C2 without triggering any EDR. SentinelOne confirmed unable
    to scan PHP file types. Proves EDR blind spot is systemic, not vendor-specific.
  DetectionImpact: >
    Major EDR blind spot publicly disclosed. Process creation monitoring for non-default
    interpreters becomes essential. Script file content scanning gap identified.
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event
- Date: 2024-Q3
  Event: PolyDrop expands BYOSI to 13 scripting languages
  Change: >
    Multi-language toolkit automates interpreter download and payload deployment across
    Python, Ruby, Perl, Lua, PHP, Node.js, Tcl, R, Dart, Deno, Bun, Nim, and Crystal.
    Cross-platform support (Windows, macOS, Linux).
  DetectionImpact: >
    Single-interpreter detection rules insufficient. Detection must cover all common
    interpreter binaries from non-standard paths. Language-agnostic behavioral detection
    (interpreter → network connection) becomes the durable approach.
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event
- Date: 2025-Q1
  Event: Microsoft documents Node.js abuse in ClickFix delivery chains
  Change: >
    Threat actors chain ClickFix social engineering with Node.js download and inline
    JavaScript execution. NodeLoader uses sudo-prompt for privilege escalation.
    Demonstrates convergence of social engineering and BYOSI tradecraft.
  DetectionImpact: >
    ClickFix detection rules should include node.exe as a downstream interpreter.
    Inline JavaScript execution (node -e) becomes a high-fidelity detection signal.
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event

Detections:
- Level: Research
  Description: Detect non-default scripting interpreter binaries appearing on systems where they are not expected
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 11 (File Create)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: >
    Monitor process creation events for known scripting interpreter binaries
    (python.exe, python3.exe, pythonw.exe, php.exe, php-cgi.exe, node.exe, ruby.exe,
    perl.exe, lua.exe, wish.exe, tclsh.exe, Rscript.exe, dart.exe, deno.exe, bun.exe,
    AutoHotkey.exe, AutoHotkey64.exe) executing from non-standard paths. Standard
    paths to exclude: Program Files, known development tool directories, package
    manager caches. Flag any interpreter execution from C:\Temp, C:\Users\*\Downloads,
    C:\Users\*\AppData, C:\Windows\Temp, or any user-writable directory.
    Also monitor file creation events for interpreter binaries written to these paths.
  ExpectedFPRate: High
  UseCase: >
    Baseline which interpreters exist in the environment. Identify systems where
    unexpected interpreters appear. Feed into allowlist for Hunt-level filtering.
  SigmaRule: sigma-rules/byosi/research.yml

- Level: Hunt
  Description: Non-default interpreter executing from suspicious path with script argument or network activity
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 3 (Network Connection)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: >
    Process creation where Image matches known interpreter list AND ImagePath is NOT
    in an approved development directory AND one of: (A) CommandLine contains a script
    file path (.py, .pyc, .php, .js, .rb, .pl, .lua, .tcl, .r, .ahk, .dart, .ts),
    OR (B) CommandLine contains inline execution flags (-e, -c, --eval, -exec, -r),
    OR (C) within 60 seconds the interpreter process creates an outbound network
    connection (Sysmon EID 3) to a non-RFC1918 destination. Exclude known CI/CD
    runners and developer workstations by hostname or OU.
  ExpectedFPRate: Medium
  UseCase: >
    Active threat hunting for BYOSI deployment. Correlates interpreter execution with
    script loading or network callback — the two behaviors that distinguish malicious
    from benign interpreter presence.
  SigmaRule: sigma-rules/byosi/hunt.yml

- Level: Analyst
  Description: Non-default interpreter spawned by suspicious parent, executing scripts from temp paths with outbound C2
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 3 (Network Connection)
  - Sysmon Event ID 11 (File Create)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: >
    Correlation chain within 120-second window: (1) File creation of interpreter
    binary in user-writable directory (C:\Temp, %APPDATA%, %LOCALAPPDATA%,
    Downloads, Windows\Temp), THEN (2) Process creation of that interpreter binary
    with parent process being PowerShell, cmd.exe, wscript.exe, mshta.exe, or
    explorer.exe, AND CommandLine references a script file in a temp directory or uses
    inline execution flags, THEN (3) The interpreter process initiates an outbound
    network connection to a non-RFC1918, non-Microsoft IP address. Exclude developer
    machines, CI/CD build agents, and known package manager update processes.
  ExpectedFPRate: Low
  UseCase: >
    SOC alerting; direct escalation trigger for active BYOSI deployment. The three-stage
    correlation (interpreter drop → execution → C2 callback) is highly specific to
    malicious BYOSI activity. Treat as active intrusion indicator.
  SigmaRule: sigma-rules/byosi/analyst.yml

