  DetectionImpact: >
    node.exe process creation from non-development systems becomes a detection signal.
    Network connections from node.exe to unknown external IPs gain significance.
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event
- Date: 2024-Q2
  Event: BYOSI proof-of-concept evades CrowdStrike, Trellix, and SentinelOne
  Change: >
    Four lines of PowerShell download PHP interpreter and execute a PHP implant,
    establishing external C2 without triggering any EDR. SentinelOne confirmed unable
    to scan PHP file types. Proves EDR blind spot is systemic, not vendor-specific.
  DetectionImpact: >
    Major EDR blind spot publicly disclosed. Process creation monitoring for non-default
    interpreters becomes essential. Script file content scanning gap identified.
  TheConstant: Non-default interpreter binary must execute attacker-controlled script content
  Variants: []
  EventType: event
- Date: 2024-Q3
  Event: PolyDrop expands BYOSI to 13 scripting languages
  Change: >
    Multi-language toolkit automates interpreter download and payload deployment across
