OsintSources:
- Platform: VirusTotal Intelligence
  Query: 'behavior_processes:"php.exe" OR behavior_processes:"node.exe" OR behavior_processes:"python.exe" tag:drops-exe'
  Notes: >
    Finds malware samples that drop or execute scripting interpreters. Pivot to behavior
    tab to extract interpreter delivery path and script payload filename.
- Platform: GitHub Code Search
  Query: '"Invoke-WebRequest" "php" "extract" "C:\\Temp" OR "C:\\Users"'
  Notes: >
    Finds PowerShell-based BYOSI delivery scripts that download and extract PHP (or
    other interpreters) to user-writable directories. Monitor for new delivery variants.
- Platform: URLScan
  Query: 'filename:php.exe OR filename:node.exe OR filename:python.exe page.url:*.zip'
  Notes: >
    Finds websites hosting interpreter binaries packaged in ZIP archives — a common
    BYOSI delivery mechanism. Cross-reference with known malware distribution domains.

