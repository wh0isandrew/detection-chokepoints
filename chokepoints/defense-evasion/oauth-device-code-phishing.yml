KnownBypasses:
- Bypass: Using a different OAuth app ID (not MAB)
  Mitigation: Audit all app IDs used in device-code flows; alert on any
    non-allow-listed app ID initiating device code
  Detection: >
    Research-tier rule catches all device-code flows. Review any non-Azure CLI
    / non-VS Code app ID initiating device codes. The FOCI token chain restricts
    which app IDs are useful for broad M365 access.

- Bypass: Blocking CA policy not deployed (device code flows allowed)
  Mitigation: Deploy CA policy "Block device code flow" as a preventive control
  Detection: >
    authenticationProtocol: deviceCode detection remains the primary signal.
    Prevention via CA policy (error 53003) is the most effective mitigation.

