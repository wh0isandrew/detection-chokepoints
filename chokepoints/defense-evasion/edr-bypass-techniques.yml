OsintSources:
- Platform: VirusTotal Intelligence
  Query: tag:byovd positives:0
  URL: https://www.virustotal.com/gui/search/tag%3Abyovd%20positives%3A0
  Notes: Requires VT Intelligence subscription. Finds BYOVD samples with zero AV detections; these are the most dangerous current variants.
    Pivot to the behavior tab to extract the specific driver filename, hash, and kernel callback manipulation sequence.
- Platform: GitHub Code Search
  Query: '"PsSetCreateProcessNotifyRoutine" OR "ObRegisterCallbacks" path:*.c OR path:*.cpp'
  URL: https://github.com/search?q=%22PsSetCreateProcessNotifyRoutine%22+OR+%22ObRegisterCallbacks%22&type=code
  Notes: Finds kernel driver source code interacting with process notification callbacks, the primary mechanism BYOVD tools
    manipulate. Monitor for new public tools targeting these APIs.
- Platform: GitHub Code Search
  Query: '"EtwEventWrite" "0xC3" path:*.c OR path:*.asm'
  URL: https://github.com/search?q=%22EtwEventWrite%22+%220xC3%22&type=code
  Notes: Finds ETW patching implementations targeting EtwEventWrite with a RET opcode. New variants appear regularly; use
    to track new ETW bypass techniques before they reach production campaigns.
- Platform: LOLDrivers
  URL: https://www.loldrivers.io
  Notes: 'Community-maintained catalog of known vulnerable (BYOVD) and malicious drivers with hashes, CVE references, and
    detection guidance. Feed driver hashes from this list into Sysmon EID 6 detection rules and your EDR''s driver blocklist.
    Updated regularly as new BYOVD tools emerge. Filter by ''Type: Vulnerable'' for BYOVD drivers; ''Type: Malicious'' for
    purpose-built EDR killers like EDRKillShifter. Essential complement to Microsoft''s Vulnerable Driver Blocklist, which
    lags behind community discovery.'
KnownBypasses:
- Bypass: Using a driver signed within days of use (defeats static hash blocklists)
  Mitigation: Enable HVCI (Hypervisor-Protected Code Integrity) and enforce the Microsoft Vulnerable Driver Blocklist; require
    EV code signing for all internal drivers
  Detection: Alert on driver loads where certificate issuance date is within 14 days of the load event; combine with signer
    reputation (first-time or unknown vendor)
- Bypass: Kernel callback removal instead of process termination (EDR stays running but callbacks are removed)
  Mitigation: Implement anti-tamper monitoring that periodically verifies kernel callback registration from a protected process;
    use VBS/HVCI to protect callback arrays
  Detection: 'Detect absence of expected callbacks: if a known EDR driver is loaded but its registered callback count drops
    to zero, treat as active compromise. Requires kernel-mode telemetry (e.g., custom minifilter or EDR with callback-integrity
    monitoring).

    '
- Bypass: EDRSilencer blocks EDR network communication via WFP instead of killing the process
  Mitigation: Monitor WFP filter installation; require code signing for WFP callout drivers; implement out-of-band EDR health
    checks from management console
  Detection: Windows Security Event ID 5441 (WFP filter added); alert on WFP filter additions by non-Microsoft processes with
    SYSTEM privileges outside maintenance windows.
- Bypass: User-mode unhooking (ntdll fresh copy) bypasses user-mode EDR hooks without kernel interaction
  Mitigation: Implement kernel-level ETW Threat-Intelligence (ETW-TI) monitoring; ensure EDR uses kernel callbacks not just
    user-mode hooks; enable Credential Guard
  Detection: 'ETW-TI events fire on sensitive operations (NtReadVirtualMemory, NtWriteVirtualMemory, NtProtectVirtualMemory)
    even when user-mode hooks are removed. Detect via Microsoft Defender ATP telemetry or kernel ETW providers; process-level
    events for these APIs sourced from unusual parent chains are anomalous.

    '
- Bypass: Indirect syscalls with call stack spoofing (legitimate-looking stack, no ntdll traversal)
  Mitigation: EDR solutions must implement kernel callbacks rather than relying solely on user-mode hooks; enforce application
    control to block unknown binaries
  Detection: 'Kernel-level process and thread creation callbacks still fire regardless of syscall technique. Detect by correlating
    process creation callbacks with the absence of expected user-mode telemetry. A process that creates threads but generates
    no user-mode hook events is anomalous.

    '
- Bypass: Living Off the Land using Windows-native tools (sc.exe, WMI) to stop security services instead of deploying a driver
  Mitigation: Enable tamper protection on EDR products; use PPL to protect security processes from user-mode termination
  Detection: See ransomware-service-manipulation chokepoint for sc.exe/net.exe service stop detection; combine with preceding
    driver load context for full kill-chain coverage
