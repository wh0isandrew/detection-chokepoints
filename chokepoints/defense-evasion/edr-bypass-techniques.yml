Detections:
- Level: Research
  Description: Identify all kernel driver load events in the environment, focusing on non-Microsoft and recently signed drivers
  LogSources:
  - Sysmon Event ID 6 (Driver Loaded)
  - Windows Security Event ID 4688 (Process Creation)
  - Windows System Event ID 7045 (Service Installed)
  Logic: 'Sysmon EID 6 driver loads where Signature is non-Microsoft, SignatureStatus is not Valid, the driver was signed within the last 90 days, or the hash matches the Microsoft Vulnerable Driver Blocklist.'
  ExpectedFPRate: High
  UseCase: Build baseline of all drivers loaded in the environment; identify gaps in driver allowlisting; compare against
    Microsoft Vulnerable Driver Blocklist
  SigmaRule: sigma-rules/edr-bypass/research.yml
- Level: Hunt
  Description: Kernel driver load followed by security process termination or service stop
  LogSources:
  - Sysmon Event ID 6 (Driver Loaded)
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 10 (Process Access)
  - Windows Security Event ID 4688 (Process Creation)
  - Windows System Event ID 7036 (Service State Change)
  Logic: 'Driver Loaded (EID 6) non-Microsoft OR signed <90 days OR hash on blocklist, AND within 5 minutes one of: EDR/AV process terminated (MsMpEng.exe, SophosFileScanner.exe, CSFalconService.exe, SentinelAgent.exe), OR sc.exe/net.exe stop targeting a security service, OR process access (EID 10) opening a security process with PROCESS_TERMINATE. Source must be an elevated process (high integrity or SYSTEM).'
  ExpectedFPRate: Medium
  UseCase: Proactive hunt for BYOVD-based EDR killing; correlates driver load with subsequent security tool impairment
  SigmaRule: sigma-rules/edr-bypass/hunt.yml
- Level: Analyst
  Description: Known vulnerable or recently signed driver load immediately followed by security process termination. Direct
    EDR kill signal.
  LogSources:
  - Sysmon Event ID 6 (Driver Loaded)
  - Sysmon Event ID 1 (Process Creation)
  - Sysmon Event ID 10 (Process Access)
  - Windows Security Event ID 4688 (Process Creation)
  - Windows Security Event ID 4624 (Logon)
  - Windows System Event ID 7036 (Service State Change)
  Logic: 'Driver load (EID 6) where hash matches the Microsoft Vulnerable Driver Blocklist OR certificate was issued within 14 days by an unknown vendor, AND within 120 seconds a security process is terminated or service stopped (EID 7036) targeting MsMpEng.exe, SophosFileScanner.exe, CSFalconService.exe, SentinelAgent.exe, or CylanceSvc.exe. Source is SYSTEM or local Administrators, ideally after-hours or from a non-standard admin workstation.'
  ExpectedFPRate: Low
  UseCase: SOC alerting; direct escalation trigger for active EDR impairment; treat as ransomware precursor
  SigmaRule: sigma-rules/edr-bypass/analyst.yml
