    former members migrated to CACTUS and SafePay
  VariantId: blackbasta
  Command:
    Invocation: "sc stop SophosService\nsc stop veeam\nsc stop MSSQLSERVER\nsc stop wbengine\nsc delete SophosService\nsc config veeam start= disabled"
