OsintSources:
  - Platform: VirusTotal Intelligence
    Query: 'behavior_processes:"sc.exe" tag:ransomware'
    URL: "https://www.virustotal.com/gui/search/behavior_processes%3A%22sc.exe%22%20tag%3Aransomware"
    Notes: "Requires VT Intelligence subscription. Returns ransomware samples where sc.exe was spawned during dynamic analysis. Pivot to behavior tab on any result to extract the full service kill list for that family — feed those service names into the analyst Sigma rule's service name filter list."
  - Platform: GitHub Code Search
    Query: '"net stop" "sc delete" ransomware path:*.ps1 OR path:*.bat OR path:*.txt'
    URL: "https://github.com/search?q=%22net+stop%22+%22sc+delete%22+ransomware&type=code"
    Notes: "Finds scripts and extracted kill lists published by researchers after sample analysis. Filter by extension — .txt and .md files often contain raw kill lists ripped from decompiled samples. Update the analyst rule's service name list whenever new families are documented."
  - Platform: ANY.RUN Public Feed
    URL: "https://app.any.run/submissions#status=public&tag=ransomware"
    Notes: "Interactive sandbox with a public task feed. Filter to public ransomware submissions and inspect process trees — sc.exe and net.exe child process chains are clearly visible without needing a local sandbox. Useful for rapid triage of new ransomware samples before full analysis."
  - Platform: Ransomware.live
    URL: "https://www.ransomware.live"
    Notes: "Real-time ransomware group activity tracker sourced from dark web leak sites. Use to identify which ransomware families are currently most active — prioritize hunting for those families' service kill lists in your environment. Also see ransomlook.io (open-source, API access) for programmatic integration."

KnownBypasses:
  - Bypass: Tamper protection enabled on EDR (requires kernel-level access to disable)
    Mitigation: Enable tamper protection on all EDR products; require kernel driver to disable
    Detection: Detect kernel driver loading (BYOVD) before service manipulation
  - Bypass: Booting to Safe Mode (security services don't start)
    Mitigation: N/A — services genuinely not running in Safe Mode
    Detection: "Detect Safe Mode boot on servers (registry: HKLM\\SYSTEM\\CurrentControlSet\\Control\\SafeBoot)"
  - Bypass: Renaming service before stopping (evades name-based filters)
    Mitigation: Allowlist by service binary path, not service name
    Detection: Monitor service configuration changes (sc config); service rename before stop is itself suspicious
  - Bypass: Process termination (taskkill /F) instead of service stop
    Mitigation: Protected Process Light (PPL) for EDR processes
    Detection: Monitor process termination events targeting security tool executables
  - Bypass: WMI or PowerShell-based service stop (evades sc.exe/net.exe process-creation detections)
    Mitigation: Monitor WMI activity broadly; restrict WMI remoting via host firewall where not operationally required
    Detection: "Detect WMI calls to StopService method (Sysmon EID 19/20/21 for WMI subscriptions; EID 1 for wmic.exe with 'service' and 'call stopservice'; PowerShell script block logging for Stop-Service or Invoke-WmiMethod targeting security services)"
  - Bypass: Purpose-built EDR killer tools (EDRKillShifter, weaponized drivers bundled with ransomware)
    Mitigation: Enable HVCI (Hypervisor-Protected Code Integrity) and Microsoft Vulnerable Driver Blocklist; enforce driver signing policy
    Detection: "Detect kernel driver loading (Sysmon EID 6) for drivers with newly issued or untrusted certificates immediately preceding bulk service termination; alert on loading of drivers matching Microsoft's blocklist"


RawLogs:
  - Type: Sysmon
    EventId: 1
    Source: Microsoft-Windows-Sysmon/Operational
    Description: sc.exe used to stop a backup service - first service in rapid bulk-stop sequence
    MatchedRules: [Hunt, Analyst]
    Sample: |
      EventID: 1 (Process Create)
      UtcTime: 2024-06-17 22:11:03.447
      ProcessId: 5532
      Image: C:\Windows\System32\sc.exe
      CommandLine: sc  stop  VeeamBackupSvc
      ParentImage: C:\Windows\System32\cmd.exe

  - Type: Windows Event Log
    EventId: 7036
    Source: Service Control Manager
    Description: Veeam backup service stopped as part of ransomware pre-encryption service kill
    MatchedRules: [Research, Hunt, Analyst]
    Sample: |
      EventID: 7036 (The service entered the stopped state)
      TimeCreated: 2024-06-17T22:11:03.8834120Z
      Channel: System
      param1: Veeam Backup Service
      param2: stopped

  - Type: Sysmon
    EventId: 1
    Source: Microsoft-Windows-Sysmon/Operational
    Description: sc.exe disables service to prevent automatic restart
    MatchedRules: [Hunt, Analyst]
    Sample: |
      EventID: 1 (Process Create)
      UtcTime: 2024-06-17 22:11:04.112
      ProcessId: 5540
      Image: C:\Windows\System32\sc.exe
      CommandLine: sc  config  VeeamBackupSvc  start=  disabled
      ParentImage: C:\Windows\System32\cmd.exe

  - Type: Windows Event Log
    EventId: 7040
    Source: Service Control Manager
    Description: Backup service start type changed to disabled - prevents auto-restart
    MatchedRules: [Hunt, Analyst]
    Sample: |
      EventID: 7040 (The start type of the service was changed)
      TimeCreated: 2024-06-17T22:11:04.2201830Z
      Channel: System
      param1: Veeam Backup Service
      param2: disabled

  - Type: Sysmon
    EventId: 1
    Source: Microsoft-Windows-Sysmon/Operational
    Description: Service deleted to remove backup infrastructure entirely
    MatchedRules: [Hunt, Analyst]
    Sample: |
      EventID: 1 (Process Create)
      UtcTime: 2024-06-17 22:11:07.883
      ProcessId: 5548
      Image: C:\Windows\System32\sc.exe
      CommandLine: sc  delete  VeeamBackupSvc
      ParentImage: C:\Windows\System32\cmd.exe

