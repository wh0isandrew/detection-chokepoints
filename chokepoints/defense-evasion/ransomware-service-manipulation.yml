---
Name: Ransomware Service Manipulation
Id: e5f7a9b1-3c4d-6e8f-0a2b-5d7c9e1f3a5b
MitreIds:
  - T1562.001
  - T1489
Tactics:
  - Defense Evasion
  - Impact
Techniques:
  - "Impair Defenses: Disable or Modify Tools"
  - "Service Stop"
DetectionPriority: CRITICAL
ThreatPrevalence: HIGH
DetectionDifficulty: LOW
Description: >
  Before encrypting files, ransomware operators stop and delete security tools,
  backup services, and database engines to maximize impact and prevent recovery.
  This service manipulation phase is the last detectable warning before encryption
  begins. The chokepoint is immutable: admin/SYSTEM privileges, service enumeration,
  and service stop/delete capability are always required regardless of which ransomware
  family is executing. This pattern has remained consistent across all major ransomware
  families from 2021 to present, with kill lists expanding but the core behavior unchanged.
LastUpdated: "2026-03-07"
Author: "@iimp0ster"

Variations:
  - Name: BlackBasta
    FirstSeen: "2022"
    Status: Inactive
    Notes: "Targets AV, EDR, Veeam backup, SQL databases; avg TTR 6-12 hours; collapsed February 2025 after internal Matrix chat logs (196k messages) leaked by disgruntled member; former members migrated to CACTUS and SafePay"
  - Name: Alphv/BlackCat
    FirstSeen: "2021"
    Status: Defunct
    Notes: "Targets Sophos, Defender, VSS, SQL; cross-platform (Windows and Linux/ESXi); FBI disruption December 2023; exited via scam March 2024 after $22M Change Healthcare ransom — leadership withheld affiliate commissions and shut down infrastructure"
  - Name: Akira
    FirstSeen: "2023"
    Status: Active
    Notes: "Prioritizes Defender and backup agents; targets VPN appliances for initial access"
  - Name: Qilin
    FirstSeen: "2022"
    Status: Active
    Notes: "Originally tracked as Agenda (Golang); rebranded to Qilin and rewrote in Rust in 2022; fully operational RaaS by February 2023; targets EDR, Veeam, databases; VMware ESXi variant active; surged to prominence with NHS/Synnovis attack June 2024"
  - Name: LockBit 3.0
    FirstSeen: "2022"
    Status: Severely Disrupted
    Notes: "Comprehensive kill list (50+ services); Group Policy abuse for domain-wide deployment; Operation Cronos (February 2024) seized 28 servers, source code, and 1000+ decryption keys — significantly reduced operational capacity"

Prerequisites:
  - Admin or SYSTEM privileges already established on target system
  - Target security, backup, and database services are running (cannot stop what is not running)

Chokepoints:
  - Stage: Privilege Verification
    Invariant: Actor must hold Admin or SYSTEM privileges on the target host before any service manipulation begins
    WhyCantBypass: sc.exe stop and delete require elevated privileges — no privilege escalation means immediate failure at the first command
    LogSources:
      - "Windows Security Event ID 4672 (Special Logon — privileged account)"
      - "Windows Security Event ID 4624 (Logon)"
    DetectionTier: Research
    SigmaRef: ""
  - Stage: Service Enumeration
    Invariant: Actor enumerates running services to build the kill list via sc query, Get-Service, wmic, or equivalent
    WhyCantBypass: Ransomware cannot stop what it cannot find — service enumeration precedes every observed kill sequence across all documented families
    LogSources:
      - "Sysmon Event ID 1 (sc.exe query / wmic service get / Get-Service)"
      - "Windows Security Event ID 4688 (Process Creation)"
    DetectionTier: Research
    SigmaRef: "sigma-rules/ransomware-service/research.yml"
  - Stage: Service Stop and Disable
    Invariant: Security, backup, and database services are stopped in rapid succession via sc.exe, net stop, taskkill, or WMI StopService — multiple services within a short window
    WhyCantBypass: Files locked by running services cannot be encrypted — stop must precede encryption in every observed ransomware family without exception
    LogSources:
      - "Windows System Event ID 7036 (Service State Change — stopped)"
      - "Windows System Event ID 7040 (Service Start Type Changed — disabled)"
      - "Sysmon Event ID 1 (sc.exe / net.exe / taskkill.exe process creation)"
    DetectionTier: Hunt
    SigmaRef: "sigma-rules/ransomware-service/hunt.yml"
    BypassNote: Purpose-built EDR killers (BYOVD drivers, EDRKillShifter) bypass service-stop detection by killing the EDR process at kernel level — monitor Sysmon EID 6 for suspicious driver loads immediately before bulk service termination
  - Stage: Service Deletion
    Invariant: Stopped services are deleted or permanently disabled to prevent automatic restart during the encryption phase
    WhyCantBypass: Without deletion, Windows service recovery policies restart stopped services and interfere with encryption — deletion is confirmed across all major documented families
    LogSources:
      - "Sysmon Event ID 1 (sc.exe delete / sc.exe config start= disabled)"
      - "Windows System Event ID 7036 (service removed)"
    DetectionTier: Analyst
    SigmaRef: "sigma-rules/ransomware-service/analyst.yml"

EvolutionTimeline:
  - Date: "2021-Q2"
    Event: Database services added to kill lists
    Change: SQL Server, MySQL, PostgreSQL services targeted to release file locks before encryption
    DetectionImpact: Database service monitoring becomes a required detection component
    TheConstant: "Admin privileges → service enumeration → service stop → service delete"
  - Date: "2022-Q3"
    Event: Multi-vendor EDR evasion; kill lists expand to 50+ security products
    Change: From targeted evasion (specific vendor) to comprehensive kill lists covering all major AV/EDR
    DetectionImpact: Cannot rely on specific product name matches; threshold-based detection required
    TheConstant: "Admin privileges → service enumeration → service stop → service delete"
  - Date: "2023-Q4"
    Event: Backup services prioritized ahead of AV/EDR in kill sequence
    Change: Operators target Veeam, Acronis, Windows Backup before other defenses
    DetectionImpact: Backup service monitoring becomes highest priority signal
    TheConstant: "Admin privileges → service enumeration → service stop → service delete"
  - Date: "2024-Q2"
    Event: ESXi hypervisor service targeting increases
    Change: VM-based service disruption targeting vmware-hostd, vpxa, vsanmgmtd
    DetectionImpact: ESXi-specific logging (vSphere/vCenter) required; endpoint detection insufficient
    TheConstant: "Admin privileges → service enumeration → service stop → service delete"
  - Date: "2024-Q3"
    Event: Purpose-built EDR killer tooling becomes standard
    Change: Groups shift from opportunistic BYOVD to purpose-built, bundled EDR-kill tools — RansomHub ships EDRKillShifter; DeadLock embeds a weaponized Baidu driver; ~25% of 2024 ransomware attacks incorporated purpose-built EDR disablement
    DetectionImpact: Cannot rely on known-bad driver hashes alone; monitor for driver load events (Sysmon EID 6) of unsigned or recently signed drivers immediately before service manipulation
    TheConstant: "Admin privileges → service enumeration → service stop → service delete"

Detections:
  - Level: Research
    Description: Identify security or backup service state changes (stopped)
    LogSources:
      - "Windows System Event ID 7036 (Service State Change)"
      - "Windows System Event ID 7040 (Service Start Type Change)"
    Logic: >
      Event ID: 7036
      Service Name: Contains "sophos" OR "defender" OR "veeam" OR "backup" OR "antivirus"
      State: Stopped
    ExpectedFPRate: High
    UseCase: Baseline service stop frequency and patterns; identify maintenance windows vs. anomalies
    SigmaRule: sigma-rules/ransomware-service/research.yml

  - Level: Hunt
    Description: Service stop + delete combination for security or backup services in rapid succession
    LogSources:
      - "Windows System Event ID 7036 (Service State Change)"
      - "Windows System Event ID 7040 (Service Start Type Change)"
      - "Sysmon Event ID 1 (Process Creation for sc.exe, net.exe)"
    Logic: >
      Process: sc.exe OR net.exe OR powershell.exe OR taskkill.exe
      CommandLine: "stop" AND (service keyword in: sophos, defender, veeam, backup, acronis, mssql, mysql)
      Within 60 seconds: Same or related service: "delete" OR "disabled" via sc.exe
      OR: 3+ security/backup services stopped within 5-minute window from same process/session
    ExpectedFPRate: Medium
    UseCase: Hunt for ransomware preparation activity; identifies pre-encryption service manipulation
    SigmaRule: sigma-rules/ransomware-service/hunt.yml

  - Level: Analyst
    Description: Network logon + bulk service termination targeting specific security/backup services within a tight window
    LogSources:
      - "Sysmon Event ID 1 (Process Creation)"
      - "Windows Security Event ID 4624 (Logon)"
      - "Windows System Event ID 7036 (Service State)"
      - "Windows System Event ID 7040/7045 (Service Config)"
    Logic: >
      Source: Network Logon (4624, LogonType 3) OR local admin session
      Process: sc.exe OR net.exe OR taskkill.exe
      Services stopped (5 or more within 10-minute window), targeting:
        Security: SophosFileScanner OR SAVService OR WinDefend OR Sense OR MsMpEng
        Backup: Veeam* OR VeeamDeploymentService OR VSS OR wbengine OR *acronis*
        Database: MSSQL* OR SQLWriter OR MySQL* OR postgresql*
      Service delete: Attempted within 2 minutes of service stop
      Context: After-hours activity (outside 08:00-18:00 local) OR unusual source IP
    ExpectedFPRate: Low
    UseCase: SOC alerting; ransomware pre-encryption detection with minimal time to respond
    SigmaRule: sigma-rules/ransomware-service/analyst.yml

