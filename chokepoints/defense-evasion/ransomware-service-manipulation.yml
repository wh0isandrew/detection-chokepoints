Prerequisites:
- Admin or SYSTEM privileges already established on target system
- Target security, backup, and database services are running (cannot stop what is not running)
Chokepoints:
- Stage: Service Enumeration
  Input: Attacker has SYSTEM privileges on the target system
  Invariant: Actor enumerates running services to build the kill list via sc query, Get-Service, wmic, or equivalent
  Observable: 'Sysmon EID 1 showing sc.exe query, wmic service get, or Get-Service commands. Multiple service
    enumeration commands in rapid succession from the same process or user context.'
  WhyCantBypass: Ransomware cannot stop what it cannot find. Service enumeration precedes every observed kill sequence across
    all documented families. sc.exe stop and delete require Admin or SYSTEM privileges, so no privilege escalation means immediate
    failure before enumeration can complete
  LogSources:
  - Sysmon Event ID 1 (sc.exe query / wmic service get / Get-Service)
  - Windows Security Event ID 4688 (Process Creation)
  DetectionTier: Research
  SigmaRef: sigma-rules/ransomware-service/research.yml
- Stage: Bulk Service Stop
  Input: Service kill list has been built via enumeration
  Invariant: Security, backup, and database services are stopped in rapid succession via sc.exe, net stop, taskkill, or WMI
    StopService. Multiple services within a short window
  Observable: 'Windows System EID 7036 showing multiple security/backup services transitioning to "stopped" state
    within 60 seconds. Sysmon EID 1 showing repeated sc stop or net stop commands.'
  WhyCantBypass: Files locked by running services cannot be encrypted. Stop must precede encryption in every observed ransomware
    family without exception
  LogSources:
  - Windows System Event ID 7036 (Service State Change — stopped)
  - Windows System Event ID 7040 (Service Start Type Changed — disabled)
  - Sysmon Event ID 1 (sc.exe / net.exe / taskkill.exe process creation)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/ransomware-service/hunt.yml
  BypassNote: Purpose-built EDR killers (BYOVD drivers, EDRKillShifter) bypass service-stop detection by killing the EDR process
    at kernel level. Monitor Sysmon EID 6 for suspicious driver loads immediately before bulk service termination
- Stage: Service Deletion
  Input: Target services have been stopped
  Invariant: Stopped services are deleted or permanently disabled to prevent automatic restart during the encryption phase
  Observable: 'Sysmon EID 1 showing sc.exe delete or sc.exe config start= disabled commands targeting security
    and backup services. Registry changes under HKLM\SYSTEM\CurrentControlSet\Services\ confirming service deletion.'
  WhyCantBypass: Without deletion, Windows service recovery policies restart stopped services and interfere with encryption.
    Deletion is confirmed across all major documented families
  LogSources:
  - Sysmon Event ID 1 (sc.exe delete / sc.exe config start= disabled)
  - Sysmon Event ID 12/13 (Registry key deletion under Services hive)
  DetectionTier: Analyst
  SigmaRef: sigma-rules/ransomware-service/analyst.yml
EvolutionTimeline:
- Date: 2021-Q2
  Event: Database services added to kill lists
  Change: SQL Server, MySQL, and PostgreSQL services added to kill lists to release file locks before encryption.
  DetectionImpact: Database service monitoring becomes a required detection component
  Variants: []
  EventType: event
- Date: 2022-Q3
  Event: Multi-vendor EDR evasion; kill lists expand to 50+ security products
  Change: Kill lists expand to 50+ security products covering all major AV/EDR; threshold-based detection required.
  DetectionImpact: Cannot rely on specific product name matches; threshold-based detection required
  Variants: []
  EventType: event
- Date: 2023-Q4
  Event: Backup services prioritized ahead of AV/EDR in kill sequence
  Change: Veeam, Acronis, and Windows Backup targeted before AV/EDR; backup service monitoring becomes highest-priority signal.
  DetectionImpact: Backup service monitoring becomes highest priority signal
  Variants: []
  EventType: event
- Date: 2024-Q2
  Event: ESXi hypervisor service targeting increases
  Change: VM-based service disruption targets vmware-hostd, vpxa, vsanmgmtd; ESXi-specific logging required.
  DetectionImpact: ESXi-specific logging (vSphere/vCenter) required; endpoint detection insufficient
  Variants: []
  EventType: event
- Date: 2024-Q3
  Event: Purpose-built EDR killer tooling becomes standard
  Change: RansomHub ships EDRKillShifter; DeadLock embeds a weaponized Baidu driver; ~25% of 2024 ransomware attacks incorporated
    purpose-built EDR disablement.
  DetectionImpact: Cannot rely on known-bad driver hashes alone; monitor for driver load events (Sysmon EID 6) of unsigned
    or recently signed drivers immediately before service manipulation
  Variants: []
  EventType: event
Detections:
- Level: Research
  Description: Identify security or backup service state changes (stopped)
  LogSources:
  - Windows System Event ID 7036 (Service State Change)
  - Windows System Event ID 7040 (Service Start Type Change)
  Logic: 'EID 7036 Stopped events where Service Name contains sophos, defender, veeam, backup, or antivirus.'
  ExpectedFPRate: High
  UseCase: Baseline service stop frequency and patterns; identify maintenance windows vs. anomalies
  SigmaRule: sigma-rules/ransomware-service/research.yml
- Level: Hunt
  Description: Service stop + delete combination for security or backup services in rapid succession
  LogSources:
  - Windows System Event ID 7036 (Service State Change)
  - Windows System Event ID 7040 (Service Start Type Change)
  - Sysmon Event ID 1 (Process Creation for sc.exe, net.exe)
  Logic: 'sc.exe, net.exe, powershell.exe, or taskkill.exe with CommandLine containing stop AND a service keyword (sophos, defender, veeam, backup, acronis, mssql, mysql), followed within 60 seconds by a delete or disable of the same service via sc.exe. Also fires when 3+ security/backup services stop within 5 minutes from the same process or session.'
  ExpectedFPRate: Medium
  UseCase: Hunt for ransomware preparation activity; identifies pre-encryption service manipulation
  SigmaRule: sigma-rules/ransomware-service/hunt.yml
- Level: Analyst
  Description: Network logon + bulk service termination targeting specific security/backup services within a tight window
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Windows Security Event ID 4624 (Logon)
  - Windows System Event ID 7036 (Service State)
  - Windows System Event ID 7040/7045 (Service Config)
  Logic: 'Network logon (4624 LogonType 3) or local admin session running sc.exe/net.exe/taskkill.exe stops 5+ services in 10 minutes targeting security (SophosFileScanner, SAVService, WinDefend, Sense, MsMpEng), backup (Veeam*, VeeamDeploymentService, VSS, wbengine, *acronis*), or database (MSSQL*, SQLWriter, MySQL*, postgresql*), with a service delete attempted within 2 minutes. Weight after-hours activity or unusual source IP.'
  ExpectedFPRate: Low
  UseCase: SOC alerting; ransomware pre-encryption detection with minimal time to respond
  SigmaRule: sigma-rules/ransomware-service/analyst.yml
