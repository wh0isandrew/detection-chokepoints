Name: Ransomware Service Manipulation
Id: e5f7a9b1-3c4d-6e8f-0a2b-5d7c9e1f3a5b
MitreIds:
- T1562.001
- T1489
Tactics:
- Defense Evasion
- Impact
Techniques:
- 'Impair Defenses: Disable or Modify Tools'
- Service Stop
DetectionPriority: CRITICAL
ThreatPrevalence: HIGH
DetectionDifficulty: LOW
Description: 'Before encrypting files, ransomware operators stop and delete security tools, backup services, and database
  engines to maximize impact and prevent recovery. This service manipulation phase is the last detectable warning before encryption
  begins. The chokepoint is immutable: admin/SYSTEM privileges, service enumeration, and service stop/delete capability are
  always required regardless of which ransomware family is executing. This pattern has remained consistent across all major
  ransomware families from 2021 to present, with kill lists expanding but the core behavior unchanged.

  '
LastUpdated: '2026-03-07'
Author: '@iimp0ster'
Variations:
