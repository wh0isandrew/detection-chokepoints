KnownBypasses:
- Bypass: Tamper protection enabled on EDR (requires kernel-level access to disable)
  Mitigation: Enable tamper protection on all EDR products; require a signed kernel driver to disable it.
- Bypass: Renaming service before stopping (evades name-based filters)
  Mitigation: Allowlist by service binary path rather than service name; alert on service config changes before stop.
- Bypass: Process termination (taskkill /F) instead of service stop
  Mitigation: Enable Protected Process Light (PPL) for EDR processes.
- Bypass: WMI or PowerShell-based service stop (evades sc.exe/net.exe process-creation detections)
  Mitigation: Monitor WMI activity broadly and restrict WMI remoting via host firewall where not operationally required.
- Bypass: Purpose-built EDR killer tools (EDRKillShifter, weaponized drivers bundled with ransomware)
  Mitigation: Enable HVCI and the Microsoft Vulnerable Driver Blocklist; enforce driver signing policy.
