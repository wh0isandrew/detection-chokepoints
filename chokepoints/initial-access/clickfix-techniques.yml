OsintSources:
  - Platform: URLScan
    Query: "(page.body:navigator.clipboard OR page.body:ClipboardItem) AND (page.title:*verify* OR page.title:*update* OR page.title:*captcha*)"
    URL: "https://urlscan.io/search/#(page.body%3Anavigator.clipboard%20OR%20page.body%3AClipboardItem)%20AND%20(page.title%3A*verify*%20OR%20page.title%3A*captcha*)"
    Notes: "Clipboard API presence anchored to deceptive page titles; retains cross-variant resilience while reducing false positives from clipboard API alone."
  - Platform: URLScan
    Query: "page.body:\"I am not a robot\" AND page.body:navigator.clipboard"
    URL: "https://urlscan.io/search/#page.body%3A%22I%20am%20not%20a%20robot%22%20AND%20page.body%3Anavigator.clipboard"
    Notes: "Fake CAPTCHA pages that write to the clipboard — the canonical ClickFix lure UI; high precision across Google reCAPTCHA and Cloudflare impersonation variants."
  - Platform: URLScan
    Query: "page.body:navigator.clipboard AND (page.body:\"Win+R\" OR page.body:\"Windows key\" OR page.body:\"Run dialog\" OR page.body:\"Ctrl+V\")"
    URL: "https://urlscan.io/search/#page.body%3Anavigator.clipboard%20AND%20page.body%3A%22Win%2BR%22"
    Notes: "Targets pages instructing users to open Run dialog or paste commands — the execution instruction unique to ClickFix and its variants."
  - Platform: VirusTotal Intelligence
    Query: 'behavior_processes:"nslookup.exe" tag:powershell'
    URL: "https://www.virustotal.com/gui/search/behavior_processes%3A%22nslookup.exe%22%20tag%3Apowershell"
    Notes: "Requires VT Intelligence subscription; targets DNS-based ClickFix staging where nslookup retrieves the payload instead of direct HTTP download."
  - Platform: VirusTotal Intelligence
