OsintSources:
  - Platform: URLScan
    Query: "filename:tax*.exe OR filename:invoice*.exe OR filename:ssn*.exe OR filename:support*.exe OR filename:verify*.exe"
    URL: "https://urlscan.io/search/#filename%3Atax*.exe%20OR%20filename%3Ainvoice*.exe%20OR%20filename%3Assn*.exe"
    Notes: "Finds download pages serving tax/invoice/support-themed executables — the most common RMM masquerade pretexts. Extend with seasonal pretexts (W2, refund, enrollment) during relevant periods."
  - Platform: Shodan
    Query: 'product:"ScreenConnect"'
    URL: "https://www.shodan.io/search?query=product%3A%22ScreenConnect%22"
    Notes: "Find internet-exposed ScreenConnect instances; cross-reference against known legitimate MSP infrastructure to identify attacker-controlled instances. Also run product:\"SimpleHelp\" to cover the actively exploited CVE-2024-57727 vector (CISA AA25-163A)."
  - Platform: Censys
    Query: 'services.tls.certificate.parsed.subject.common_name: "SimpleHelp"'
    URL: "https://search.censys.io/search?resource=hosts&q=services.tls.certificate.parsed.subject.common_name%3A+%22SimpleHelp%22"
    Notes: "Finds infrastructure presenting SimpleHelp TLS certificates — currently the most actively exploited RMM platform per CISA AA25-163A (June 2025). For AnyDesk: its certificates were revoked following the February 2024 production server breach, making cert-based hunting less reliable — pivot to the VT PE metadata query below for AnyDesk binary identification instead."
  - Platform: VirusTotal Intelligence
    Query: 'have:itw tag:peexe (metadata:"AnyDesk" OR metadata:"ScreenConnect" OR metadata:"SimpleHelp" OR metadata:"NetSupport")'
    URL: "https://www.virustotal.com/gui/search/have%3Aitw%20tag%3Apeexe%20metadata%3A%22AnyDesk%22"
    Notes: "Requires VT Intelligence subscription. Finds PE executables observed in the wild whose internal metadata (OriginalFilename, Company, Product fields) references known RMM vendors. These are renamed or repackaged RMM binaries — the core delivery mechanism. Pivot to Details > PE Info to confirm metadata mismatch between submitted filename and OriginalFilename."
  - Platform: LOLRMM
    URL: "https://lolrmm.io"
    Notes: "Community-maintained catalog of every known RMM tool with file metadata, network indicators, and detection heuristics. Use to extract OriginalFilename values and network destinations for any RMM tool to feed into VT metadata searches and network-based detection rules. Essential reference for keeping the renamed-binary analyst rule current as new tools emerge."

KnownBypasses:
  - Bypass: Legitimate business use of the same RMM tool
    Mitigation: Maintain allowlist of IT-approved RMM instances and source IPs
    Detection: Focus on user-initiated browser downloads rather than all RMM process execution
  - Bypass: Self-hosted RMM infrastructure (RustDesk, MeshCentral)
    Mitigation: Network-level egress filtering by traffic pattern
    Detection: Detect by behavior (browser download + user execution) not by destination domain
  - Bypass: Legitimate-looking file names matching IT asset naming conventions
    Mitigation: User awareness training; verify download sources with IT
    Detection: Combine with file metadata mismatch (OriginalFilename vs. actual name)
  - Bypass: Delayed execution (user downloads, executes hours later)
    Mitigation: N/A
    Detection: Extend correlation time window; correlate on file path rather than time delta
  - Bypass: CVE exploitation of internet-exposed RMM servers (no user interaction required)
    Mitigation: Patch RMM platforms promptly; restrict RMM management interfaces from internet exposure; subscribe to vendor security bulletins
    Detection: "All current detection logic assumes user-initiated browser download — server-side exploitation bypasses it entirely. Monitor RMM server process telemetry for unexpected child processes, lateral movement, and outbound connections to non-RMM destinations. Alert on RMM server processes (ScreenConnect, SimpleHelp) spawning cmd.exe, powershell.exe, or network scanners."
  - Bypass: Portable executable delivery (no installation required, bypasses software install controls)
    Mitigation: Block unsigned or unapproved portable executables via application control; monitor Downloads/Temp for executable creation
    Detection: "CISA AA23-025A specifically highlights that portable executables don't require admin privileges and bypass software installation audit controls. Detection must focus on process execution from user-writable paths rather than relying on install events."


RawLogs:
  - Type: Sysmon
    EventId: 11
    Source: Microsoft-Windows-Sysmon/Operational
    Description: Renamed RMM binary dropped to Downloads folder by browser process
    MatchedRules: [Hunt, Analyst]
    Sample: |
      EventID: 11 (FileCreate)
      UtcTime: 2024-10-15 09:34:12.881
      ProcessGuid: {c3d4e5f6-3456-7890-cdef-012345678901}
      ProcessId: 3284
      Image: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
      TargetFilename: C:\Users\jsmith\Downloads\tax-document-2024.exe
      CreationUtcTime: 2024-10-15 09:34:12.881
      # Browser drops .exe directly to Downloads — combined with execution signals Hunt/Analyst rules

  - Type: Sysmon
    EventId: 1
    Source: Microsoft-Windows-Sysmon/Operational
    Description: Renamed RMM binary executed — OriginalFilename mismatch is the Analyst signal
    MatchedRules: [Research, Hunt, Analyst]
