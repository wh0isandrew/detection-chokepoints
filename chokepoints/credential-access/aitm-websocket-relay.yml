KnownBypasses:
- Bypass: User agent rotation (kit changes from axios to another Node.js HTTP client)
  Mitigation: Build allowlist of known-legitimate Node.js UA strings; alert on unknown
    Node.js variants
  Detection: >
    Two-tier ASN correlation is UA-agnostic. Maintain UA-based rules at Hunt tier while
    relying on ASN correlation for Analyst-tier alerting. Any new Node.js UA on
    Entra sign-in to high-value app should trigger Hunt review.

- Bypass: Using a headless browser instead of Node.js HTTP client for relay
  Mitigation: Monitor for headless browser signatures (Selenium navigator.webdriver,
    PhantomJS, CDP remote debugging port)
  Detection: >
    Headless browser UA strings differ from native browser UAs (missing expected
    Chrome version stamps, headless indicators). Entra sign-in from headless
    browser on cloud-VPS ASN is still anomalous. Two-tier ASN correlation still applies.

- Bypass: Routing both tiers through residential proxies (flatten the two-tier model)
  Mitigation: Enable token protection (token binding) to bind tokens to device identity
  Detection: >
    Monitor for Node.js UA on residential ASN sign-ins - this combination is anomalous
    regardless of the two-tier model. Single-tier residential routing still generates
    behavioral signals (rapid sequential M365 app access, empty c_DeviceId).

OsintSources:
- Platform: URLScan
  Query: 'page.ip.asn:"AS37963" OR page.ip.asn:"AS9009" AND filename:*.js AND page.status:200'
  Notes: >
    Alibaba Cloud (AS37963) and M247 (AS9009) are common Tycoon 2FA Tier 1 ASNs.
    JS file responses on cheap-VPS ASNs may be kit relay JavaScript. Pivot to
    associated domains for infrastructure expansion.

