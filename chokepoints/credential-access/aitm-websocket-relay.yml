Name: AiTM WebSocket Kit Relay
Id: 42a49200-e524-492e-8352-3ce4a2c78864
MitreIds:
- T1539
- T1078.004
Tactics:
- Credential Access
Techniques:
- Steal Web Session Cookie
- Valid Accounts: Cloud Accounts
DetectionPriority: CRITICAL
ThreatPrevalence: HIGH
DetectionDifficulty: MEDIUM
Description: >
  Adversary-in-the-Middle (AiTM) kits operate a server-side WebSocket reverse proxy
  (typically Node.js + Socket.IO) that relays a victim's full authentication flow to
  Microsoft Entra ID or Google identity providers in real time, capturing post-MFA
  session tokens without touching the victim's endpoint. The kit relay tier makes
  server-to-server HTTP calls to Microsoft/Google using a Node.js HTTP client, which
  leaves a distinctive user agent (node, axios, undici, node-fetch) on sign-in events.
  Operators then access the compromised account from residential-proxy infrastructure,
  creating a two-tier ASN pattern that is structurally unavoidable: cloud-VPS for kit
  relay performance, residential proxy for operator evasion. Both tiers authenticate as
  the same UPN within ~20 minutes - a high-confidence correlation no single-ASN rule
  catches. The Google variant additionally compresses
  the full authentication sequence (login_success → MFA relay → OAuth token →
  device registration) into ~1 second - mechanically impossible for human interaction.

LastUpdated: '2026-05-29'
Author: '@iimp0ster'

Prerequisites:
- Victim must visit a phishing page that loads the kit's JavaScript (delivered via
  email link, QR code, PDF/SVG/HTML attachment lure)
- Kit server must be running and reachable from victim's browser
- Target must be a cloud identity tenant (Microsoft 365 / Entra ID or Google Workspace)
  where the kit can proxy the login flow to the real IdP
- Victim must complete MFA challenge (kit relays all MFA methods except FIDO2/passkeys,
  which cryptographically bind to the legitimate origin domain)

Chokepoints:
- Stage: Kit Relay Sign-In (Node.js UA)
  Input: Victim has completed MFA on the phishing page; kit has relayed credentials
    server-side to Microsoft/Google
  Invariant: The attacker MUST make server-to-server HTTP calls to Microsoft/Google
    login endpoints using a non-browser HTTP client (Node.js) - these calls appear in
    Entra ID sign-in logs with the kit's user agent.
  Observable: >
    Entra ID SigninLogs: resultType == "0" (success) AND userAgent contains
    node / axios / undici / node-fetch AND appDisplayName contains OfficeHome /
    Microsoft Authentication Broker / Microsoft Graph / Microsoft Exchange Online.
    Google Workspace Login Audit: login_success → login_verification
    (is_second_factor: true) → token:authorize (Chrome OAuth client 77185425430)
    → DEVICE_REGISTER_UNREGISTER_EVENT - all within ~1 second.
  WhyCantBypass: >
    The AiTM relay is server-side: the kit's Node.js process makes the actual
    HTTP calls to Microsoft/Google on behalf of the victim. Using a browser UA
    on these server-to-server calls would require rewriting the kit's HTTP client
    as a headless browser, which breaks the WebSocket relay architecture and would
    still generate anomalous behavioral signals (headless browser on server infra).
    The user agent cannot be spoofed to match a legitimate end-user browser session
    without making the relay technically infeasible.
  LogSources:
  - Entra ID Sign-in Logs (SigninLogs table in Microsoft Sentinel)
  - Google Workspace Login Audit (login, token activity events)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/aitm-websocket-relay/hunt.yml

- Stage: Two-Tier ASN Transition
  Input: Kit relay (Tier 1) has completed session token capture; operator console
    (Tier 2) begins accessing the victim account 10-20 minutes later
  Invariant: The attacker MUST use two structurally distinct ASN categories -
    cloud-VPS for the high-throughput kit relay and residential/ISP proxy for the
    operator console accessing M365 web apps - creating a detectable dual-ASN
    authentication pattern for the same UPN within a short window.
  Observable: >
    Entra ID SigninLogs: Two successful sign-ins by the same UPN within 20 minutes
    where one source IP belongs to a cloud-hosting ASN (Alibaba Cloud, M247,
    DigitalOcean, Linode, OVH, Hetzner, Clouvider) and the other to a residential
    or small-ISP ASN. The cloud-VPS sign-in has Node.js UA; the residential sign-in
    has a browser UA accessing My Profile / My Signins / OfficeHome / Outlook Web.
    Shared c_sid in Graph Activity Logs across multiple /24 IPs confirms Tier 2
    operator console coordination.
  WhyCantBypass: >
    The two-tier architecture is structurally required: the kit relay needs high-
    throughput cloud VPS infrastructure to proxy real-time WebSocket sessions at
    scale, while the operator console must use residential-shaped ASNs to evade
    geo-velocity and IP risk scoring. The attacker cannot use the same cloud-VPS
    ASN for both tiers without triggering geo-velocity alerts; cannot use residential
    proxy for the kit relay without unacceptable throughput degradation.
  LogSources:
  - Entra ID Sign-in Logs with ASN enrichment (GeoIP/ASN database required)
  - Microsoft Graph Activity Logs (c_sid correlation across /24 IPs)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/aitm-websocket-relay/analyst.yml
  BypassNote: >
    Single-ASN rules miss one tier entirely. Attackers may attempt to flatten the
    two-tier model by routing both relay and console through residential proxies,
    trading throughput for evasion. Monitor for Node.js UA on residential ASNs
    as a bypass adaptation indicator.

Variations:
- Name: Tycoon 2FA (Storm-1747) - WebSocket Variant
  FirstSeen: 2023-Q3
  Status: Active
  SourceURL: https://www.elastic.co/security-labs/tycoon-2fa-aitm-detection-engineering
  Notes: >
    Most prolific AiTM PhaaS kit as of 2025; ~62% of AiTM phishing blocked by
    Microsoft. Uses Socket.IO 4.6.0 with recieveid (typo) event name fingerprint.
    Tier 1: Alibaba Cloud / cheap-VPS ASNs, axios/1.15.2 / undici user agents.
    Tier 2: Residential ISP proxy, browser UA (Firefox on Windows), accesses
    My Profile / My Signins / Microsoft Approval Management / Outlook Web / OfficeHome
    ~10-20 minutes post-relay.
  VariantId: tycoon-2fa-websocket
  Command:
    Invocation: |
      # Kit relay tier (cloud VPS) - server-to-server calls:
      # User-Agent: axios/1.15.2
      POST https://login.microsoftonline.com/common/oauth2/token [Kit relay]
      # Socket.IO relay events:
      # send_to_browser / response_from_browser / recieveid (typo fingerprint)
      #
      # Google variant - 4-event sequence within ~1s:
      # login_success → login_verification(is_second_factor:true) →
      # token:authorize(client:77185425430) → DEVICE_REGISTER_UNREGISTER_EVENT
    Context: >
      Storm-1747 PhaaS. Kit relay uses Node.js HTTP clients (node, axios/1.15.2,
      undici, node-fetch). Operator console appears 10-20 minutes later on
      residential proxy. Entra sign-in log shows Node.js UA on OfficeHome/Auth
      Broker as the primary Tier 1 signal.
    Artifacts:
    - 'Entra ID SigninLogs: userAgent contains axios/1.15.2 on appDisplayName OfficeHome/Microsoft Authentication Broker'
    - 'Entra ID SigninLogs: Residential ASN sign-in 10-20 min after cloud-VPS sign-in, same UPN'
    - 'Graph Activity Logs: shared c_sid across multiple /24 IPs (Tier 2 operator console)'
    - 'Google Workspace Login Audit: 4-event sequence compressed to <1.2 seconds'
  ChokepointMapping: 'Victim visits phishing page → Kit relays auth via Node.js (axios UA on Entra sign-in) → Session tokens captured → Operator console (residential ASN) accesses M365 web apps'

