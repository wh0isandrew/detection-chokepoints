EvolutionTimeline:
- Date: 2022-Q3
  Event: EvilProxy and Evilginx2 establish commercial AiTM-as-a-service market
  Change: >
    AiTM reverse proxy kits move from bespoke tools (Modlishka, Evilginx) to
    commercial PhaaS offerings. EvilProxy targets Microsoft 365 executives.
    Server-side relay architecture becomes the dominant model, generating the
    Node.js UA signal on IdP sign-in logs for the first time at commercial scale.
  DetectionImpact: >
    Entra ID sign-in logs begin showing non-browser user agents (Python, Go HTTP
    clients, curl) on M365 app sign-in events. Node.js / axios UA pattern emerges
    as the primary kit relay signal.
  TheConstant: Server-side relay → non-browser HTTP client → IdP sign-in event with kit UA
  Variants: []
  EventType: event

- Date: 2023-Q3
  Event: Tycoon 2FA launches; reaches 500,000+ orgs/month at peak
  Change: >
    Tycoon 2FA (Storm-1747) launches as a Node.js + Socket.IO based PhaaS kit.
    First observed August 2023. Adds per-victim encryption (Caesar+XOR with LCG
    PRNG), anti-analysis (IP filtering via api.ipapi.is, DevTools blocking, DOM
    vanishing, debugger trap), and fake CAPTCHA (3x3 Unsplash grid). Rapidly
    becomes the most prolific AiTM kit, accounting for ~62% of Microsoft-blocked
    AiTM phishing at peak.
  DetectionImpact: >
    axios/1.15.2 and undici user agents become high-fidelity Tycoon 2FA kit relay
    signals. Two-tier ASN pattern (cloud-VPS Tier 1 + residential Tier 2 within
    20 min) documented as structural architectural signal.
  TheConstant: Server-side relay → Node.js HTTP client → Entra ID sign-in with kit UA
  Variants: []
  EventType: event

- Date: 2024-Q1
  Event: Tycoon 2FA adds device-code-grant variant post-takedown adaptation
  Change: >
    Operators combine Tycoon 2FA tradecraft with OAuth device-code-grant phishing
    after infrastructure disruptions. Device-code variant bypasses URL-filtering
    defenses (no phishing page to block). Token progression
    (none → refreshToken → PRT) documented in Graph Activity Logs.
  DetectionImpact: >
    Device-code detection becomes required complement to WebSocket relay detection.
    authenticationProtocol: deviceCode on MAB app ID is the new signal.
    See chokepoint: oauth-device-code-phishing.
  TheConstant: Server-side relay → non-browser HTTP client → IdP sign-in with kit UA
  Variants: []
  EventType: event

- Date: 2026-05-27
  Event: Elastic Security Labs publishes two-tier infrastructure model and Google 1-second compression analysis
  Change: >
    Elastic documents the structural two-tier ASN model (Tier 1 cloud-VPS / Tier 2
    residential proxy) and the Google authentication 4-event sequence compressed to
    <1.2 seconds as mechanically verifiable automation signals. Confirms that
    standard Identity Protection may mark Tier 2 as aiConfirmedSafe, creating a
    false-negative blind spot when aiConfirmedSafe events are excluded.
  DetectionImpact: >
    Two-tier ASN correlation added as a second detection stage alongside Node.js UA.
    c_sid pivot mistake documented: c_sid is session context ID, NOT user object ID;
    filtering c_sid == user_object_id returns empty results. ASN enrichment becomes
    required for two-tier correlation.
  TheConstant: Server-side relay → Node.js UA on Entra sign-in + cloud-VPS/residential two-tier ASN pattern
  Variants: []
  EventType: event

Detections:
- Level: Research
  Description: >
    Log all Entra ID sign-ins where the user agent contains Node.js HTTP client
    strings. Establishes baseline of legitimate Node.js SDK usage vs. kit relay.
  LogSources:
  - Entra ID Sign-in Logs (SigninLogs / AADSignInEventsBeta in MDE)
  Logic: >
    resultType == "0" AND userAgent contains_any [node, axios, undici, node-fetch,
    node-fetch/1.0]. No app filter - capture all apps to build baseline of
    legitimate Node.js automation. Run for one week to identify known-good
    DevOps pipelines and IT automation.
  ExpectedFPRate: Medium (legitimate Node.js Graph API automation, DevOps pipelines)
  UseCase: >
    Baseline visibility into Node.js user agents on Entra ID sign-in events.
    Identify known-good automation to build the analyst-tier allowlist.
  SigmaRule: sigma-rules/aitm-websocket-relay/research.yml

- Level: Hunt
  Description: >
    Node.js user agent on Entra sign-in to high-value M365 apps (OfficeHome,
    Auth Broker, Graph, Exchange Online). Filters out low-value apps.
  LogSources:
  - Entra ID Sign-in Logs
  Logic: >
    resultType == "0" AND userAgent contains_any [node, axios, undici, node-fetch]
    AND appDisplayName contains_any [OfficeHome, Microsoft Authentication Broker,
    Microsoft Graph, Microsoft Exchange Online]. Exclude known-good service accounts
    with documented Node.js automation.
  ExpectedFPRate: Low-Medium
  UseCase: >
    Active hunting for kit relay tier. High-value app filter reduces FP rate from
    legitimate Graph API automation while preserving coverage of the most common
    Tycoon 2FA relay targets.
  SigmaRule: sigma-rules/aitm-websocket-relay/hunt.yml

- Level: Analyst
  Description: >
    Two-tier ASN correlation: cloud-VPS ASN and residential/ISP ASN both
    authenticating as the same UPN within 20 minutes. High-confidence AiTM signal
    that survives user agent rotation.
  LogSources:
  - Entra ID Sign-in Logs with ASN enrichment
  Logic: >
    Requires ASN enrichment lookup on source IP. Alert when same UPN has two
    successful sign-ins within 20 minutes where ASN1 is a cloud-hosting provider
    (Alibaba Cloud, M247, DigitalOcean, Linode, OVH, Hetzner, Clouvider,
    Host Telecom) AND ASN2 is a residential ISP or small proxy ASN. Exclude
    known corporate VPN egress ASNs.
  ExpectedFPRate: Low
  UseCase: >
    SOC alerting. Two-tier ASN correlation is structurally durable - survives
    user agent rotation and IP rotation because it targets the architectural
    requirement, not the specific kit implementation.
  SigmaRule: sigma-rules/aitm-websocket-relay/analyst.yml

