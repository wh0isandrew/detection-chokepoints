OsintSources:
  - Platform: VirusTotal Intelligence
    Query: 'behavior_processes:"lsass" behavior:"NtOpenProcess" tag:cred-stealer'
    Notes: >
      Finds malware samples that access lsass.exe during sandbox execution. Pivot
      to the behavior tab to extract GrantedAccess patterns and dump methodology
      used by each sample. Cross-reference with CallTrace values to identify
      new evasion techniques.
  - Platform: VirusTotal Intelligence
    Query: 'content:"sekurlsa" OR content:"MiniDumpWriteDump" OR content:"comsvcs" positives:5+'
    Notes: >
      Finds samples containing known credential dump strings. Useful for tracking
      new Mimikatz variants, custom dump tools, and LOLBin abuse scripts that
      reference comsvcs.dll MiniDump.
  - Platform: GitHub Code Search
    Query: '"NtOpenProcess" "lsass" language:C OR language:C++'
    Notes: >
      Finds new credential dumping tool source code. Monitor for novel evasion
      techniques: direct syscall wrappers, handle duplication implementations,
      and process forking methods that may require detection rule updates.
  - Platform: GitHub Code Search
    Query: '"MiniDumpWriteDump" "lsass" OR "sekurlsa" language:C#'
    Notes: >
      Finds .NET-based credential dump tools (SharpKatz, SafetyKatz, SharpDump).
      These generate dbgcore.dll in CallTrace, confirming analyst rule coverage.
  - Platform: LOLDrivers
    Query: https://www.loldrivers.io/
    Notes: >
      Database of known vulnerable kernel drivers used for BYOVD attacks. PPL
      bypass tools (PPLBlade, PPLdump) require loading a vulnerable driver before
      dumping LSASS. Cross-reference with edr-bypass-techniques chokepoint for
      driver load detection coverage.
  - Platform: ANY.RUN
    Query: 'suricata:"lsass" OR commandline:"sekurlsa" OR commandline:"comsvcs"'
    Notes: >
      Sandbox search for samples that interact with lsass.exe during execution.
      ANY.RUN provides process tree visualization showing the parent-child chain
      and GrantedAccess values, useful for building detection rule context.

