Name: LSASS Credential Dumping
Id: c7df4fc6-05da-4a67-8dfa-efcd8e2420e2
MitreIds:
  - T1003.001
  - T1003
  - T1547.005
Tactics:
  - Credential Access
Techniques:
  - 'OS Credential Dumping: LSASS Memory'
  - OS Credential Dumping
  - 'Boot or Logon Autostart Execution: Security Support Provider'
DetectionPriority: CRITICAL
ThreatPrevalence: VERY HIGH
DetectionDifficulty: MEDIUM
Description: >
  To extract plaintext credentials, NTLM hashes, or Kerberos tickets from a live
  Windows system, an attacker must read the memory of the Local Security Authority
  Subsystem Service (lsass.exe). Windows enforces process isolation at the kernel
  level: any tool that reads another process's memory must first obtain a handle via
  NtOpenProcess with appropriate access rights. This kernel-mediated handle request
  is the chokepoint; it fires regardless of whether the attacker uses Mimikatz,
  nanodump, comsvcs.dll, ProcDump, direct syscalls, or any future tool. Even
  techniques that bypass userland API hooks (ntdll unhooking, direct syscalls) still
  traverse the kernel's ObRegisterCallbacks path, which Sysmon Event ID 10
  (ProcessAccess) and ETW Threat Intelligence consume. The attacker cannot read
  lsass memory without the kernel granting the handle.
LastUpdated: '2026-03-30'
Author: '@NovaSky0x1'

Chokepoints:
  - Stage: Handle Acquisition
    Input: Attacker has local admin / SYSTEM privileges on the target
    Invariant: Any process must request a handle to lsass.exe with memory-read access rights from the Windows kernel.
    Observable: 'Sysmon EID 10 with TargetImage=lsass.exe showing GrantedAccess and CallTrace fields'
    WhyCantBypass: >
      Windows enforces process isolation at the kernel level: NtOpenProcess must be
      called to obtain a handle, and the kernel's ObRegisterCallbacks fires for every
      handle request regardless of whether the caller used standard APIs or direct
      syscalls.
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
      - Windows Security Event ID 4656 (Handle Requested)
      - ETW Microsoft-Windows-Threat-Intelligence (kernel-level telemetry)
    DetectionTier: Research
    SigmaRef: sigma-rules/lsass-credential-dumping/research.yml
  - Stage: Memory Read
    Input: Attacker holds a valid handle to lsass.exe with memory-read rights
    Invariant: The process must read lsass.exe virtual memory to extract credential material using NtReadVirtualMemory or MiniDumpWriteDump.
    Observable: 'Sysmon EID 10 CallTrace showing read mechanism (dbgcore.dll, dbghelp.dll, ntdll.dll, or UNKNOWN for direct syscalls); Sysmon EID 11 if dump written to disk'
    WhyCantBypass: >
      Credential material (NTLM hashes, Kerberos tickets, plaintext passwords cached
      by WDigest/SSP) resides in lsass.exe process memory. There is no file or
      registry location that contains the same live credential state.
    LogSources:
      - 'Sysmon Event ID 10 (ProcessAccess: CallTrace field reveals read mechanism)'
      - 'Sysmon Event ID 11 (File Create: dump file written to disk)'
    DetectionTier: Hunt
    SigmaRef: sigma-rules/lsass-credential-dumping/hunt.yml
    BypassNote: >
      Handle duplication (NtDuplicateObject) allows an attacker to clone an existing
      handle to lsass from another process, producing GrantedAccess 0x0040 instead of
      the standard read masks. The hunt rule includes this pattern.
  - Stage: Credential Extraction
    Input: Attacker has raw LSASS memory contents (live read or dump file on disk)
    Invariant: The attacker must parse LSASS memory structures or dump file contents to extract usable credentials, producing observable artifacts (either an in-memory read with a suspicious CallTrace, a dump file on disk, or a DLL injected into lsass via SSP).
    Observable: 'Sysmon EID 10 GrantedAccess + CallTrace correlation for live parse; Sysmon EID 7 for SSP DLL injection (ImageLoaded from non-System32 path); Sysmon EID 11 for dump file written to disk'
    WhyCantBypass: >
      Credential structures in lsass memory use Microsoft's internal SSP format.
      The attacker must either parse them in-process (generating the ProcessAccess
      event) or write a dump file for offline parsing (generating a FileCreate event).
      SSP injection (loading a malicious DLL into lsass) generates an ImageLoaded
      event for a DLL outside System32.
    LogSources:
      - 'Sysmon Event ID 10 (ProcessAccess: GrantedAccess + CallTrace correlation)'
      - 'Sysmon Event ID 7 (Image Loaded: SSP DLL injection into lsass)'
      - 'Sysmon Event ID 11 (File Create: dump file artifact)'
      - 'Sysmon Event ID 1 (Process Creation: LOLBin execution)'
    DetectionTier: Analyst
    SigmaRef: sigma-rules/lsass-credential-dumping/analyst.yml

Variations:
  - Name: Mimikatz (sekurlsa::logonpasswords)
    FirstSeen: 2011-Q2
    Status: Active
    SourceURL: https://github.com/gentilkiwi/mimikatz
    Notes: >
      The original and most widely documented LSASS credential dumping tool. Opens
      lsass.exe with PROCESS_ALL_ACCESS (0x1FFFFF) or PROCESS_VM_READ (0x1010).
      Used by virtually every ransomware group and APT. GrantedAccess 0x1010 is the
      classic Mimikatz fingerprint.
    VariantId: mimikatz-sekurlsa
    Command:
      Invocation: "privilege::debug\nsekurlsa::logonpasswords\n# Or one-liner:\nmimikatz.exe \"privilege::debug\" \"sekurlsa::logonpasswords\" exit"
      Context: 'Classic LSASS dumper. Opens handle with 0x1010. Used by virtually every ransomware group and APT.'
      Artifacts:
      - 'Sysmon EID 10: GrantedAccess 0x1010, CallTrace contains ntdll.dll'
      - 'Sysmon EID 1: mimikatz.exe from non-standard path'
    ChokepointMapping: 'mimikatz.exe launched → handle to lsass.exe (0x1010) → memory read → credentials extracted'
  - Name: comsvcs.dll MiniDump (LOLBin)
    FirstSeen: 2019-Q1
    Status: Active
    SourceURL: https://lolbas-project.github.io/#/OtherMSBinaries/Comsvcs
    Notes: >
      Living-off-the-land technique using rundll32.exe to call the MiniDump export
      from comsvcs.dll (a legitimate Windows DLL). Writes a full process dump of
      lsass.exe to disk. Command pattern: rundll32.exe comsvcs.dll MiniDump <pid>
      <outfile> full. The MiniDump export name is a fixed Windows API; it cannot
      be renamed without recompiling the DLL.
    VariantId: comsvcs-minidump-lolbin
    Command:
      Invocation: 'rundll32.exe C:\Windows\System32\comsvcs.dll, MiniDump <lsass_pid> C:\Windows\Temp\dump.dmp full'
      Context: 'LOLBin technique using a legitimate Windows DLL. Microsoft-signed rundll32.exe calls the MiniDump export. Writes full LSASS dump to disk.'
      Artifacts:
      - 'Sysmon EID 1: rundll32.exe with comsvcs.dll and MiniDump in CommandLine'
      - 'Sysmon EID 10: rundll32.exe accessing lsass.exe, CallTrace contains dbgcore.dll'
      - 'Sysmon EID 11: .dmp file created in temp directory'
    ChokepointMapping: 'rundll32.exe invoked → comsvcs.dll MiniDump export called → handle to lsass.exe → dump written to disk'
  - Name: ProcDump (Sysinternals)
    FirstSeen: 2016-Q1
    Status: Active
    SourceURL: https://learn.microsoft.com/en-us/sysinternals/downloads/procdump
    Notes: >
      Microsoft Sysinternals tool used legitimately for debugging, repurposed for
      LSASS dumping. Uses MiniDumpWriteDump API (dbgcore.dll/dbghelp.dll in CallTrace).
      Signed by Microsoft, so it bypasses many application whitelisting policies.
    VariantId: procdump-sysinternals
    Command:
      Invocation: 'procdump.exe -ma lsass.exe C:\Windows\Temp\lsass.dmp'
      Context: 'Microsoft Sysinternals tool. Signed by Microsoft, bypasses application whitelisting. Uses MiniDumpWriteDump API.'
      Artifacts:
      - 'Sysmon EID 1: procdump.exe or procdump64.exe with lsass in CommandLine'
      - 'Sysmon EID 10: procdump accessing lsass.exe, CallTrace contains dbgcore.dll or dbghelp.dll'
      - 'Sysmon EID 11: .dmp file created'
    ChokepointMapping: 'procdump.exe launched → handle to lsass.exe → MiniDumpWriteDump called → dump file written to disk'
  - Name: Nanodump
    FirstSeen: 2022-Q1
    Status: Active
    SourceURL: https://github.com/fortra/nanodump
    Notes: >
      Minimal LSASS dumper designed to evade detection. Uses direct syscalls, handle
      duplication, and process forking techniques. GrantedAccess patterns vary: 0x0810
      for direct read, 0x0040 for handle duplication mode. Produces UNKNOWN in Sysmon
      CallTrace when using direct syscalls.
    VariantId: nanodump
    Command:
      Invocation: "nanodump.exe --write C:\\Windows\\Temp\\nano.dmp\n# Or handle duplication mode:\nnanodump.exe --dup --write C:\\Windows\\Temp\\nano.dmp\n# Or direct syscall mode:\nnanodump.exe --syscall --write C:\\Windows\\Temp\\nano.dmp"
      Context: 'Minimal LSASS dumper with multiple evasion modes. Direct syscalls produce UNKNOWN in CallTrace. Handle duplication produces GrantedAccess 0x0040.'
      Artifacts:
      - 'Sysmon EID 10: GrantedAccess 0x0810 (direct) or 0x0040 (dup mode), CallTrace UNKNOWN for syscall mode'
      - 'Sysmon EID 11: dump file (may use custom format, not standard .dmp)'
    ChokepointMapping: 'nanodump launched → handle to lsass.exe (direct or duplicated) → memory read via syscall → dump written'
  - Name: HandleKatz
    FirstSeen: 2021-Q3
    Status: Active
    SourceURL: https://github.com/codewhitesec/HandleKatz
    Notes: >
      Abuses handle duplication to obtain a cloned handle to lsass.exe from another
      process that already holds one. GrantedAccess 0x0040 (PROCESS_DUP_HANDLE).
      Designed to evade detections that only look for direct PROCESS_VM_READ handles.
    VariantId: handlekatz-dup
    Command:
      Invocation: 'handlekatz.exe --pid <lsass_pid> --outfile C:\Windows\Temp\hk.dmp'
      Context: 'Clones an existing handle to lsass.exe from another process via NtDuplicateObject. Produces GrantedAccess 0x0040 instead of standard read masks.'
      Artifacts:
      - 'Sysmon EID 10: GrantedAccess 0x0040 (PROCESS_DUP_HANDLE) targeting lsass.exe'
      - 'Sysmon EID 10: secondary handle request to the process holding the original lsass handle'
    ChokepointMapping: 'handlekatz launched → finds process with existing lsass handle → NtDuplicateObject (0x0040) → memory read → credentials extracted'
  - Name: PPLBlade / PPLdump
    FirstSeen: 2022-Q3
    Status: Active
    SourceURL: https://github.com/tastypepperoni/PPLBlade
    Notes: >
      Bypasses Protected Process Light (PPL) protection on lsass.exe by exploiting
      vulnerable signed drivers or ELAM driver abuse. Once PPL is defeated, standard
      dump tools work. Detection shifts to the BYOVD/driver load stage (covered by
      edr-bypass-techniques) plus the subsequent LSASS access event.
    VariantId: pplblade-ppldump
    Command:
      Invocation: "PPLBlade.exe --mode dump --driver RTCore64.sys --output C:\\Windows\\Temp\\ppl.dmp\n# Or PPLdump:\nPPLdump.exe <lsass_pid> C:\\Windows\\Temp\\ppl.dmp"
      Context: 'Two-stage attack: loads a vulnerable signed driver to disable PPL on lsass.exe, then performs standard dump. Detection shifts to the BYOVD driver load stage plus subsequent LSASS access.'
      Artifacts:
      - 'Sysmon EID 6: vulnerable driver loaded (RTCore64.sys, DBUtil_2_3.sys, etc.)'
      - 'Sysmon EID 10: LSASS access after PPL disabled, standard access mask'
      - 'Sysmon EID 11: dump file written to disk'
    ChokepointMapping: 'vulnerable driver loaded (EID 6) → PPL disabled on lsass.exe → handle to lsass.exe → dump written to disk'
  - Name: Task Manager Manual Dump
    FirstSeen: 2014-Q1
    Status: Active
    Notes: >
      Built-in Windows capability: right-click lsass.exe in Task Manager and select
      "Create dump file." Writes a full memory dump to %TEMP%. Uses 0x1FFFFF
      GrantedAccess from taskmgr.exe. Often used by less sophisticated attackers
      or during hands-on-keyboard intrusions.
    VariantId: task-manager-manual-dump
    Command:
      Invocation: 'Right-click lsass.exe in Task Manager > Create dump file'
      Context: 'Built-in Windows capability. No tools required. Writes full memory dump to %TEMP%\lsass.DMP. Common in hands-on-keyboard intrusions by less sophisticated attackers.'
      Artifacts:
      - 'Sysmon EID 10: taskmgr.exe accessing lsass.exe with GrantedAccess 0x1FFFFF'
      - 'Sysmon EID 11: lsass.DMP written to %TEMP%'
    ChokepointMapping: 'taskmgr.exe opened → handle to lsass.exe (0x1FFFFF) → MiniDumpWriteDump → lsass.DMP written to %TEMP%'
  - Name: SSP Injection (mimilib / memssp)
    FirstSeen: 2015-Q1
    Status: Active
    SourceURL: https://attack.mitre.org/techniques/T1547/005/
    Notes: >
      Injects a malicious Security Support Provider DLL into lsass.exe via
      AddSecurityPackage API or direct registry manipulation (HKLM\SYSTEM\CCS\Control\Lsa\Security Packages).
      The DLL logs all future authentication events to a file. Sysmon EID 7
      detects the DLL load from a non-System32 path.
    VariantId: ssp-injection-mimilib
    Command:
      Invocation: "# Mimikatz SSP injection:\nmisc::memssp\n# Or registry-based persistence:\nreg add HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa /v \"Security Packages\" /t REG_MULTI_SZ /d \"mimilib\" /f"
      Context: 'Injects a malicious SSP DLL into lsass.exe. Logs all future authentication events to a plaintext file. Persists across reboots via registry. Unlike other variants, this is a persistence mechanism, not a one-time dump.'
      Artifacts:
      - 'Sysmon EID 7: DLL loaded into lsass.exe from non-System32 path'
      - 'Sysmon EID 13: registry modification to HKLM\SYSTEM\CCS\Control\Lsa\Security Packages'
      - 'Sysmon EID 11: kiwissp.log or similar credential log file created'
    ChokepointMapping: 'AddSecurityPackage API or registry write → malicious DLL loaded into lsass.exe (EID 7) → credentials logged to file on future authentications'
  - Name: Direct Syscall Dumpers (SilentProcessExit, MirrorDump, SafetyKatz)
    FirstSeen: 2020-Q2
    Status: Active
    SourceURL: https://github.com/GhostPack/SafetyKatz
    Notes: >
      Family of tools that use direct system calls (syscall stubs) to bypass ntdll.dll
      userland hooks placed by EDR products. The kernel callback (ObRegisterCallbacks)
      still fires, so Sysmon EID 10 still generates, but the CallTrace shows UNKNOWN
      instead of ntdll.dll. MirrorDump uses DLL injection into a process with an
      existing LSASS handle.
    VariantId: direct-syscall-dumpers
    Command:
      Invocation: "# SafetyKatz (execute-assembly in C2):\nexecute-assembly SafetyKatz.exe\n# MirrorDump:\nMirrorDump.exe --output C:\\Windows\\Temp\\mirror.dmp\n# SilentProcessExit (abuse WER):\nreg add \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\SilentProcessExit\\lsass.exe\" /v ReportingMode /t REG_DWORD /d 1 /f"
      Context: 'Family of tools using direct system call stubs to bypass ntdll.dll userland hooks. Kernel ObRegisterCallbacks still fires. CallTrace shows UNKNOWN instead of ntdll.dll.'
      Artifacts:
      - 'Sysmon EID 10: LSASS access with CallTrace containing UNKNOWN'
      - 'Sysmon EID 1: suspicious process from user-writable path'
      - 'Sysmon EID 11: dump file (may use non-standard format)'
    ChokepointMapping: 'tool launched → direct syscall to NtOpenProcess → handle to lsass.exe (UNKNOWN CallTrace) → memory read → dump or live parse'
  - Name: Pypykatz (Python)
    FirstSeen: 2019-Q3
    Status: Active
    SourceURL: https://github.com/skelsec/pypykatz
    Notes: >
      Pure Python implementation of Mimikatz credential extraction. Can parse LSASS
      memory dumps offline or access live LSASS via ctypes. Cross-platform, works on
      Linux for parsing dump files obtained from Windows. Overlaps with BYOSI chokepoint
      when Python interpreter is brought onto the target.
    VariantId: pypykatz-python
    Command:
      Invocation: "# Live LSASS access via ctypes:\npypykatz live lsa\n# Offline dump parsing:\npypykatz lsa minidump lsass.dmp"
      Context: 'Pure Python Mimikatz implementation. Can access live LSASS via ctypes or parse dump files offline. Cross-platform for offline parsing. Overlaps with BYOSI chokepoint when Python is brought onto target.'
      Artifacts:
      - 'Sysmon EID 10: python.exe or python3.exe accessing lsass.exe'
      - 'Sysmon EID 1: python.exe running from non-standard path'
      - 'Sysmon EID 3: python.exe making outbound connection (if exfiltrating)'
    ChokepointMapping: 'python.exe launched → ctypes call to OpenProcess → handle to lsass.exe → memory read via ctypes → credentials parsed in-process'
  - Name: Impacket secretsdump.py (Remote)
    FirstSeen: 2016-Q1
    Status: Active
    SourceURL: https://github.com/fortra/impacket
    Notes: >
      Remote credential extraction over SMB. Supports multiple modes: DCSync
      (replicating credentials via DRSUAPI), remote registry SAM/LSA dump, and
      remote LSASS memory read via svcctl service creation. When using the LSASS
      read mode, the service runs on the target and dumps locally. Overlaps with
      the remote-execution-tools chokepoint for the SMB lateral movement stage.
    VariantId: impacket-secretsdump
    Command:
      Invocation: "# Remote LSASS dump via svcctl:\nsecretsdump.py domain/user:password@target -just-dc-ntlm\n# Or with pass-the-hash:\nsecretsdump.py -hashes :NTLM_HASH domain/user@target"
      Context: 'Remote credential extraction over SMB. The LSASS access event occurs on the target host via a remotely created service. Supports DCSync (DRSUAPI), remote registry SAM/LSA dump, and remote LSASS read.'
      Artifacts:
      - 'Sysmon EID 10: service process accessing lsass.exe on target host'
      - 'Security EID 4624: network logon (Type 3) from attacker IP'
      - 'Security EID 7045: new service created via svcctl'
    ChokepointMapping: 'SMB authentication → svcctl service creation on target → service process handles lsass.exe → credentials extracted remotely'
  - Name: CrackMapExec / NetExec (--lsa, --sam)
    FirstSeen: 2019-Q2
    Status: Active
    SourceURL: https://github.com/Pennyw0rth/NetExec
    Notes: >
      Network-based credential harvesting across multiple hosts. The --lsa and
      --sam flags dump credentials remotely via SMB service creation. The LSASS
      access event occurs on the target host, not the attacker's machine. Used
      heavily in ransomware operations for credential spraying across domains.
    VariantId: crackmapexec-netexec
    Command:
      Invocation: "# Dump LSA secrets across multiple hosts:\nnxc smb 10.0.0.0/24 -u admin -p password --lsa\n# Dump SAM hive:\nnxc smb target -u admin -p password --sam"
      Context: 'Network-based credential harvesting across multiple hosts via SMB service creation. LSASS access occurs on each target host, not the attacker machine. Used heavily in ransomware operations for domain-wide credential spraying.'
      Artifacts:
      - 'Sysmon EID 10: remotely created service process accessing lsass.exe on each target'
      - 'Security EID 7045: new service created on each target host'
      - 'Security EID 4624: network logon (Type 3) from attacker IP across multiple hosts'
    ChokepointMapping: 'SMB spray across subnet → service created per host → each service handles lsass.exe → credentials collected centrally'
  - Name: Cobalt Strike (logonpasswords, hashdump)
    FirstSeen: 2014-Q1
    Status: Active
    Notes: >
      Built-in beacon commands for credential theft. logonpasswords injects
      Mimikatz reflectively into memory; hashdump reads the SAM hive. Both
      generate Sysmon EID 10 for the LSASS access. The source process is the
      beacon's host process (often rundll32.exe or a sacrificial process),
      producing a non-standard source path in most deployments.
    VariantId: cobalt-strike-logonpasswords
    Command:
      Invocation: "# Beacon commands:\nlogonpasswords\nhashdump\n# Or via execute-assembly:\nexecute-assembly /path/to/SharpKatz.exe"
      Context: 'Built-in beacon commands. logonpasswords reflectively injects Mimikatz into memory. Source process is the beacon host process (often rundll32.exe or sacrificial process), producing a non-standard SourceImage in EID 10.'
      Artifacts:
      - 'Sysmon EID 10: beacon host process (e.g., rundll32.exe) accessing lsass.exe'
      - 'Sysmon EID 1: sacrificial process spawned by beacon'
      - 'Sysmon EID 8: CreateRemoteThread into lsass.exe (reflective injection)'
    ChokepointMapping: 'beacon receives task → reflective Mimikatz injection or execute-assembly → handle to lsass.exe from beacon host process → credentials returned to C2'
