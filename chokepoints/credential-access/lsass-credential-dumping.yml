Name: LSASS Credential Dumping
Id: c7df4fc6-05da-4a67-8dfa-efcd8e2420e2
MitreIds:
  - T1003.001
  - T1003
  - T1547.005
Tactics:
  - Credential Access
Techniques:
  - 'OS Credential Dumping: LSASS Memory'
  - OS Credential Dumping
  - 'Boot or Logon Autostart Execution: Security Support Provider'
DetectionPriority: CRITICAL
ThreatPrevalence: VERY HIGH
DetectionDifficulty: MEDIUM
Description: >
  To extract plaintext credentials, NTLM hashes, or Kerberos tickets from a live
  Windows system, an attacker must read the memory of the Local Security Authority
  Subsystem Service (lsass.exe). Windows enforces process isolation at the kernel
  level: any tool that reads another process's memory must first obtain a handle via
  NtOpenProcess with appropriate access rights. This kernel-mediated handle request
  is the chokepoint; it fires regardless of whether the attacker uses Mimikatz,
  nanodump, comsvcs.dll, ProcDump, direct syscalls, or any future tool. Even
  techniques that bypass userland API hooks (ntdll unhooking, direct syscalls) still
  traverse the kernel's ObRegisterCallbacks path, which Sysmon Event ID 10
  (ProcessAccess) and ETW Threat Intelligence consume. The attacker cannot read
  lsass memory without the kernel granting the handle.
LastUpdated: '2026-03-30'
Author: '@NovaSky0x1'

Chokepoints:
  - Stage: Handle Acquisition
    Invariant: Any process must request a handle to lsass.exe with memory-read access rights from the Windows kernel.
    WhyCantBypass: >
      Windows enforces process isolation at the kernel level: NtOpenProcess must be
      called to obtain a handle, and the kernel's ObRegisterCallbacks fires for every
      handle request regardless of whether the caller used standard APIs or direct
      syscalls.
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
      - Windows Security Event ID 4656 (Handle Requested)
      - ETW Microsoft-Windows-Threat-Intelligence (kernel-level telemetry)
    DetectionTier: Research
    SigmaRef: sigma-rules/lsass-credential-dumping/research.yml
  - Stage: Memory Read
    Invariant: The process must read lsass.exe virtual memory to extract credential material using NtReadVirtualMemory or MiniDumpWriteDump.
    WhyCantBypass: >
      Credential material (NTLM hashes, Kerberos tickets, plaintext passwords cached
      by WDigest/SSP) resides in lsass.exe process memory. There is no file or
      registry location that contains the same live credential state.
    LogSources:
      - 'Sysmon Event ID 10 (ProcessAccess: CallTrace field reveals read mechanism)'
      - 'Sysmon Event ID 11 (File Create: dump file written to disk)'
    DetectionTier: Hunt
    SigmaRef: sigma-rules/lsass-credential-dumping/hunt.yml
    BypassNote: >
      Handle duplication (NtDuplicateObject) allows an attacker to clone an existing
      handle to lsass from another process, producing GrantedAccess 0x0040 instead of
      the standard read masks. The hunt rule includes this pattern.
  - Stage: Credential Extraction
    Invariant: The attacker must parse LSASS memory structures or dump file contents to extract usable credentials, producing observable artifacts (either an in-memory read with a suspicious CallTrace, a dump file on disk, or a DLL injected into lsass via SSP).
    WhyCantBypass: >
      Credential structures in lsass memory use Microsoft's internal SSP format.
      The attacker must either parse them in-process (generating the ProcessAccess
      event) or write a dump file for offline parsing (generating a FileCreate event).
      SSP injection (loading a malicious DLL into lsass) generates an ImageLoaded
      event for a DLL outside System32.
    LogSources:
      - 'Sysmon Event ID 10 (ProcessAccess: GrantedAccess + CallTrace correlation)'
      - 'Sysmon Event ID 7 (Image Loaded: SSP DLL injection into lsass)'
      - 'Sysmon Event ID 11 (File Create: dump file artifact)'
      - 'Sysmon Event ID 1 (Process Creation: LOLBin execution)'
    DetectionTier: Analyst
    SigmaRef: sigma-rules/lsass-credential-dumping/analyst.yml

Variations:
  - Name: Mimikatz (sekurlsa::logonpasswords)
    FirstSeen: 2011-Q2
    Status: Active
    SourceURL: https://github.com/gentilkiwi/mimikatz
    Notes: >
      The original and most widely documented LSASS credential dumping tool. Opens
      lsass.exe with PROCESS_ALL_ACCESS (0x1FFFFF) or PROCESS_VM_READ (0x1010).
      Used by virtually every ransomware group and APT. GrantedAccess 0x1010 is the
      classic Mimikatz fingerprint.
    VariantId: mimikatz-sekurlsa
  - Name: comsvcs.dll MiniDump (LOLBin)
    FirstSeen: 2019-Q1
    Status: Active
    SourceURL: https://lolbas-project.github.io/#/OtherMSBinaries/Comsvcs
    Notes: >
      Living-off-the-land technique using rundll32.exe to call the MiniDump export
      from comsvcs.dll (a legitimate Windows DLL). Writes a full process dump of
      lsass.exe to disk. Command pattern: rundll32.exe comsvcs.dll MiniDump <pid>
      <outfile> full. The MiniDump export name is a fixed Windows API; it cannot
      be renamed without recompiling the DLL.
    VariantId: comsvcs-minidump-lolbin
  - Name: ProcDump (Sysinternals)
    FirstSeen: 2016-Q1
    Status: Active
    SourceURL: https://learn.microsoft.com/en-us/sysinternals/downloads/procdump
    Notes: >
      Microsoft Sysinternals tool used legitimately for debugging, repurposed for
      LSASS dumping. Uses MiniDumpWriteDump API (dbgcore.dll/dbghelp.dll in CallTrace).
      Signed by Microsoft, so it bypasses many application whitelisting policies.
    VariantId: procdump-sysinternals
  - Name: Nanodump
    FirstSeen: 2022-Q1
    Status: Active
    SourceURL: https://github.com/fortra/nanodump
    Notes: >
      Minimal LSASS dumper designed to evade detection. Uses direct syscalls, handle
      duplication, and process forking techniques. GrantedAccess patterns vary: 0x0810
      for direct read, 0x0040 for handle duplication mode. Produces UNKNOWN in Sysmon
      CallTrace when using direct syscalls.
    VariantId: nanodump
  - Name: HandleKatz
    FirstSeen: 2021-Q3
    Status: Active
    SourceURL: https://github.com/codewhitesec/HandleKatz
    Notes: >
      Abuses handle duplication to obtain a cloned handle to lsass.exe from another
      process that already holds one. GrantedAccess 0x0040 (PROCESS_DUP_HANDLE).
      Designed to evade detections that only look for direct PROCESS_VM_READ handles.
    VariantId: handlekatz-dup
  - Name: PPLBlade / PPLdump
    FirstSeen: 2022-Q3
    Status: Active
    SourceURL: https://github.com/tastypepperoni/PPLBlade
    Notes: >
      Bypasses Protected Process Light (PPL) protection on lsass.exe by exploiting
      vulnerable signed drivers or ELAM driver abuse. Once PPL is defeated, standard
      dump tools work. Detection shifts to the BYOVD/driver load stage (covered by
      edr-bypass-techniques) plus the subsequent LSASS access event.
    VariantId: pplblade-ppldump
  - Name: Task Manager Manual Dump
    FirstSeen: 2014-Q1
    Status: Active
    Notes: >
      Built-in Windows capability: right-click lsass.exe in Task Manager and select
      "Create dump file." Writes a full memory dump to %TEMP%. Uses 0x1FFFFF
      GrantedAccess from taskmgr.exe. Often used by less sophisticated attackers
      or during hands-on-keyboard intrusions.
    VariantId: task-manager-manual-dump
  - Name: SSP Injection (mimilib / memssp)
    FirstSeen: 2015-Q1
    Status: Active
    SourceURL: https://attack.mitre.org/techniques/T1547/005/
    Notes: >
      Injects a malicious Security Support Provider DLL into lsass.exe via
      AddSecurityPackage API or direct registry manipulation (HKLM\SYSTEM\CCS\Control\Lsa\Security Packages).
      The DLL logs all future authentication events to a file. Sysmon EID 7
      detects the DLL load from a non-System32 path.
    VariantId: ssp-injection-mimilib
  - Name: Direct Syscall Dumpers (SilentProcessExit, MirrorDump, SafetyKatz)
    FirstSeen: 2020-Q2
    Status: Active
    SourceURL: https://github.com/GhostPack/SafetyKatz
    Notes: >
      Family of tools that use direct system calls (syscall stubs) to bypass ntdll.dll
      userland hooks placed by EDR products. The kernel callback (ObRegisterCallbacks)
      still fires, so Sysmon EID 10 still generates, but the CallTrace shows UNKNOWN
      instead of ntdll.dll. MirrorDump uses DLL injection into a process with an
      existing LSASS handle.
    VariantId: direct-syscall-dumpers
  - Name: Pypykatz (Python)
    FirstSeen: 2019-Q3
    Status: Active
    SourceURL: https://github.com/skelsec/pypykatz
    Notes: >
      Pure Python implementation of Mimikatz credential extraction. Can parse LSASS
      memory dumps offline or access live LSASS via ctypes. Cross-platform, works on
      Linux for parsing dump files obtained from Windows. Overlaps with BYOSI chokepoint
      when Python interpreter is brought onto the target.
    VariantId: pypykatz-python
  - Name: Impacket secretsdump.py (Remote)
    FirstSeen: 2016-Q1
    Status: Active
    SourceURL: https://github.com/fortra/impacket
    Notes: >
      Remote credential extraction over SMB. Supports multiple modes: DCSync
      (replicating credentials via DRSUAPI), remote registry SAM/LSA dump, and
      remote LSASS memory read via svcctl service creation. When using the LSASS
      read mode, the service runs on the target and dumps locally. Overlaps with
      the remote-execution-tools chokepoint for the SMB lateral movement stage.
    VariantId: impacket-secretsdump
  - Name: CrackMapExec / NetExec (--lsa, --sam)
    FirstSeen: 2019-Q2
    Status: Active
    SourceURL: https://github.com/Pennyw0rth/NetExec
    Notes: >
      Network-based credential harvesting across multiple hosts. The --lsa and
      --sam flags dump credentials remotely via SMB service creation. The LSASS
      access event occurs on the target host, not the attacker's machine. Used
      heavily in ransomware operations for credential spraying across domains.
    VariantId: crackmapexec-netexec
  - Name: Cobalt Strike (logonpasswords, hashdump)
    FirstSeen: 2014-Q1
    Status: Active
    Notes: >
      Built-in beacon commands for credential theft. logonpasswords injects
      Mimikatz reflectively into memory; hashdump reads the SAM hive. Both
      generate Sysmon EID 10 for the LSASS access. The source process is the
      beacon's host process (often rundll32.exe or a sacrificial process),
      producing a non-standard source path in most deployments.
    VariantId: cobalt-strike-logonpasswords
  - Name: Sliver (creds, sharp-dump)
    FirstSeen: 2020-Q1
    Status: Active
    SourceURL: https://github.com/BishopFox/sliver
    Notes: >
      Open-source C2 framework from BishopFox. Supports credential dumping via
      execute-assembly (loading SharpDump or SharpKatz in-process) and through
      built-in BOF (Beacon Object File) execution. The LSASS access originates
      from the Sliver implant process, which typically runs from a user-writable
      path or injected into a legitimate process.
    VariantId: sliver-creds
  - Name: Havoc (mimikatz, coffloader)
    FirstSeen: 2022-Q3
    Status: Active
    SourceURL: https://github.com/HavocFramework/Havoc
    Notes: >
      Open-source C2 framework with built-in Mimikatz integration and COFFLoader
      for executing credential dumping BOFs. The LSASS access event comes from
      the Havoc demon process. Gaining popularity as a Cobalt Strike alternative
      in both red team and threat actor operations.
    VariantId: havoc-mimikatz
  - Name: Brute Ratel C4 (brc4, credstore)
    FirstSeen: 2022-Q1
    Status: Active
    Notes: >
      Commercial adversary simulation tool that has been adopted by ransomware
      operators (notably BlackCat/ALPHV). Includes built-in credential harvesting
      capabilities. Uses syscall-level evasion techniques similar to nanodump,
      producing UNKNOWN in Sysmon CallTrace. Leaked versions circulate in
      criminal forums.
    VariantId: brute-ratel-credstore
  - Name: Mythic (Athena, Apollo agents)
    FirstSeen: 2020-Q2
    Status: Active
    SourceURL: https://github.com/its-a-feature/Mythic
    Notes: >
      Open-source C2 platform with modular agent architecture. Credential
      dumping is implemented through agent-specific modules (Athena, Apollo)
      that call MiniDumpWriteDump or use direct syscalls. The source process
      varies by agent configuration and injection method.
    VariantId: mythic-agents
  - Name: Dumpert
    FirstSeen: 2019-Q3
    Status: Active
    SourceURL: https://github.com/outflanknl/Dumpert
    Notes: >
      One of the first public tools to use direct system calls for LSASS dumping,
      bypassing ntdll.dll API hooks. Calls NtOpenProcess and NtCreateFile via
      syscall stubs. Produces UNKNOWN in Sysmon CallTrace. Foundational technique
      adopted by nanodump and subsequent evasion tools.
    VariantId: dumpert-direct-syscall
  - Name: SharpKatz / SharpDump (.NET)
    FirstSeen: 2019-Q1
    Status: Active
    SourceURL: https://github.com/GhostPack/SharpDump
    Notes: >
      C# implementations of credential dumping designed for execute-assembly
      workflows in Cobalt Strike, Sliver, and similar frameworks. SharpKatz
      reimplements Mimikatz in .NET; SharpDump creates a minidump of LSASS.
      Both use MiniDumpWriteDump (dbgcore.dll in CallTrace) and run from
      the beacon's process context.
    VariantId: sharpkatz-sharpdump-dotnet
  - Name: Out-Minidump (PowerShell)
    FirstSeen: 2016-Q3
    Status: Declining
    SourceURL: https://github.com/PowerShellMafia/PowerSploit
    Notes: >
      PowerShell-based LSASS dump using .NET P/Invoke to call MiniDumpWriteDump.
      Part of the PowerSploit toolkit. Generates both a PowerShell script block
      log and Sysmon EID 10. Less common now due to AMSI and Script Block Logging
      making PowerShell-based attacks more visible.
    VariantId: out-minidump-powershell
  - Name: LSASS Shtinkering (Process Snapshotting)
    FirstSeen: 2022-Q1
    Status: Emerging
    SourceURL: https://github.com/deepinstinct/Lsass-Shtinkering
    Notes: >
      Uses PssNtCaptureSnapshot to create a snapshot of the LSASS process, then
      reads credentials from the snapshot instead of live memory. The snapshot
      API still requires a handle to lsass.exe, so Sysmon EID 10 fires, but
      the GrantedAccess mask may differ from standard dump patterns. Some EDR
      products do not monitor snapshot operations.
    VariantId: lsass-shtinkering-snapshot
  - Name: Skeleton Key (SSP Backdoor)
    FirstSeen: 2015-Q1
    Status: Active
    SourceURL: https://attack.mitre.org/software/S0007/
    Notes: >
      Variant of SSP injection that patches the LSASS authentication flow to
      accept a universal "skeleton key" password for any domain account. Unlike
      mimilib which logs credentials, Skeleton Key modifies authentication
      in-memory. Detected via Sysmon EID 7 (DLL loaded into lsass from
      non-System32 path) and anomalous Kerberos authentication patterns.
    VariantId: skeleton-key-ssp
  - Name: LaZagne
    FirstSeen: 2015-Q1
    Status: Active
    SourceURL: https://github.com/AlessandroZ/LaZagne
    Notes: >
      Multi-platform credential harvester that extracts passwords from browsers,
      databases, mail clients, Wi-Fi, and LSASS. Uses ctypes on Windows to call
      OpenProcess against lsass.exe. Cross-platform (Python), often deployed
      alongside BYOSI techniques.
    VariantId: lazagne-multi-platform
  - Name: EDRSandBlast (LSASS dump mode)
    FirstSeen: 2022-Q4
    Status: Active
    SourceURL: https://github.com/wavestone-cdt/EDRSandblast
    Notes: >
      Combines BYOVD driver exploitation with LSASS credential dumping in a
      single tool. Loads a vulnerable driver to blind EDR kernel callbacks, then
      dumps LSASS. The driver load is detectable via Sysmon EID 6 (see
      edr-bypass-techniques); the LSASS access still generates EID 10 if Sysmon
      kernel callbacks survive the patching attempt.
    VariantId: edrsandblast-lsass

Prerequisites:
  - The attacker must have local administrator or SYSTEM privileges on the target host (LSASS access requires SeDebugPrivilege or equivalent)
  - LSASS must not be running as a Protected Process Light (PPL), or the attacker must first bypass PPL (see edr-bypass-techniques)
  - Credential Guard (VBS) must not be active, or the attacker must compromise the isolated LSA environment (significantly harder, no known public tools)
  - Sysmon or equivalent kernel-level telemetry must be deployed for chokepoint visibility (Security EID 4656 provides partial coverage without Sysmon)

EvolutionTimeline:
  - Date: 2011-Q2
    Event: Mimikatz released by Benjamin Delpy
    Change: >
      First publicly available tool for extracting plaintext credentials from LSASS
      memory. Used PROCESS_ALL_ACCESS (0x1FFFFF) handle with standard Windows API
      calls through ntdll.dll.
    DetectionImpact: >
      No detection existed. LSASS memory access was not monitored by any standard
      Windows audit configuration. Security products relied on signature-based
      detection of the Mimikatz binary itself.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2016-Q1
    Event: 'LOLBin techniques emerge: ProcDump and comsvcs.dll repurposed for LSASS dumping'
    Change: >
      Attackers shifted from custom tools to Microsoft-signed binaries (procdump.exe,
      rundll32.exe + comsvcs.dll) to bypass application whitelisting and signature
      detection. The dump is written to disk for offline parsing.
    DetectionImpact: >
      Binary signature detection bypassed completely. Detection shifted to process
      creation monitoring for known LOLBin command patterns and file creation events
      for .dmp files in temp directories.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2019-Q2
    Event: Sysmon EID 10 (ProcessAccess) adopted as primary LSASS monitoring source
    Change: >
      Microsoft Sysinternals added ProcessAccess logging to Sysmon, providing
      kernel-level visibility into handle requests targeting lsass.exe. The
      GrantedAccess and CallTrace fields became the foundation for behavioral
      LSASS access detection independent of specific tool signatures.
    DetectionImpact: >
      Transformed LSASS monitoring from signature-based to behavior-based. Defenders
      could now detect any tool accessing LSASS by its access mask and calling
      mechanism rather than its binary name or hash.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2020-Q2
    Event: Direct syscall and ntdll unhooking techniques proliferate
    Change: >
      Tools like SilentProcessExit, MirrorDump, and custom loaders bypass EDR
      userland hooks by making system calls directly to the kernel, skipping
      ntdll.dll entirely. This produces UNKNOWN in Sysmon CallTrace instead of
      the standard ntdll.dll entry.
    DetectionImpact: >
      EDR products relying on ntdll.dll API hooks lost visibility. Sysmon EID 10
      still fires because the kernel ObRegisterCallbacks mechanism operates below
      the userland hook layer. UNKNOWN in CallTrace became a detection signal
      rather than a blind spot.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2021-Q3
    Event: Handle duplication evasion (HandleKatz, nanodump duphandle mode)
    Change: >
      Instead of directly opening lsass.exe, these tools open a different process
      that already holds a handle to lsass, then duplicate that handle via
      NtDuplicateObject. This produces GrantedAccess 0x0040 (PROCESS_DUP_HANDLE)
      rather than the expected 0x1010 or 0x1FFFFF.
    DetectionImpact: >
      Detection rules looking only for PROCESS_VM_READ or PROCESS_ALL_ACCESS missed
      the duplication pattern. Rules updated to include 0x0040 as a suspicious
      GrantedAccess value when targeting lsass.exe from a non-standard source path.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2022-Q3
    Event: PPL bypass tools combine BYOVD with LSASS dumping
    Change: >
      PPLBlade, PPLdump, and similar tools load a vulnerable signed kernel driver
      to disable Protected Process Light on lsass.exe before performing the dump.
      Two-stage attack: driver load (EID 6) precedes LSASS access (EID 10).
    DetectionImpact: >
      PPL protection is defeated before the dump occurs, so the LSASS access event
      appears normal from an access-rights perspective. Detection requires
      correlating the vulnerable driver load with subsequent LSASS access. See
      edr-bypass-techniques for the driver load stage.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2024-Q3
    Event: LSASS credential dumping remains universal across ransomware groups
    Change: >
      Kaspersky, Mandiant, and Cisco Talos reports confirm T1003.001 in 5 of 5
      major ransomware families (BlackBasta, BlackCat, Akira, Qilin, LockBit).
      Tool choice varies (Mimikatz, comsvcs.dll, nanodump, custom tools) but
      the LSASS access event is present in every case.
    DetectionImpact: >
      No new evasion of the kernel-level chokepoint. Tool diversity increased but
      behavioral detection via Sysmon EID 10 remained effective across all variants.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event

EmulationScript:
  File: emulation/lsass-credential-dumping/emulate.ps1
  Language: powershell
  AtomicRef: T1003.001
  Description: Simulates LSASS credential dumping chokepoint stages for detection validation
  SafetyNotes: >
    Run in an isolated lab VM with Sysmon deployed. Requires Administrator privileges.
    Does NOT extract credentials. Opens and immediately closes a handle to lsass.exe
    to generate EID 10 telemetry, simulates comsvcs.dll command line for EID 1, and
    creates a marker .dmp file for EID 11.

Detections:
  - Level: Research
    Description: Baseline all non-system processes accessing lsass.exe with memory-read permissions
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
    Logic: >
      Monitor ProcessAccess events where TargetImage is lsass.exe and GrantedAccess
      includes memory-read flags (0x1010, 0x1FFFFF, 0x1410, 0x0810, 0x0040, 0x1038,
      0x1438, 0x0010). Filter only core OS processes (csrss.exe, services.exe,
      svchost.exe, lsass.exe self-access, lsaiso.exe, wininit.exe, smss.exe,
      winlogon.exe). Everything else, including AV/EDR products, WerFault,
      and Task Manager, appears in this baseline. Run for one week to establish the
      environment-specific set of legitimate LSASS accessors before tuning.
    ExpectedFPRate: High
    UseCase: >
      Detection engineers baselining LSASS access patterns in a new environment.
      Identifies which processes normally touch LSASS to build the environment-specific
      allowlist needed for Hunt and Analyst rules.
    SigmaRule: sigma-rules/lsass-credential-dumping/research.yml

  - Level: Hunt
    Description: LSASS access with suspicious CallTrace, non-standard source path, or LOLBin dump pattern
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
      - Sysmon Event ID 1 (Process Creation)
    Logic: >
      ProcessAccess to lsass.exe with credential-dump access masks WHERE (A) CallTrace
      contains dbgcore.dll or dbghelp.dll (MiniDumpWriteDump, used by comsvcs.dll,
      ProcDump, Out-Minidump) or UNKNOWN (direct syscall / ntdll unhooking), OR (B)
      SourceImage is in a user-writable path (Temp, Downloads, AppData, ProgramData,
      Users\Public), OR (C) Process creation matches LOLBin patterns (rundll32 +
      comsvcs + MiniDump, or procdump targeting lsass). Excludes core OS processes,
      known AV/EDR paths (Program Files\Windows Defender, CrowdStrike, SentinelOne,
      Sophos, etc.), and WerFault.
    ExpectedFPRate: Medium
    UseCase: >
      Active threat hunting for credential dumping. Periodic sweeps during incident
      response or campaign investigations. CallTrace analysis separates legitimate
      security product access from dump tooling behavior.
    SigmaRule: sigma-rules/lsass-credential-dumping/hunt.yml

  - Level: Analyst
    Description: Non-standard process accessing LSASS with dump mechanism fingerprint and credential-dump access rights
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
    Logic: >
      ProcessAccess to lsass.exe with credential-dump access mask (0x1FFFFF,
      0x1010, 0x1410, 0x0810, 0x1038, 0x1438) AND CallTrace shows
      MiniDumpWriteDump (dbgcore.dll, dbghelp.dll) or direct syscall (UNKNOWN)
      AND source process is outside System32 and Program Files. This triple-AND
      eliminates virtually all legitimate LSASS access; AV/EDR runs from Program
      Files with clean CallTraces. A secondary selection covers handle duplication
      (GrantedAccess 0x0040) targeting lsass from non-standard paths, catching the
      HandleKatz and nanodump duphandle evasion technique. Supplementary detections
      for comsvcs.dll MiniDump LOLBin (process_creation), SSP injection
      (image_load), and dump file artifacts (file_event) should be deployed as
      companion SIEM rules for additional coverage across event types.
    ExpectedFPRate: Low
    UseCase: >
      Automated SOC alerting. Direct escalation to Tier 2/IR. If this fires,
      assume credential compromise and begin containment (isolate host, reset
      exposed credentials, check for lateral movement via pass-the-hash).
    SigmaRule: sigma-rules/lsass-credential-dumping/analyst.yml

Intel:
  - Name: 'MITRE ATT&CK: T1003.001, OS Credential Dumping: LSASS Memory'
    Tier: primary
    URL: https://attack.mitre.org/techniques/T1003/001/
    Description: >
      Primary technique definition. Documents real-world procedures by Mimikatz,
      ProcDump, Windows Task Manager, and comsvcs.dll. Lists mitigations including
      Credential Guard and PPL.
  - Name: 'Microsoft: Credential Guard Overview'
    Tier: supporting
    URL: https://learn.microsoft.com/en-us/windows/security/identity-protection/credential-guard/
    Description: >
      Microsoft's documentation on Credential Guard (Virtualization Based Security).
      When deployed, isolates LSASS credential material into a separate virtual
      machine, preventing direct memory read attacks entirely. The chokepoint
      detection remains relevant for environments without Credential Guard.
  - Name: 'Sysmon: Event ID 10 ProcessAccess'
    Tier: supporting
    URL: https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon
    Description: >
      Sysmon documentation covering ProcessAccess event generation. Critical for
      understanding GrantedAccess masks, CallTrace format, and configuration
      requirements for LSASS monitoring.
  - Name: 'Fortra: Nanodump'
    Tier: supporting
    URL: https://github.com/fortra/nanodump
    Description: >
      Source code for nanodump, a minimal LSASS dumper demonstrating direct syscall,
      handle duplication, and process forking evasion techniques. Essential reference
      for understanding modern credential dump evasion and why GrantedAccess 0x0040
      and UNKNOWN CallTrace patterns must be included in detection rules.

