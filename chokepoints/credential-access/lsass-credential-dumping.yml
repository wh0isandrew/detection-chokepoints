      workflows in Cobalt Strike, Sliver, and similar frameworks. SharpKatz
      reimplements Mimikatz in .NET; SharpDump creates a minidump of LSASS.
      Both use MiniDumpWriteDump (dbgcore.dll in CallTrace) and run from
      the beacon's process context.
    VariantId: sharpkatz-sharpdump-dotnet
    Command:
      Invocation: "# SharpDump (minidump):\nSharpDump.exe\n# SharpKatz (in-memory parse):\nSharpKatz.exe --Command logonpasswords\n# Typically via execute-assembly in C2:\nexecute-assembly SharpDump.exe"
      Context: 'C# implementations designed for execute-assembly workflows in Cobalt Strike, Sliver, and similar frameworks. Both use MiniDumpWriteDump (dbgcore.dll in CallTrace) and run from the beacon process context.'
      Artifacts:
      - 'Sysmon EID 10: beacon/host process accessing lsass.exe, CallTrace contains dbgcore.dll'
      - 'Sysmon EID 11: .dmp file written (SharpDump writes to %TEMP% with .bin extension)'
      - 'Sysmon EID 1: .NET assembly loaded in-process (no new process for execute-assembly)'
    ChokepointMapping: 'execute-assembly loads .NET tool in beacon process → MiniDumpWriteDump called (dbgcore.dll in CallTrace) → handle to lsass.exe → dump written or parsed in-memory'
  - Name: Out-Minidump (PowerShell)
    FirstSeen: 2016-Q3
    Status: Declining
    SourceURL: https://github.com/PowerShellMafia/PowerSploit
    Notes: >
      PowerShell-based LSASS dump using .NET P/Invoke to call MiniDumpWriteDump.
      Part of the PowerSploit toolkit. Generates both a PowerShell script block
      log and Sysmon EID 10. Less common now due to AMSI and Script Block Logging
      making PowerShell-based attacks more visible.
    VariantId: out-minidump-powershell
    Command:
      Invocation: "# PowerSploit:\nImport-Module .\\Out-Minidump.ps1\nGet-Process lsass | Out-Minidump -DumpFilePath C:\\Windows\\Temp\\lsass.dmp"
      Context: 'PowerShell-based dump using .NET P/Invoke to call MiniDumpWriteDump. Part of PowerSploit toolkit. Declining use due to AMSI and Script Block Logging making PowerShell attacks more visible.'
      Artifacts:
      - 'Sysmon EID 10: powershell.exe accessing lsass.exe, CallTrace contains dbgcore.dll'
      - 'PowerShell Script Block Log (EID 4104): Out-Minidump function and MiniDumpWriteDump P/Invoke'
      - 'Sysmon EID 11: .dmp file created'
    ChokepointMapping: 'powershell.exe loads Out-Minidump → P/Invoke calls MiniDumpWriteDump → handle to lsass.exe (dbgcore.dll in CallTrace) → dump written to disk'
  - Name: LSASS Shtinkering (Process Snapshotting)
    FirstSeen: 2022-Q1
    Status: Emerging
    SourceURL: https://github.com/deepinstinct/Lsass-Shtinkering
    Notes: >
      Uses PssNtCaptureSnapshot to create a snapshot of the LSASS process, then
      reads credentials from the snapshot instead of live memory. The snapshot
      API still requires a handle to lsass.exe, so Sysmon EID 10 fires, but
      the GrantedAccess mask may differ from standard dump patterns. Some EDR
      products do not monitor snapshot operations.
    VariantId: lsass-shtinkering-snapshot
    Command:
      Invocation: 'LsassShtinkering.exe --output C:\Windows\Temp\snapshot.dmp'
      Context: 'Uses PssNtCaptureSnapshot to create a snapshot of LSASS, then reads credentials from the snapshot. Snapshot API still requires a handle to lsass.exe (EID 10 fires), but GrantedAccess mask may differ from standard dump patterns. Some EDR products do not monitor snapshot operations.'
      Artifacts:
      - 'Sysmon EID 10: process accessing lsass.exe with non-standard GrantedAccess for snapshot'
      - 'Sysmon EID 1: tool binary from user-writable path'
      - 'Sysmon EID 11: snapshot dump file written to disk'
    ChokepointMapping: 'tool launched → PssNtCaptureSnapshot requires handle to lsass.exe (EID 10) → snapshot created → credentials parsed from snapshot'
  - Name: Skeleton Key (SSP Backdoor)
    FirstSeen: 2015-Q1
    Status: Active
    SourceURL: https://attack.mitre.org/software/S0007/
    Notes: >
      Variant of SSP injection that patches the LSASS authentication flow to
      accept a universal "skeleton key" password for any domain account. Unlike
      mimilib which logs credentials, Skeleton Key modifies authentication
      in-memory. Detected via Sysmon EID 7 (DLL loaded into lsass from
      non-System32 path) and anomalous Kerberos authentication patterns.
    VariantId: skeleton-key-ssp
    Command:
      Invocation: "# Mimikatz Skeleton Key:\nmisc::skeleton\n# Patches LSASS in-memory to accept master password for any domain account"
      Context: 'Patches the LSASS authentication flow to accept a universal skeleton key password. Unlike mimilib which logs credentials, Skeleton Key modifies authentication in-memory. Detected via DLL injection into lsass and anomalous Kerberos patterns.'
      Artifacts:
      - 'Sysmon EID 7: DLL loaded into lsass.exe from non-System32 path'
      - 'Sysmon EID 10: process accessing lsass.exe for in-memory patching'
      - 'Security EID 4769: anomalous Kerberos TGS requests using skeleton key'
    ChokepointMapping: 'tool injects into lsass.exe (EID 7) → authentication flow patched in-memory → skeleton key password accepted for any account → detected via anomalous Kerberos patterns'
  - Name: LaZagne
    FirstSeen: 2015-Q1
    Status: Active
    SourceURL: https://github.com/AlessandroZ/LaZagne
    Notes: >
      Multi-platform credential harvester that extracts passwords from browsers,
      databases, mail clients, Wi-Fi, and LSASS. Uses ctypes on Windows to call
      OpenProcess against lsass.exe. Cross-platform (Python), often deployed
      alongside BYOSI techniques.
    VariantId: lazagne-multi-platform
    Command:
      Invocation: "# All credentials including LSASS:\nlaZagne.exe all\n# LSASS-specific:\nlaZagne.exe windows -m lsa_secrets"
      Context: 'Multi-platform credential harvester. Uses ctypes on Windows to call OpenProcess against lsass.exe. Cross-platform (Python), often deployed alongside BYOSI techniques. Extracts passwords from browsers, databases, mail clients, Wi-Fi, and LSASS.'
      Artifacts:
      - 'Sysmon EID 10: laZagne.exe or python.exe accessing lsass.exe'
      - 'Sysmon EID 1: laZagne binary or Python interpreter from user-writable path'
      - 'Sysmon EID 11: credential output file if using -oN or -oJ flags'
    ChokepointMapping: 'laZagne launched → OpenProcess via ctypes → handle to lsass.exe → credentials parsed from multiple sources including LSASS'
  - Name: EDRSandBlast (LSASS dump mode)
    FirstSeen: 2022-Q4
    Status: Active
    SourceURL: https://github.com/wavestone-cdt/EDRSandblast
    Notes: >
      Combines BYOVD driver exploitation with LSASS credential dumping in a
      single tool. Loads a vulnerable driver to blind EDR kernel callbacks, then
      dumps LSASS. The driver load is detectable via Sysmon EID 6 (see
      edr-bypass-techniques); the LSASS access still generates EID 10 if Sysmon
      kernel callbacks survive the patching attempt.
    VariantId: edrsandblast-lsass
    Command:
      Invocation: "EDRSandblast.exe --usermode --kernelmode --dump-lsass\n# Loads vulnerable driver, patches EDR callbacks, then dumps LSASS"
      Context: 'Combines BYOVD driver exploitation with LSASS dumping in a single tool. Loads a vulnerable driver to blind EDR kernel callbacks, then dumps LSASS. Two-stage detection: driver load (EID 6) then LSASS access (EID 10 if callbacks survive).'
      Artifacts:
      - 'Sysmon EID 6: vulnerable driver loaded (e.g., RTCore64.sys, DBUtil_2_3.sys)'
      - 'Sysmon EID 10: LSASS access (if kernel callbacks survive the patching attempt)'
      - 'Sysmon EID 11: dump file written to disk'
    ChokepointMapping: 'vulnerable driver loaded (EID 6) → EDR kernel callbacks patched → handle to lsass.exe (EID 10 if Sysmon survives) → dump written to disk'

Prerequisites:
  - The attacker must have local administrator or SYSTEM privileges on the target host (LSASS access requires SeDebugPrivilege or equivalent)
  - LSASS must not be running as a Protected Process Light (PPL), or the attacker must first bypass PPL (see edr-bypass-techniques)
  - Credential Guard (VBS) must not be active, or the attacker must compromise the isolated LSA environment (significantly harder, no known public tools)
  - Sysmon or equivalent kernel-level telemetry must be deployed for chokepoint visibility (Security EID 4656 provides partial coverage without Sysmon)

AttackerControls:
- Choice of dump tool (Mimikatz, nanodump, comsvcs.dll, custom)
- Access mask requested (0x1010, 0x1FFFFF, 0x0040, etc.)
- API path (standard API, direct syscall, handle duplication)
- Dump method (live parse, MiniDumpWriteDump, process forking)
- Staging location for the dump tool

AttackerCannotControl:
- Must obtain a kernel-mediated handle to lsass.exe
- Kernel ObRegisterCallbacks fires regardless of API path
- Sysmon EID 10 captures the handle request at kernel level
- Credential material only exists in lsass.exe process memory

EvolutionTimeline:
  - Date: 2011-Q2
    Event: Mimikatz released by Benjamin Delpy
    Change: >
      First publicly available tool for extracting plaintext credentials from LSASS
      memory. Used PROCESS_ALL_ACCESS (0x1FFFFF) handle with standard Windows API
      calls through ntdll.dll.
    DetectionImpact: >
      No detection existed. LSASS memory access was not monitored by any standard
      Windows audit configuration. Security products relied on signature-based
      detection of the Mimikatz binary itself.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2016-Q1
    Event: 'LOLBin techniques emerge: ProcDump and comsvcs.dll repurposed for LSASS dumping'
    Change: >
      Attackers shifted from custom tools to Microsoft-signed binaries (procdump.exe,
      rundll32.exe + comsvcs.dll) to bypass application whitelisting and signature
      detection. The dump is written to disk for offline parsing.
    DetectionImpact: >
      Binary signature detection bypassed completely. Detection shifted to process
      creation monitoring for known LOLBin command patterns and file creation events
      for .dmp files in temp directories.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2019-Q2
    Event: Sysmon EID 10 (ProcessAccess) adopted as primary LSASS monitoring source
    Change: >
      Microsoft Sysinternals added ProcessAccess logging to Sysmon, providing
      kernel-level visibility into handle requests targeting lsass.exe. The
      GrantedAccess and CallTrace fields became the foundation for behavioral
      LSASS access detection independent of specific tool signatures.
    DetectionImpact: >
      Transformed LSASS monitoring from signature-based to behavior-based. Defenders
      could now detect any tool accessing LSASS by its access mask and calling
      mechanism rather than its binary name or hash.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2020-Q2
    Event: Direct syscall and ntdll unhooking techniques proliferate
    Change: >
      Tools like SilentProcessExit, MirrorDump, and custom loaders bypass EDR
      userland hooks by making system calls directly to the kernel, skipping
      ntdll.dll entirely. This produces UNKNOWN in Sysmon CallTrace instead of
      the standard ntdll.dll entry.
    DetectionImpact: >
      EDR products relying on ntdll.dll API hooks lost visibility. Sysmon EID 10
      still fires because the kernel ObRegisterCallbacks mechanism operates below
      the userland hook layer. UNKNOWN in CallTrace became a detection signal
      rather than a blind spot.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2021-Q3
    Event: Handle duplication evasion (HandleKatz, nanodump duphandle mode)
    Change: >
      Instead of directly opening lsass.exe, these tools open a different process
      that already holds a handle to lsass, then duplicate that handle via
      NtDuplicateObject. This produces GrantedAccess 0x0040 (PROCESS_DUP_HANDLE)
      rather than the expected 0x1010 or 0x1FFFFF.
    DetectionImpact: >
      Detection rules looking only for PROCESS_VM_READ or PROCESS_ALL_ACCESS missed
      the duplication pattern. Rules updated to include 0x0040 as a suspicious
      GrantedAccess value when targeting lsass.exe from a non-standard source path.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2022-Q3
    Event: PPL bypass tools combine BYOVD with LSASS dumping
    Change: >
      PPLBlade, PPLdump, and similar tools load a vulnerable signed kernel driver
      to disable Protected Process Light on lsass.exe before performing the dump.
      Two-stage attack: driver load (EID 6) precedes LSASS access (EID 10).
    DetectionImpact: >
      PPL protection is defeated before the dump occurs, so the LSASS access event
      appears normal from an access-rights perspective. Detection requires
      correlating the vulnerable driver load with subsequent LSASS access. See
      edr-bypass-techniques for the driver load stage.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event
  - Date: 2024-Q3
    Event: LSASS credential dumping remains universal across ransomware groups
    Change: >
      Kaspersky, Mandiant, and Cisco Talos reports confirm T1003.001 in 5 of 5
      major ransomware families (BlackBasta, BlackCat, Akira, Qilin, LockBit).
      Tool choice varies (Mimikatz, comsvcs.dll, nanodump, custom tools) but
      the LSASS access event is present in every case.
    DetectionImpact: >
      No new evasion of the kernel-level chokepoint. Tool diversity increased but
      behavioral detection via Sysmon EID 10 remained effective across all variants.
    TheConstant: A process must open a handle to lsass.exe and read its virtual memory
    Variants: []
    EventType: event

EmulationScript:
  File: emulation/lsass-credential-dumping/emulate.ps1
  Language: powershell
  AtomicRef: T1003.001
  Description: Simulates LSASS credential dumping chokepoint stages for detection validation
  SafetyNotes: >
    Run in an isolated lab VM with Sysmon deployed. Requires Administrator privileges.
    Does NOT extract credentials. Opens and immediately closes a handle to lsass.exe
    to generate EID 10 telemetry, simulates comsvcs.dll command line for EID 1, and
    creates a marker .dmp file for EID 11.

Detections:
  - Level: Research
    Description: Baseline all non-system processes accessing lsass.exe with memory-read permissions
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
    Logic: >
      Monitor ProcessAccess events where TargetImage is lsass.exe and GrantedAccess
      includes memory-read flags (0x1010, 0x1FFFFF, 0x1410, 0x0810, 0x0040, 0x1038,
      0x1438, 0x0010). Filter only core OS processes (csrss.exe, services.exe,
      svchost.exe, lsass.exe self-access, lsaiso.exe, wininit.exe, smss.exe,
      winlogon.exe). Everything else, including AV/EDR products, WerFault,
      and Task Manager, appears in this baseline. Run for one week to establish the
      environment-specific set of legitimate LSASS accessors before tuning.
    ExpectedFPRate: High
    UseCase: >
      Detection engineers baselining LSASS access patterns in a new environment.
      Identifies which processes normally touch LSASS to build the environment-specific
      allowlist needed for Hunt and Analyst rules.
    SigmaRule: sigma-rules/lsass-credential-dumping/research.yml

  - Level: Hunt
    Description: LSASS access with suspicious CallTrace, non-standard source path, or LOLBin dump pattern
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
      - Sysmon Event ID 1 (Process Creation)
    Logic: >
      ProcessAccess to lsass.exe with credential-dump access masks WHERE (A) CallTrace
      contains dbgcore.dll or dbghelp.dll (MiniDumpWriteDump, used by comsvcs.dll,
      ProcDump, Out-Minidump) or UNKNOWN (direct syscall / ntdll unhooking), OR (B)
      SourceImage is in a user-writable path (Temp, Downloads, AppData, ProgramData,
      Users\Public), OR (C) Process creation matches LOLBin patterns (rundll32 +
      comsvcs + MiniDump, or procdump targeting lsass). Excludes core OS processes,
      known AV/EDR paths (Program Files\Windows Defender, CrowdStrike, SentinelOne,
      Sophos, etc.), and WerFault.
    ExpectedFPRate: Medium
    UseCase: >
      Active threat hunting for credential dumping. Periodic sweeps during incident
      response or campaign investigations. CallTrace analysis separates legitimate
      security product access from dump tooling behavior.
    SigmaRule: sigma-rules/lsass-credential-dumping/hunt.yml

  - Level: Analyst
    Description: Non-standard process accessing LSASS with dump mechanism fingerprint and credential-dump access rights
    LogSources:
      - Sysmon Event ID 10 (ProcessAccess)
    Logic: >
      ProcessAccess to lsass.exe with credential-dump access mask (0x1FFFFF,
      0x1010, 0x1410, 0x0810, 0x1038, 0x1438) AND CallTrace shows
      MiniDumpWriteDump (dbgcore.dll, dbghelp.dll) or direct syscall (UNKNOWN)
      AND source process is outside System32 and Program Files. This triple-AND
      eliminates virtually all legitimate LSASS access; AV/EDR runs from Program
      Files with clean CallTraces. A secondary selection covers handle duplication
      (GrantedAccess 0x0040) targeting lsass from non-standard paths, catching the
      HandleKatz and nanodump duphandle evasion technique. Supplementary detections
      for comsvcs.dll MiniDump LOLBin (process_creation), SSP injection
      (image_load), and dump file artifacts (file_event) should be deployed as
      companion SIEM rules for additional coverage across event types.
    ExpectedFPRate: Low
    UseCase: >
      Automated SOC alerting. Direct escalation to Tier 2/IR. If this fires,
      assume credential compromise and begin containment (isolate host, reset
      exposed credentials, check for lateral movement via pass-the-hash).
    SigmaRule: sigma-rules/lsass-credential-dumping/analyst.yml

Intel:
  - Name: 'MITRE ATT&CK: T1003.001, OS Credential Dumping: LSASS Memory'
    Tier: primary
    URL: https://attack.mitre.org/techniques/T1003/001/
    Description: >
      Primary technique definition. Documents real-world procedures by Mimikatz,
      ProcDump, Windows Task Manager, and comsvcs.dll. Lists mitigations including
      Credential Guard and PPL.
  - Name: 'Microsoft: Credential Guard Overview'
    Tier: supporting
    URL: https://learn.microsoft.com/en-us/windows/security/identity-protection/credential-guard/
    Description: >
      Microsoft's documentation on Credential Guard (Virtualization Based Security).
      When deployed, isolates LSASS credential material into a separate virtual
      machine, preventing direct memory read attacks entirely. The chokepoint
      detection remains relevant for environments without Credential Guard.
  - Name: 'Sysmon: Event ID 10 ProcessAccess'
    Tier: supporting
    URL: https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon
    Description: >
      Sysmon documentation covering ProcessAccess event generation. Critical for
      understanding GrantedAccess masks, CallTrace format, and configuration
      requirements for LSASS monitoring.
  - Name: 'Fortra: Nanodump'
    Tier: supporting
    URL: https://github.com/fortra/nanodump
    Description: >
      Source code for nanodump, a minimal LSASS dumper demonstrating direct syscall,
      handle duplication, and process forking evasion techniques. Essential reference
      for understanding modern credential dump evasion and why GrantedAccess 0x0040
      and UNKNOWN CallTrace patterns must be included in detection rules.

