- Type: Sysmon
  EventId: 8
  Source: Microsoft-Windows-Sysmon/Operational
  Description: CryptUnprotectData API call observed via Sysmon API monitoring. DPAPI decryption of harvested credentials.
  MatchedRules:
  - Hunt
  Sample: 'EventID: 8 (CreateRemoteThread), or via API monitoring:

    UtcTime: 2024-09-14 03:17:43.108

    ProcessGuid: {a1b2c3d4-1234-5678-abcd-ef0123456789}

    ProcessId: 4832

