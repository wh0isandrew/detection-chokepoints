EmulationScript:
  File: emulation/browser-credential-theft/emulate.ps1
  Language: powershell
  Description: Simulates infostealer browser credential access patterns for detection validation
  SafetyNotes: Run in an isolated lab VM only. Creates temporary files and outbound network activity.
  AtomicRef: T1555.003
TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
PreventionSummary: >
  Prevention focuses on blocking the initial code execution that delivers the stealer and
  enforcing MFA so stolen credentials cannot be replayed. Controlling which browser extensions
  are permitted removes a harvesting class that bypasses file-access monitoring entirely.
PreventionOpportunities:
- Category: Endpoint
  Control: Block execution of binaries downloaded to Temp or Downloads directories
  Impact: Prevents infostealers from running before they touch credential databases; effective
    regardless of stealer family or App-Bound Encryption bypass technique.
- Category: Identity
  Control: Enforce phishing-resistant MFA (FIDO2 / hardware keys) on all sensitive applications
  Impact: Stolen passwords and session cookies have limited replay value; removes the primary
    incentive for credential theft campaigns targeting enterprise accounts.
- Category: Endpoint · Application Control
  Control: Restrict unauthorized browser extensions across your fleet
  Impact: Eliminates extension-based credential harvesting, which bypasses file-access
    monitoring entirely and is invisible to most host-based detection telemetry.
  MagicSwordFit: MagicSword can enforce browser extension allow-lists, blocking unauthorized
    extensions that harvest credentials directly through the browser's own APIs.
  MagicSwordTag: browser-extensions
