  - Hunt
  Sample: 'EventID: 11 (FileCreate)

    UtcTime: 2024-09-14 03:17:42.381

    ProcessGuid: {a1b2c3d4-1234-5678-abcd-ef0123456789}

    ProcessId: 4832

    Image: C:\Users\jsmith\AppData\Local\Temp\ChromeUpdate.exe

    TargetFilename: C:\Users\jsmith\AppData\Local\Temp\lg.db

    CreationUtcTime: 2024-09-14 03:17:42.381

    # Key signal: Non-browser process (ChromeUpdate.exe from Temp) creating a copy
    # of a browser credential database file. The filename lg.db is a common stealer
    # convention for Login Data copies.

    '
