Prerequisites:
- Code execution on victim machine (via ClickFix, malvertising, cracked software, game cheats, SEO poisoning, YouTube malware,
  or social engineering)
- Target must use a Chromium-based browser (Chrome, Edge, Brave, Opera, etc.) or Firefox
- Browser credential database files must be accessible (not locked by exclusive handle; Chrome Login Data is typically not
  exclusively locked)
- For App-Bound Encryption bypass variants: Chrome must be installed (COM elevation requires GoogleChromeElevationService);
    OR Chrome must be running (CDP bypass); OR stealer must have code injection capability (memory injection bypass)
- Outbound network access for C2 exfiltration (though some variants stage locally and exfiltrate via separate channel)
Chokepoints:
- Stage: Credential Database Access
  Input: Stealer process is running on the victim machine
  Invariant: Must open browser credential database files (Login Data, Cookies, Local State, logins.json).
    These are the only locations where browser credentials are stored.
  Observable: 'Sysmon EID 11 (FileCreate; stealer copies credential DB to temp) or Windows Security
    EID 4663 (Object Access audit) showing a non-browser process accessing Chrome/Edge/Firefox credential files'
  WhyCantBypass: Browser credentials only exist in these database files. The stealer must read them.
    There is no alternative path to the credentials.
  LogSources:
  - Sysmon Event ID 10 (Process Access)
  - Sysmon Event ID 11 (File Created/Accessed)
  - Windows Security Event ID 4663 (Object Access)
  DetectionTier: Hunt
  SigmaRef: sigma-rules/browser-credential-theft/hunt.yml
- Stage: Credential Decryption
  Input: Credential database content has been read
  Invariant: Must invoke platform decryption APIs. CryptUnprotectData() (DPAPI) for Chromium browsers,
    NSS3 decryption for Firefox, or an App-Bound Encryption bypass technique
  Observable: 'CryptUnprotectData calls from non-browser processes. Chrome Elevation Service COM interface
    activation. Chrome DevTools Protocol connections to running Chrome instances (CDP bypass).'
  WhyCantBypass: The credentials are encrypted at rest. The stealer must decrypt them to extract usable passwords.
    The decryption API call is the artifact.
  LogSources:
  - ETW DPAPI provider
  - Sysmon Event ID 1 (Process Creation for COM/CDP bypass processes)
  - Windows Security Event ID 4688
  DetectionTier: Analyst
  SigmaRef: sigma-rules/browser-credential-theft/analyst.yml
- Stage: Data Exfiltration
  Input: Credentials have been decrypted and collected
  Invariant: Must exfiltrate the harvested data to attacker infrastructure
  Observable: 'Outbound HTTP POST to low-reputation domains, Telegram bot API calls, Discord webhook POSTs
    from non-standard processes. Large data transfers from processes that recently accessed credential databases.'
  WhyCantBypass: Stolen credentials are worthless if they stay on the victim machine. The exfiltration
    connection is the artifact.
  LogSources:
  - Sysmon Event ID 3 (Network Connection)
  - Sysmon Event ID 22 (DNS Query)
  - Web proxy logs
  DetectionTier: Research
  SigmaRef: sigma-rules/browser-credential-theft/research.yml
EvolutionTimeline:
- Date: 2018-2020
  Event: Vidar, AZORult, and Raccoon v1 establish the modern infostealer template
  Change: 'Stealer-as-a-Service model emerges; credential harvesting from browser SQLite databases (Chrome Login Data, Firefox
    logins.json) becomes standardized. DPAPI decryption via CryptUnprotectData() is the universal Chromium decryption method.
    Browser-stored credential theft becomes a commodity capability available to non-technical attackers.

    '
  DetectionImpact: 'File access monitoring for browser credential databases (Login Data, Cookies) becomes possible but generates
    high volume from legitimate browser activity. Process-based filtering (non-browser processes accessing browser files)
    emerges as the primary signal.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
  Variants: []
  EventType: event
- Date: 2020-2022
  Event: RedLine dominates; stealer market fragments into dozens of MaaS offerings
  Change: 'RedLine Stealer launches January 2020 and rapidly dominates with low price point ($100-200/month) and comprehensive
    browser coverage. Market fragments: Vidar, Raccoon, Mars, META, Typhon, and 20+ competitors emerge. NSA/CISA begin tracking
    infostealers as a distinct threat category. Enterprise credential theft accelerates; breach brokers emerge as a distinct
    role in the cybercrime economy.

    '
  DetectionImpact: 'File hash-based detection fails as variants proliferate weekly. Behavioral detection of non-browser processes
    opening browser credential files gains adoption in EDR platforms. DPAPI call monitoring (CryptUnprotectData) emerges as
    a secondary signal.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
  Variants: []
  EventType: event
- Date: 2022-2023
  Event: Raccoon v2 and Stealc launch; LummaC2 enters the market
  Change: 'Raccoon v2 (June 2022) demonstrates rapid reconstitution after law enforcement action. Stealc (January 2023) introduces
    modular architecture. LummaC2 begins rapid market share growth. Multi-stage loaders (GuLoader, PrivateLoader) become the
    primary delivery mechanism, complicating attribution. macOS infostealers emerge with AMOS (April 2023), extending the
    threat to non-Windows environments.

    '
  DetectionImpact: 'Loader-based delivery complicates process lineage detection (parent may be legitimate software). Cross-platform
    detection required as macOS stealers adopt same file-access patterns. Process injection techniques begin emerging to complicate
    parent-child attribution.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
  Variants: []
  EventType: event
- Date: 2024-Q2
  Event: 'Snowflake breach: infostealer credentials enable access to 160+ organizations'
  Change: 'UNC5537 uses credentials harvested by VIDAR, RISEPRO, REDLINE, RACCOON, LUMMA, and METASTEALER from contractor
    machines to access Snowflake cloud environments. No MFA, no network allowlisting. Credentials alone were sufficient.
    Victims include Ticketmaster (560M records), AT&T (109M call records), Advance Auto Parts, LendingTree, and 155+ others.
    Demonstrates infostealers as an enterprise security problem, not just consumer credential theft.

    '
  DetectionImpact: 'Enterprise focus on "impossible travel" detection for cloud console access. Credential monitoring services
    gain enterprise adoption. MFA enforcement becomes urgent response; behavioral anomaly detection for cloud access gains
    priority.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
  Variants: []
  EventType: event
- Date: 2024-Q3
  Event: Chrome App-Bound Encryption (July 2024); bypassed within ~45 days
  Change: 'Google introduces App-Bound Encryption in Chrome 127 (released July 2024), encrypting cookie/credential databases
    with a key tied to the Chrome application identity, preventing decryption by other processes using standard DPAPI. Multiple
    stealers immediately begin research. First bypass via COM elevation to GoogleChromeElevationService documented September
    2024. CDP-based bypass (EDDIESTEALER) and memory injection (Vidar 2.0) follow within months.

    '
  DetectionImpact: 'App-Bound Encryption forces stealers to generate new observable behaviors: COM elevation calls to GoogleChromeElevationService,
    Chrome debug mode activation, or injection into chrome.exe. All of these create additional detection opportunities. DPAPI
    call still occurs in all bypass variants; the invariant is preserved.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
  Variants: []
  EventType: event
- Date: 2024-Q4
  Event: RedLine and META Stealer disrupted (Operation Magnus); LummaC2 reaches 51% market share
  Change: 'October 2024: Europol Operation Magnus disrupts RedLine and META Stealer infrastructure; arrests in multiple countries.
    Raccoon Stealer administrator pleads guilty. Market consolidates around LummaC2 and Stealc. Enterprise credential presence
    in infostealers reaches 14% of infections (up from 6% in early 2024), demonstrating a shift toward higher-value targeting.

    '
  DetectionImpact: 'Law enforcement disruption has limited sustained impact. New variants emerge within weeks of each takedown.
    File-based and hash-based IOC sharing becomes less effective as market fragments. Behavioral detection of the invariant
    (file access + DPAPI call) remains the only durable detection approach.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
  Variants: []
  EventType: event
- Date: 2025-Q1
