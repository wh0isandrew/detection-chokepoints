    '
- Name: MITRE ATT&CK — T1539 Steal Web Session Cookie
  URL: https://attack.mitre.org/techniques/T1539/
  Description: 'Secondary technique covering session cookie theft for MFA bypass.
    Directly related to infostealer cookie database access (Chrome Cookies file).
    Cookie theft enables account takeover without re-authentication even after password
    reset.

    '
