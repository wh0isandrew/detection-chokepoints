Name: Infostealer Browser Credential Theft
Id: 22a05d2a-556f-48e3-9097-d2603839c7f2
MitreIds:
- T1555.003
- T1539
- T1041
Tactics:
- Credential Access
- Collection
- Exfiltration
Techniques:
- 'Credentials from Password Stores: Credentials from Web Browsers'
- Steal Web Session Cookie
- Exfiltration Over C2 Channel
DetectionPriority: CRITICAL
ThreatPrevalence: HIGH
DetectionDifficulty: MEDIUM
Description: 'Infostealers systematically harvest credentials, cookies, and autofill
  data from browser credential databases — the single invariant behavior across all
  stealer families regardless of obfuscation or bypass technique. Hudson Rock tracks
  30+ million infected computers; 1.8 billion credentials were stolen in 2025 alone,
  with enterprise credentials present in 14% of infections (up from 6% in early 2024).
  The Snowflake breach (2024) demonstrated downstream impact: UNC5537 used infostealer-harvested
  credentials for initial access to 160+ organizations. LummaC2 (51% of dark web credential
  logs before its May 2025 takedown), Stealc, RedLine, Raccoon, Vidar, AMOS, and Medusa
  all share the invariant: the stealer process must open browser credential files
  (Login Data, Cookies, logins.json) and invoke CryptUnprotectData() or NSS3 decryption
  — a kernel-observable event regardless of family or Chrome App-Bound Encryption
  bypass technique used.

  '
LastUpdated: '2026-03-15'
Author: '@iimp0ster'
Variations:
- Name: LummaC2
  FirstSeen: 2022-Q4
  Status: Disrupted (May 2025) / Active (rebrand expected)
  Notes: 'The dominant infostealer MaaS of 2024-2025, representing 51% of all dark
    web credential logs at peak. Disrupted in May 2025 via FBI/Europol joint operation.
    Delivered primarily via ClickFix (517% surge in 2025 ClickFix attacks) and malvertising.
    Targets 50+ Chromium-based browsers, Firefox profiles, cryptocurrency wallets,
    and 2FA applications. Despite law enforcement disruption, successor variants and
    rebrands are anticipated based on historical patterns (Raccoon v1 → v2, RedLine
    → successors, etc.).

    '
- Name: Stealc
  FirstSeen: 2023-Q1
  Status: Active
  Notes: 'Emerged January 2023; lightweight MaaS stealer with modular plugin architecture.
    Targets Chromium browsers, Firefox, cryptocurrency wallets, and messaging apps
    (Discord, Telegram). Marketed on dark web forums as a "lightweight" alternative
    with per-target module loading to reduce detection footprint. Active through 2025-2026
    across commodity and targeted campaigns.

    '
- Name: RedLine
  FirstSeen: 2020-Q1
  Status: Disrupted (Oct 2024) / Variants Active
  Notes: 'One of the longest-running stealer families; dominated the market from 2020-2024.
    Disrupted in October 2024 (Operation Magnus, Europol). Targets all Chromium browsers
    and Firefox; also harvests VPN credentials, FTP clients, cryptocurrency wallets,
    and system information. Despite takedown, RedLine-derived code and techniques
    persist in successor families.

    '
- Name: Raccoon v2
  FirstSeen: 2022-Q3
  Status: Active
  Notes: 'Raccoon Stealer v1 shut down March 2022 when lead developer was arrested;
    v2 relaunched June 2022 with rewritten C++ codebase. Targets 60+ browsers including
    all major Chromium variants and Firefox. Employs DPAPI-based decryption for Chromium
    credentials. Continuously updated with new browser support and evasion techniques
    through 2025.

    '
- Name: Vidar 2.0
  FirstSeen: 2025-Q4
  Status: Active
  Notes: 'Complete rewrite of original Vidar stealer (2018) released October 2025
    as pure C implementation. Introduced memory injection technique to bypass Chrome
    App-Bound Encryption by injecting into the chrome.exe process itself and calling
    decryption APIs from within the trusted process context. Represents the most technically
    sophisticated App-Bound bypass approach documented to date.

    '
- Name: AMOS (Atomic macOS Stealer)
  FirstSeen: 2023-Q2
  Status: Active
  Notes: 'macOS-targeting infostealer marketed on Telegram for ~$1,000/month. Targets
    Safari Keychain, all Chromium browsers, Firefox, MetaMask, cryptocurrency wallets,
    and system information. Uses osascript to prompt for administrator password, bypassing
    macOS protections. Demonstrates that the browser credential database chokepoint
    applies cross-platform — macOS browsers use platform-native keychain APIs but
    the file access pattern is identical.

    '
- Name: EDDIESTEALER
  FirstSeen: 2025-Q2
  Status: Active
  Notes: 'Identified May 2025; notable for Chrome App-Bound Encryption bypass via
    Chrome DevTools Protocol (CDP) — connects to a running Chrome instance in debug
    mode to extract cookies without needing to decrypt the database directly. Represents
    the third major App-Bound bypass approach (alongside COM elevation and memory
    injection).

    '
- Name: Medusa Stealer
  FirstSeen: 2024-Q1
  Status: Active
  Notes: 'Supports credential harvesting from 100+ browsers — the broadest browser
    coverage of any tracked stealer family. Targets all Chromium and Gecko-based browsers,
    Electron apps storing credentials, and password managers. MaaS subscription model
    on dark web forums. Demonstrates that comprehensive browser coverage is a competitive
    differentiator in the stealer market.

    '
- Name: Chrome App-Bound Encryption Bypass (COM Elevation)
  FirstSeen: 2024-Q3
  Status: Active
  Notes: 'First documented bypass of Chrome App-Bound Encryption (introduced July
    30, 2024), achieved within 45 days (September 12, 2024). Technique: elevate via
    GoogleChromeElevationService COM interface to call decryption in a trusted context.
    Multiple families rapidly adopted this approach; Google patched but new bypasses
    emerged within weeks, demonstrating the cat-and-mouse pattern in App-Bound Encryption
    defense.

    '
- Name: North Korean APT Infostealer Operations
  FirstSeen: 2024-Q1
  Status: Active
  Notes: 'North Korean threat actors (LAZARUS GROUP / HIDDEN COBRA) incorporated infostealer
    deployment into their tradecraft for financial operations. Connected to the February
    2025 ByBit cryptocurrency exchange heist ($1.4B — the largest cryptocurrency theft
    in history). Hudson Rock 2026 trend report highlights the "infostealer-to-APT
    pipeline" where stealer credentials enable nation-state initial access without
    traditional spearphishing. Demonstrates infostealers as strategic intelligence-gathering
    tools, not just commodity theft.

    '
- Name: Contagious Interview (OtterCookie / North Korean Fake Job Interview Stealer)
  FirstSeen: 2024-Q3
  Status: Active
  Notes: North Korean actors deliver OtterCookie JavaScript backdoor via fake developer
    job interviews, using malicious NPM packages or VS Code task configurations to
    achieve code execution and steal crypto keys and credentials. Evolved with heavy
    obfuscation since October 2025.
- Name: Storm-2561 Fake VPN Client Stealer
  FirstSeen: 2025-Q2
  Status: Active
  Notes: Storm-2561 uses SEO poisoning to lure users searching for enterprise VPN
    software (Pulse Secure, Fortinet, Ivanti) to spoofed websites that redirect to
    GitHub-hosted ZIP files containing MSI installers. The trojanized installer side-loads
    malicious DLLs signed by 'Taiyuan Lihua Near Information Technology Co., Ltd.'
    to harvest VPN credentials and browser credentials, then exfiltrates them.
- Name: Storm-2561 Fake VPN Client Infostealer
  FirstSeen: 2026-Q1
  Status: Active
  Notes: Storm-2561 distributes trojanized enterprise VPN clients (Ivanti, Cisco,
    Fortinet) via fake download sites to steal VPN credentials. Delivery via SEO poisoning/malvertising
    targeting enterprise users searching for VPN software.
Prerequisites:
- Code execution on victim machine (via ClickFix, malvertising, cracked software,
  game cheats, SEO poisoning, YouTube malware, or social engineering)
- Target must use a Chromium-based browser (Chrome, Edge, Brave, Opera, etc.) or Firefox
- Browser credential database files must be accessible (not locked by exclusive handle
  — Chrome Login Data is typically not exclusively locked)
- For App-Bound Encryption bypass variants: Chrome must be installed (COM elevation
    requires GoogleChromeElevationService); OR Chrome must be running (CDP bypass);
    OR stealer must have code injection capability (memory injection bypass)
- Outbound network access for C2 exfiltration (though some variants stage locally
  and exfiltrate via separate channel)
EvolutionTimeline:
- Date: 2018-2020
  Event: Vidar, AZORult, and Raccoon v1 establish the modern infostealer template
  Change: 'Stealer-as-a-Service model emerges; credential harvesting from browser
    SQLite databases (Chrome Login Data, Firefox logins.json) becomes standardized.
    DPAPI decryption via CryptUnprotectData() is the universal Chromium decryption
    method. Browser-stored credential theft becomes a commodity capability available
    to non-technical attackers.

    '
  DetectionImpact: 'File access monitoring for browser credential databases (Login
    Data, Cookies) becomes possible but generates high volume from legitimate browser
    activity. Process-based filtering (non-browser processes accessing browser files)
    emerges as the primary signal.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2020-2022
  Event: RedLine dominates; stealer market fragments into dozens of MaaS offerings
  Change: 'RedLine Stealer launches January 2020 and rapidly dominates with low price
    point ($100-200/month) and comprehensive browser coverage. Market fragments: Vidar,
    Raccoon, Mars, META, Typhon, and 20+ competitors emerge. NSA/CISA begin tracking
    infostealers as a distinct threat category. Enterprise credential theft accelerates;
    breach brokers emerge as a distinct role in the cybercrime economy.

    '
  DetectionImpact: 'File hash-based detection fails as variants proliferate weekly.
    Behavioral detection of non-browser processes opening browser credential files
    gains adoption in EDR platforms. DPAPI call monitoring (CryptUnprotectData) emerges
    as a secondary signal.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2022-2023
  Event: Raccoon v2 and Stealc launch; LummaC2 enters the market
  Change: 'Raccoon v2 (June 2022) demonstrates rapid reconstitution after law enforcement
    action. Stealc (January 2023) introduces modular architecture. LummaC2 begins
    rapid market share growth. Multi-stage loaders (GuLoader, PrivateLoader) become
    the primary delivery mechanism, complicating attribution. macOS infostealers emerge
    with AMOS (April 2023), extending the threat to non-Windows environments.

    '
  DetectionImpact: 'Loader-based delivery complicates process lineage detection (parent
    may be legitimate software). Cross-platform detection required as macOS stealers
    adopt same file-access patterns. Process injection techniques begin emerging to
    complicate parent-child attribution.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2024-Q2
  Event: Snowflake breach — infostealer credentials enable access to 160+ organizations
  Change: 'UNC5537 uses credentials harvested by VIDAR, RISEPRO, REDLINE, RACCOON,
    LUMMA, and METASTEALER from contractor machines to access Snowflake cloud environments.
    No MFA, no network allowlisting — credentials alone were sufficient. Victims include
    Ticketmaster (560M records), AT&T (109M call records), Advance Auto Parts, LendingTree,
    and 155+ others. Demonstrates infostealers as an enterprise security problem,
    not just consumer credential theft.

    '
  DetectionImpact: 'Enterprise focus on "impossible travel" detection for cloud console
    access. Credential monitoring services gain enterprise adoption. MFA enforcement
    becomes urgent response; behavioral anomaly detection for cloud access gains priority.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2024-Q3
  Event: Chrome App-Bound Encryption (July 30) — bypassed in 45 days (Sept 12)
  Change: 'Google introduces App-Bound Encryption in Chrome 127 (July 30, 2024) —
    encrypts cookie/credential database with a key tied to the Chrome application
    identity, preventing decryption by other processes using standard DPAPI. Multiple
    stealers immediately begin research. First bypass via COM elevation to GoogleChromeElevationService
    documented September 12, 2024. CDP-based bypass (EDDIESTEALER) and memory injection
    (Vidar 2.0) follow within months.

    '
  DetectionImpact: 'App-Bound Encryption forces stealers to generate new observable
    behaviors: COM elevation calls to GoogleChromeElevationService, Chrome debug mode
    activation, or injection into chrome.exe — all of which create additional detection
    opportunities. DPAPI call still occurs in all bypass variants; the invariant is
    preserved.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2024-Q4
  Event: RedLine and Raccoon disrupted (Operation Magnus); LummaC2 reaches 51% market
    share
  Change: 'October 2024: Europol Operation Magnus disrupts RedLine and META Stealer
    infrastructure; arrests in multiple countries. Raccoon Stealer administrator pleads
    guilty. Market consolidates around LummaC2 and Stealc. Enterprise credential presence
    in infostealers reaches 14% of infections (up from 6% in early 2024) — demonstrating
    shift toward higher-value targeting.

    '
  DetectionImpact: 'Law enforcement disruption has limited sustained impact — new
    variants emerge within weeks of each takedown. File-based and hash-based IOC sharing
    becomes less effective as market fragments. Behavioral detection of the invariant
    (file access + DPAPI call) remains the only durable detection approach.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2025-Q1
  Event: ByBit heist ($1.4B) — North Korean APT uses infostealer-to-APT pipeline
  Change: 'February 2025: Lazarus Group / TraderTraitor executes $1.4B ByBit cryptocurrency
    heist using credentials harvested via infostealers from contractor/employee machines.
    Demonstrates the "infostealer-to-APT pipeline" — commodity stealer infections
    enabling nation-state operations. Hudson Rock (February 2026) identifies this
    as a primary 2026 trend: sophisticated APTs systematically purchasing or harvesting
    infostealer logs.

    '
  DetectionImpact: 'Motivates enterprise adoption of continuous dark web credential
    monitoring. Infostealer detection elevated from IT security to executive risk
    concern. "Victim-to-vector loop" identified: infected computers of IT administrators
    or employees with access to security tools create cascading compromise potential.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2025-Q2
  Event: LummaC2 disrupted (May 2025); 1.8 billion credentials stolen in 2025
  Change: 'FBI/Europol joint operation disrupts LummaC2 infrastructure; domains seized,
    C2 servers taken offline. 1.7 million unique LummaC2 logs were already in circulation.
    Market immediately begins reconstituting — historical precedent (Raccoon v1 →
    v2, RedLine → successors) indicates 60-90 day reconstitution timeline.

    '
  DetectionImpact: 'Disruption creates temporary reduction in LummaC2 telemetry. Successor
    variants expected to carry forward same browser credential access patterns. Endpoint
    behavioral detection (file access + DPAPI) remains effective regardless of family
    reconstitution.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData()
    / NSS3 → C2 exfiltration
- Date: 2026-Q1
  Event: OtterCookie obfuscated variant and VS Code task abuse observed by Microsoft
    Defender Experts
  Change: Shifted from direct NPM package execution to abusing VS Code workspace trust
    and task.json auto-execution; added heavy string obfuscation with encoded index
    lookups and shuffled arrays to evade static analysis and signature detection
  DetectionImpact: Signature-based detections for earlier OtterCookie variants are
    ineffective against obfuscated version; VS Code task execution is a new execution
    vector that may bypass traditional script-monitoring rules
  TheConstant: Still requires code execution on victim machine (user must clone/open
    and trust the malicious package); still requires outbound network access for C2
    exfiltration; still targets browser credential stores and crypto wallet data
- Date: 2026-Q1
  Event: Storm-2561 fake VPN client credential theft campaign identified
  Change: Shifts SEO poisoning lure from general software to enterprise VPN clients
    (Pulse Secure, Fortinet, Ivanti), uses GitHub releases for payload hosting, MSI
    installer with DLL side-loading, and a legitimate (now-revoked) code-signing certificate
    for the trojan. Targets VPN credentials in addition to standard browser credentials.
  DetectionImpact: Existing browser credential theft detections still apply for the
    credential harvesting phase; however, the VPN credential targeting and signed
    MSI delivery via GitHub may evade download reputation and code-signing trust checks.
    SEO poisoning detections for VPN-themed domains needed.
  TheConstant: Still requires code execution on victim machine, browser credential
    database access for browser theft, and outbound network access for exfiltration.
    User must download and execute the malicious payload.
- Date: 2026-Q1
  Event: Fake enterprise VPN clients used as infostealer delivery vector
  Change: Shifts social engineering lure from consumer software (game cheats, cracked
    apps) to enterprise VPN clients, targeting corporate credentials rather than browser-stored
    passwords. Trojanized binaries masquerade as legitimate Ivanti/Cisco/Fortinet
    installers.
  DetectionImpact: Detection rules focused on consumer cracked-software or game-cheat
    delivery may miss enterprise VPN-themed lures. Rules should monitor for unsigned
    or anomalous VPN client binaries and unexpected credential access after VPN installer
    execution.
  TheConstant: Still requires code execution on victim machine; still requires credential
    stores to be accessible on disk; still requires outbound network access for exfiltration.
Detections:
- Level: Research
  Description: Log all non-browser process access to browser credential database files
  LogSources:
  - Sysmon Event ID 10 (Process Access)
  - Sysmon Event ID 11 (File Created / File Access)
  - Windows Security Event ID 4663 (File Access — requires Object Access auditing)
  - EDR file open telemetry (CrowdStrike, SentinelOne, Microsoft Defender for Endpoint)
  Logic: "File Access (EID 4663 or Sysmon EID 10/11):\n  TargetObject / TargetFilename:\n\
    \    contains: \\Google\\Chrome\\User Data\\Default\\Login Data\n    OR contains:\
    \ \\Google\\Chrome\\User Data\\Default\\Cookies\n    OR contains: \\Google\\Chrome\\\
    User Data\\Local State\n    OR contains: \\Mozilla\\Firefox\\Profiles\\\n    OR\
    \ contains: \\Microsoft\\Edge\\User Data\\Default\\Login Data\n    OR contains:\
    \ \\BraveSoftware\\Brave-Browser\\User Data\\Default\\Login Data\n  AccessingProcess:\
    \ NOT (chrome.exe OR msedge.exe OR brave.exe OR firefox.exe OR\n             \
    \            opera.exe OR vivaldi.exe OR browser update processes)\nPurpose: Build\
    \ baseline of ALL non-browser processes accessing browser credential files; identify\
    \ environments where this occurs legitimately (password managers, backup tools)\
    \ vs. anomalous access.\n"
  ExpectedFPRate: Medium (password managers, backup tools, some AV products)
  UseCase: 'Baseline legitimate access patterns; identify which processes routinely
    touch browser databases; validate EDR file access telemetry completeness

    '
  SigmaRule: sigma-rules/browser-credential-theft/research.yml
- Level: Hunt
  Description: Non-browser process reads browser credential database AND makes a DPAPI
    call
  LogSources:
  - Sysmon Event ID 10 (Process Access to browser files)
  - Windows Security Event ID 4663 (File Access)
  - Sysmon Event ID 8 (CreateRemoteThread — for injection variants)
  - 'Windows API monitoring: CryptUnprotectData calls from non-browser processes'
  - EDR behavioral telemetry
  Logic: "File Access to browser credential path:\n  AccessingProcess: NOT browser\
    \ / NOT known password manager / NOT backup tool\nWITHIN 60 seconds:\n  API Call:\
    \ CryptUnprotectData() OR NCryptUnprotectSecret()\n  CallingProcess: same non-browser\
    \ process\nOR:\n  Process Access (EID 10):\n    TargetProcess: chrome.exe OR msedge.exe\n\
    \    SourceProcess: NOT known trusted process\n    AccessRights: includes PROCESS_VM_READ\
    \ (0x0010)\n    (injection-based App-Bound bypass signal)\n"
  ExpectedFPRate: Low-Medium
  UseCase: 'Active threat hunting for infostealer activity; correlates file access
    with decryption API call to distinguish intentional credential harvesting from
    incidental file access by legitimate tools

    '
  SigmaRule: sigma-rules/browser-credential-theft/hunt.yml
- Level: Analyst
  Description: 'Non-browser process accesses browser credential database AND makes
    outbound network connection — complete infostealer execution chain with C2 exfiltration
    signal

    '
  LogSources:
  - Sysmon Event ID 10 / 11 (File Access)
  - Sysmon Event ID 3 (Network Connection)
  - Windows Security Event ID 4663 + 5156 (File Access + Windows Filtering Platform)
  - EDR network telemetry
  - DNS logs (for C2 domain resolution)
  Logic: "File Access (EID 4663 or Sysmon EID 10/11):\n  TargetPath: browser credential\
    \ database (Login Data OR Cookies OR logins.json OR key4.db)\n  AccessingProcess:\
    \ NOT (browser process OR known password manager)\nAND within 300 seconds:\n \
    \ Network Connection (Sysmon EID 3):\n    SourceProcess: same non-browser process\n\
    \    DestinationIP: NOT RFC1918 (not internal)\n    DestinationPort: 80 OR 443\
    \ OR 8080 OR unusual port\nSTANDALONE HIGH-CONFIDENCE SIGNAL:\n  Process accesses\
    \ Login Data AND Local State in same session\n  (Local State contains App-Bound\
    \ Encryption key material;\n  combined access is a strong infostealer indicator)\n"
  ExpectedFPRate: Low
  UseCase: 'SOC alerting; immediate IR escalation; the file-access + outbound-network
    correlation represents the full "harvest and exfiltrate" chain

    '
  SigmaRule: sigma-rules/browser-credential-theft/analyst.yml
Intel:
- Name: Hudson Rock — 2026 Infostealer Trends I'm Monitoring
  URL: https://www.infostealers.com/article/2026-infostealer-trends-im-monitoring-at-hudson-rock/
  Description: 'February 2026 analysis by Alon Gal (CTO, Hudson Rock); Hudson Rock
    tracks 30M+ infected computers. Documents 2026 trends including infostealer-to-APT
    pipeline, victim-to-vector loop, malicious AI skill poisoning via OpenClaw, and
    the ByBit heist connection to infostealer credential harvesting.

    '
- Name: 'MITRE ATT&CK — T1555.003 Credentials from Password Stores: Credentials from
    Web Browsers'
  URL: https://attack.mitre.org/techniques/T1555/003/
  Description: 'Primary technique definition covering browser credential database
    access methodology, with procedure examples for Chrome (Login Data + DPAPI), Firefox
    (logins.json + key4.db + NSS3), and cross-browser coverage. Includes procedure
    examples for LummaC2, RedLine, Raccoon, Vidar, AMOS, and 30+ other tracked families.

    '
- Name: Google Security Blog — Improving the security of Chrome cookies on Windows
  URL: https://security.googleblog.com/2024/07/improving-security-of-chrome-cookies-on.html
  Description: 'Official Google announcement of App-Bound Encryption (July 30, 2024)
    in Chrome 127. Explains the technical mechanism: encryption key bound to Chrome''s
    application identity via IElevator COM interface. Basis for understanding the
    three bypass techniques (COM elevation, CDP, memory injection) that emerged within
    45 days.

    '
- Name: Mandiant / Google Cloud — UNC5537 Targets Snowflake Customer Instances for
    Data Theft
  URL: https://cloud.google.com/blog/topics/threat-intelligence/unc5537-snowflake-data-theft-extortion/
  Description: 'Technical analysis of the Snowflake breach (May-June 2024); documents
    UNC5537''s use of VIDAR, RISEPRO, REDLINE, RACCOON, LUMMA, and METASTEALER-harvested
    credentials to access 160+ Snowflake environments. No CVE exploitation — credentials
    alone were sufficient. Defines infostealer credentials as a primary enterprise
    supply chain risk.

    '
- Name: CISA — LummaC2 Malware (AA25-071A)
  URL: https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-071a
  Description: 'CISA advisory on LummaC2 covering infection vectors (ClickFix, malvertising,
    cracked software), targeted browser data (50+ Chromium browsers, Firefox, cryptocurrency
    wallets), and detection guidance. Published in context of the May 2025 law enforcement
    disruption.

    '
- Name: 'Sekoia — LummaC2 Stealer: In-Depth Technical Analysis'
  URL: https://blog.sekoia.io/lummac2-stealer-an-in-depth-analysis/
  Description: 'Technical deep-dive into LummaC2''s credential harvesting methodology,
    including SQLite database access patterns, DPAPI decryption flow, App-Bound Encryption
    bypass techniques, and C2 communication protocol. Documents the exact file paths
    and API calls used.

    '
- Name: 'Europol — Operation Magnus: RedLine and META Stealer Disruption (Oct 2024)'
  URL: https://www.europol.europa.eu/media-press/newsroom/news/operation-magnus-disrupts-redline-and-meta-infostealers
  Description: 'Documents the October 2024 disruption of RedLine and META Stealer
    infrastructure. Provides scale data: RedLine was active for 4+ years and infected
