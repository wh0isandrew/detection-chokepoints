Name: Infostealer Browser Credential Theft
Id: 22a05d2a-556f-48e3-9097-d2603839c7f2
MitreIds:
- T1555.003
- T1539
- T1041
Tactics:
- Credential Access
- Collection
- Exfiltration
Techniques:
- 'Credentials from Password Stores: Credentials from Web Browsers'
- Steal Web Session Cookie
- Exfiltration Over C2 Channel
DetectionPriority: CRITICAL
ThreatPrevalence: HIGH
DetectionDifficulty: MEDIUM
Description: 'Infostealers systematically harvest credentials, cookies, and autofill data from browser credential databases.
  This is the single invariant behavior across all stealer families regardless of obfuscation or bypass technique. Hudson Rock tracks
  30+ million infected computers; 1.8 billion credentials were stolen in 2025 alone, with enterprise credentials present in
  14% of infections (up from 6% in early 2024). The Snowflake breach (2024) demonstrated downstream impact: UNC5537 used infostealer-harvested
  credentials for initial access to 160+ organizations. LummaC2 (51% of dark web credential logs before its May 2025 takedown),
  Stealc, RedLine, Raccoon, Vidar, AMOS, and Medusa all share the invariant: the stealer process must open browser credential
  files (Login Data, Cookies, logins.json) and invoke CryptUnprotectData() or NSS3 decryption. This is a kernel-observable event
  regardless of family or Chrome App-Bound Encryption bypass technique used.

  '
LastUpdated: '2026-03-15'
Author: '@iimp0ster'
Variations:
- Name: LummaC2
  FirstSeen: 2022-Q4
  Status: Disrupted (May 2025) / Active (rebrand expected)
  SourceURL: https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-071a
  Notes: 'The dominant infostealer MaaS of 2024-2025, representing 51% of all dark web credential logs at peak. Delivered
    primarily via ClickFix (517% surge in 2025 ClickFix attacks) and malvertising. Targets 50+ Chromium-based browsers, Firefox
    profiles, cryptocurrency wallets, and 2FA applications. Despite law enforcement disruption, successor variants and rebrands
    are anticipated based on historical patterns (Raccoon v1 → v2, RedLine → successors, etc.).

    '
  VariantId: lummac2
  Command:
    Invocation: "# Post-ClickFix delivery chain:\npowershell.exe -enc <base64> → downloads LummaC2 loader\n# Loader copies browser DBs:\ncopy \"%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Login Data\" %TEMP%\\lg.db\ncopy \"%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Local State\" %TEMP%\\ls.json\n# Calls CryptUnprotectData via embedded DPAPI wrapper\n# Exfils via HTTPS POST to rotating C2 domains"
    Context: 'Dominant stealer (51% of dark web logs at peak). Delivered primarily via ClickFix. Targets 50+ Chromium browsers, Firefox, crypto wallets, 2FA apps. Law enforcement disruption May 2025.'
