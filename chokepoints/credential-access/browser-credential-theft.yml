KnownBypasses:
- Bypass: Chrome App-Bound Encryption (July 2024) — encrypts credential database against
    non-Chrome access
  Mitigation: 'Enable Chrome App-Bound Encryption (Chrome 127+, enabled by default
    on Windows). Monitor GoogleChromeElevationService COM access from non-update processes.
    Enforce MFA everywhere to limit value of stolen credentials.

    '
  Detection: 'App-Bound bypass generates new observable behaviors regardless of technique:
    (1) COM elevation: unexpected COM activation of GoogleChromeElevationService from
    non-updater process; (2) CDP bypass: Chrome launched with --remote-debugging-port
    flag by non-Chrome process; (3) Memory injection: PROCESS_VM_READ access to chrome.exe
    from non-trusted process (Sysmon EID 10). All variants still ultimately call CryptUnprotectData()
    — monitoring that API from non-browser processes remains effective even against
    App-Bound bypasses.

    '
- Bypass: Process injection into chrome.exe (Vidar 2.0) — calls DPAPI from within
    trusted Chrome process context
  Mitigation: 'Enable Windows Defender Credential Guard. Monitor for unexpected memory
    operations on chrome.exe (cross-process memory reads/writes). Restrict process
    injection via Attack Surface Reduction rules or Exploit Protection settings.

    '
  Detection: 'Sysmon Event ID 8 (CreateRemoteThread) with TargetProcess chrome.exe
    from non-trusted source. Sysmon Event ID 10 (ProcessAccess) with SourceProcess
    NOT in Chrome process tree accessing chrome.exe with PROCESS_VM_WRITE or PROCESS_VM_OPERATION
    rights. Named pipe creation by injected thread is an additional Vidar 2.0 specific
    indicator.

    '
- Bypass: Copying Login Data to TEMP before access — avoids locking issues, may bypass
    some EDR path-based rules
  Mitigation: Monitor file copy operations where source path matches browser credential
    paths
  Detection: 'Sysmon EID 11 (FileCreated) where TargetFilename matches TEMP path and
    Image (creating process) is NOT a browser process. Follow with file access monitoring
    on the copied file. Process copying browser files to temp directories is a high-confidence
    infostealer signal.

    '
- Bypass: Legitimate process masquerading (process hollowing / name spoofing) to appear
    as browser
  Mitigation: Validate process image path and digital signature for any process claiming
    to be a browser
  Detection: 'Process with name chrome.exe OR msedge.exe running from path other than
    expected installation directory (e.g., %TEMP%, %APPDATA%, unusual path). Check
    digital signature of process image: legitimate browser processes are signed by
    Google LLC, Microsoft Corporation, Brave Software, etc. Unsigned "chrome.exe"
    is a high-confidence malware indicator.

    '
- Bypass: Firefox NSS3 decryption (no DPAPI dependency) — different API path from
    Chromium
  Mitigation: Monitor NSS3.dll / nss3.dll load by non-Firefox processes; monitor access
    to key4.db
  Detection: 'Sysmon EID 7 (ImageLoaded): nss3.dll loaded by a process that is NOT
    firefox.exe, thunderbird.exe, or a known Mozilla product. Access to key4.db or
    logins.json by non-Firefox process. These are the Firefox equivalent of the Chromium
    Login Data access signal.

    '
- Bypass: MFA session cookie theft (T1539) — bypasses MFA even after password reset
  Mitigation: 'Enforce session lifetime limits (max 1 hour for sensitive applications).
    Implement device binding for sessions. Use hardware security keys (FIDO2) — session
    cookies stolen from FIDO2-authenticated sessions cannot be reused without the
    physical key.

    '
  Detection: 'Browser Cookies file accessed by non-browser process (same detection
    path as Login Data). Monitor for impossible travel or new ASN/geolocation in post-authentication
    session activity. Conditional Access policies detecting session replay from new
    device fingerprint.

    '
