  Event: OtterCookie obfuscated variant and VS Code task abuse observed by Microsoft Defender Experts
  Change: Shifted from direct NPM package execution to abusing VS Code workspace trust and task.json auto-execution; added
    heavy string obfuscation with encoded index lookups and shuffled arrays to evade static analysis and signature detection
  DetectionImpact: Signature-based detections for earlier OtterCookie variants are ineffective against obfuscated version;
    VS Code task execution is a new execution vector that may bypass traditional script-monitoring rules
  TheConstant: Still requires code execution on victim machine (user must clone/open and trust the malicious package); still
    requires outbound network access for C2 exfiltration; still targets browser credential stores and crypto wallet data
  Variants: []
  EventType: event
- Date: 2026-Q1
  Event: Storm-2561 fake VPN client credential theft campaign identified
  Change: Shifts SEO poisoning lure from consumer software to enterprise VPN clients (Pulse Secure, Fortinet, Ivanti, Cisco),
    targeting corporate credentials. Uses GitHub releases for payload hosting, MSI installer with DLL side-loading, and a
    legitimate (now-revoked) code-signing certificate. Trojanized binaries masquerade as legitimate VPN installers to harvest
    VPN credentials in addition to standard browser credentials.
  DetectionImpact: Existing browser credential theft detections still apply for the credential harvesting phase. Signed MSI
    delivery via GitHub may evade download reputation checks; enterprise VPN-themed lures may bypass rules tuned for consumer
    cracked-software delivery. Monitor for unsigned or anomalous VPN client binaries and unexpected credential access after
    VPN installer execution.
  TheConstant: Still requires code execution on victim machine, browser credential database access for browser theft, and
    outbound network access for exfiltration.
  Variants: []
  EventType: event
Detections:
- Level: Research
  Description: Log all non-browser process access to browser credential database files
  LogSources:
  - Sysmon Event ID 10 (Process Access)
  - Sysmon Event ID 11 (File Created / File Access)
  - Windows Security Event ID 4663 (File Access; requires Object Access auditing)
  - EDR file open telemetry (CrowdStrike, SentinelOne, Microsoft Defender for Endpoint)
  Logic: 'Any process accessing browser credential paths (Chrome Login Data, Cookies, Local State; Firefox Profiles; Edge Login Data; Brave Login Data) where AccessingProcess is NOT the browser itself (chrome.exe, msedge.exe, brave.exe, firefox.exe, opera.exe, vivaldi.exe) or a browser update process. Run for a week to build the password-manager and backup-tool allowlist.'
  ExpectedFPRate: Medium (password managers, backup tools, some AV products)
  UseCase: 'Baseline legitimate access patterns; identify which processes routinely touch browser databases; validate EDR
    file access telemetry completeness

    '
  SigmaRule: sigma-rules/browser-credential-theft/research.yml
- Level: Hunt
  Description: Non-browser process reads browser credential database AND makes a DPAPI call
  LogSources:
  - Sysmon Event ID 10 (Process Access to browser files)
  - Windows Security Event ID 4663 (File Access)
  - Sysmon Event ID 8 (CreateRemoteThread; for injection variants)
  - 'Windows API monitoring: CryptUnprotectData calls from non-browser processes'
  - EDR behavioral telemetry
  Logic: 'Non-browser, non-password-manager, non-backup process accesses a browser credential file AND within 60 seconds the same process calls CryptUnprotectData or NCryptUnprotectSecret. OR process access (EID 10) targeting chrome.exe/msedge.exe from an untrusted source with AccessRights including PROCESS_VM_READ (0x0010), the injection-based App-Bound bypass signal.'
  ExpectedFPRate: Low-Medium
  UseCase: 'Active threat hunting for infostealer activity; correlates file access with decryption API call to distinguish
    intentional credential harvesting from incidental file access by legitimate tools

    '
  SigmaRule: sigma-rules/browser-credential-theft/hunt.yml
- Level: Analyst
  Description: 'Non-browser process accesses browser credential database AND makes outbound network connection. Complete
    infostealer execution chain with C2 exfiltration signal.

    '
  LogSources:
  - Sysmon Event ID 10 / 11 (File Access)
  - Sysmon Event ID 3 (Network Connection)
  - Windows Security Event ID 4663 + 5156 (File Access + Windows Filtering Platform)
  - EDR network telemetry
  - DNS logs (for C2 domain resolution)
  Logic: 'Non-browser, non-password-manager process accesses a browser credential database (Login Data, Cookies, logins.json, key4.db) AND within 300 seconds the same process makes an outbound connection to a non-RFC1918 destination on port 80, 443, 8080, or an unusual port. Standalone high-confidence signal: same process accesses Login Data AND Local State in the same session (App-Bound Encryption key combo).'
  ExpectedFPRate: Low
  UseCase: 'SOC alerting; immediate IR escalation; the file-access + outbound-network correlation represents the full "harvest
    and exfiltrate" chain

    '
  SigmaRule: sigma-rules/browser-credential-theft/analyst.yml
Intel:
- Name: Hudson Rock — 2026 Infostealer Trends I'm Monitoring
  Tier: primary
  URL: https://www.infostealers.com/article/2026-infostealer-trends-im-monitoring-at-hudson-rock/
  Description: 'February 2026 analysis by Alon Gal (CTO, Hudson Rock); Hudson Rock tracks 30M+ infected computers. Documents
    2026 trends including infostealer-to-APT pipeline, victim-to-vector loop, malicious AI skill poisoning via OpenClaw, and
    the ByBit heist connection to infostealer credential harvesting.

    '
- Name: 'MITRE ATT&CK — T1555.003 Credentials from Password Stores: Credentials from Web Browsers'
  Tier: primary
  URL: https://attack.mitre.org/techniques/T1555/003/
  Description: 'Primary technique definition covering browser credential database access methodology, with procedure examples
    for Chrome (Login Data + DPAPI), Firefox (logins.json + key4.db + NSS3), and cross-browser coverage. Includes procedure
    examples for LummaC2, RedLine, Raccoon, Vidar, AMOS, and 30+ other tracked families.

    '
- Name: Google Security Blog — Improving the security of Chrome cookies on Windows
  Tier: primary
  URL: https://security.googleblog.com/2024/07/improving-security-of-chrome-cookies-on.html
  Description: 'Official Google announcement of App-Bound Encryption (July 30, 2024) in Chrome 127. Explains the technical
    mechanism: encryption key bound to Chrome''s application identity via IElevator COM interface. Basis for understanding
    the three bypass techniques (COM elevation, CDP, memory injection) that emerged within 45 days.

    '
- Name: Mandiant / Google Cloud — UNC5537 Targets Snowflake Customer Instances for Data Theft
  Tier: primary
  URL: https://cloud.google.com/blog/topics/threat-intelligence/unc5537-snowflake-data-theft-extortion/
  Description: 'Technical analysis of the Snowflake breach (May-June 2024); documents UNC5537''s use of VIDAR, RISEPRO, REDLINE,
    RACCOON, LUMMA, and METASTEALER-harvested credentials to access 160+ Snowflake environments. No CVE exploitation. Credentials
    alone were sufficient. Defines infostealer credentials as a primary enterprise supply chain risk.

    '
- Name: MITRE ATT&CK — T1539 Steal Web Session Cookie
  Tier: primary
  URL: https://attack.mitre.org/techniques/T1539/
  Description: 'Secondary technique covering session cookie theft for MFA bypass. Directly related to infostealer cookie database
    access (Chrome Cookies file). Cookie theft enables account takeover without re-authentication even after password reset.

    '
