    '
  DetectionImpact: 'Motivates enterprise adoption of continuous dark web credential monitoring. Infostealer detection elevated
    from IT security to executive risk concern. "Victim-to-vector loop" identified: infected computers of IT administrators
    or employees with access to security tools create cascading compromise potential.

    '
  TheConstant: Stealer process → Login Data / logins.json file read → CryptUnprotectData() / NSS3 → C2 exfiltration
  Variants: []
  EventType: event
