KnownBypasses:
- Bypass: Graph Activity Logs not enabled in tenant
  Mitigation: Enable Graph Activity Logs in all tenants; alert if logging
    configuration changes unexpectedly
  Detection: >
    Cannot detect this chokepoint without Graph Activity Logs. Ensure log ingestion
    is confirmed before relying on this detection. Fall back to Entra ID sign-in
    log correlations (two-tier ASN) as the primary signal when Graph logs unavailable.

- Bypass: Operator slows recon to below 4-category threshold within 60s
  Mitigation: Reduce aggregation window; monitor for 3+ categories over 5 minutes
  Detection: >
    Extended time window (3+ categories / 5 minutes) may catch slowed automation
    at the cost of higher FP rate. /beta/ API usage + empty c_DeviceId remain
    as secondary signals regardless of pace.

OsintSources:
- Platform: N/A
  Query: 'N/A - Graph API recon bursts are internal Microsoft log signals'
  Notes: >
    Graph API recon bursts are not externally observable via OSINT tools
    (URLScan, Shodan, Hunt.io). Detection relies entirely on Graph Activity Log
    ingestion within the tenant. Confirm MicrosoftGraphActivityLogs is enabled
    and flowing to Sentinel before relying on this chokepoint.

