KnownBypasses:
- Bypass: IR executes revokeSignInSessions before deleting device objects
  Mitigation: Update IR playbooks to enumerate/delete devices first; automate
    the correct sequence via Logic Apps / playbook
  Detection: >
    Graph Activity Logs: incomingTokenType == "primaryRefreshToken" from same UPN
    after revokeSignInSessions event. Confirms device-PRT active post-revocation.
    Trigger immediate device deletion and second revocation cycle.

- Bypass: Attacker uses custom MDM UA that mimics Dsreg/DeviceRegistrationClient
  Mitigation: Validate device certificate issuance chain; monitor for device
    objects with fabricated metadata (unusual DeviceDisplayName, synthetic OSVersion)
  Detection: >
    Device objects with display names matching no corporate naming convention.
    Device cert issued for non-corporate domain. Cross-reference with Intune/SCCM
    inventory — any device in Entra not in MDM inventory is suspicious.

