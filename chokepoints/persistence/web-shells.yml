OsintSources:
  - Platform: Shodan
    Query: 'http.title:"WSO" OR http.title:"b374k" OR http.title:"c99" OR http.title:"FilesMan" OR http.title:"Antak Webshell"'
    URL: "https://www.shodan.io/search?query=http.title%3A%22WSO%22+OR+http.title%3A%22b374k%22+OR+http.title%3A%22c99%22"
    Notes: "Finds internet-exposed web shells with default page titles intact — common in mass exploitation campaigns where attacker cadence outpaces cleanup. FilesMan and Antak are additional shells frequently left exposed. Also try http.html:\"eval(base64_decode\" to catch obfuscated PHP shells that render without a recognizable title."
  - Platform: URLScan
    Query: 'page.title:"WSO" OR filename:shell.php OR filename:webshell.php OR filename:cmd.aspx'
    URL: "https://urlscan.io/search/#page.title%3A%22WSO%22+OR+filename%3Ashell.php"
    Notes: "Finds recently scanned pages presenting known webshell UI or common shell filenames; useful for tracking active campaign infrastructure and identifying newly deployed shells before cleanup. Add filenames specific to recent campaigns (e.g., human2.aspx for LEMURLOOT/MOVEit)."
  - Platform: VirusTotal Intelligence
    Query: 'tag:webshell positives:0 type:text'
    URL: "https://www.virustotal.com/gui/search/tag%3Awebshell%20positives%3A0%20type%3Atext"
    Notes: "Requires VT Intelligence subscription. Finds webshell samples currently evading all commercial AV detection — the most dangerous variants in active use. Consistent with ShellForge paper (arXiv 2601.22182) finding 93.9% evasion against commercial engines. Sort by submission date to prioritize the newest evasive variants."
  - Platform: Censys
    Query: 'services.http.response.body: "eval(base64_decode" and services.http.response.status_code: 200'
    URL: "https://search.censys.io/search?resource=hosts&q=services.http.response.body%3A+%22eval(base64_decode%22"
    Notes: "Finds web servers returning HTTP 200 responses with the eval(base64_decode PHP obfuscation pattern — a near-universal indicator of a live obfuscated PHP shell. High precision; few legitimate pages contain this pattern. Requires Censys account."

KnownBypasses:
  - Bypass: Multi-layer encoding (base64 + gzinflate + XOR + eval) bypasses keyword and signature scanning
    Mitigation: Deploy file integrity monitoring against known-good baselines; do not rely on keyword scanning alone
    Detection: >
      Focus on process behavior, not file content. The encoded shell still executes via
      eval or assert, and the resulting OS command still spawns a child process. Shannon
      entropy analysis of files in web directories can flag highly encoded content (entropy
      above 7.0 is suspicious); combine with process creation monitoring for confirmation.
  - Bypass: Fileless IIS native module webshells write no script file to the web root
    Mitigation: Audit IIS module configuration regularly; allowlist approved IIS modules; monitor applicationHost.config for unauthorized entries
    Detection: "Sysmon EID 7 (Image Loaded) for unexpected DLLs loaded by w3wp.exe; IIS module list review via appcmd.exe list module; w3wp.exe child process spawning still occurs when commands execute and remains the reliable detection signal."
  - Bypass: Polyglot and steganographic shells bypass file-type validation on upload
    Mitigation: Validate file content via magic byte inspection rather than extension or MIME type; restrict script execution in upload directories (Linux noexec mount, IIS deny-execute permissions)
    Detection: File creation events in web directories followed by HTTP requests to those files; web server access logs showing direct requests to recently uploaded files without an HTTP referrer header
  - Bypass: Dormant shells that activate only on demand evade activity-based detection during idle periods
    Mitigation: Continuous file integrity monitoring rather than periodic scheduled scans; maintain a cryptographic baseline of all web-accessible paths
    Detection: >
      File integrity monitoring detects the shell at rest regardless of activation state.
      Web server access log analysis can identify direct requests to unexpected file paths
      even when no OS command is executed during the request, revealing attacker reconnaissance.
  - Bypass: SSTI-based execution requires no uploaded file — exploits existing template processing
    Mitigation: Sanitize all user input before passing to template engines; disable dangerous template evaluation features; enforce context-aware output encoding
    Detection: "WAF rules for SSTI payload patterns (${{, <%=, #{7*7}); web server access logs showing injection payloads in request parameters; process spawning from template engine processes (Java Freemarker/Velocity spawning cmd.exe or /bin/sh)."
  - Bypass: Encrypted C2 channels (Godzilla, Behinder) bypass network-based detection of webshell traffic
    Mitigation: TLS inspection at network boundary; behavioral analysis of HTTP traffic patterns (high POST frequency to a single endpoint, fixed-interval requests, unusual or rotating User-Agent strings)
    Detection: >
      Network-layer detection is unreliable against encrypted shells. Process creation
      monitoring remains effective — even Godzilla and Behinder must spawn child processes
      to execute OS commands. The invariant signal is the endpoint: w3wp.exe or java
      spawning cmd.exe or /bin/sh, regardless of how the HTTP command request was encrypted.

