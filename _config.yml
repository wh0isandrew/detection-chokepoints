# ─── MagicSword affiliate integration ───────────────────────────────────────
# Set magic_sword_enabled: false to hide all MagicSword callouts site-wide.
# Replace the affiliate URL with your personal affiliate link before going live.
magic_sword_enabled: true
magic_sword_affiliate_url: "https://www.magicsword.io/?ref=detection-chokepoints"
magic_sword_logo_path: "/assets/img/magicsword-logo.png"

title: Detection Chokepoints
tagline: "TTPs evolve. Chokepoints don't."
description: >
  A community database of attack prerequisites — the conditions attackers cannot avoid
  regardless of tool choice. Each chokepoint includes Sigma detection rules at Research,
  Hunt, and Analyst maturity levels.

baseurl: "/detection-chokepoints"
url: "https://iimp0ster.github.io"
github_username: iimp0ster
github_repo: detection-chokepoints

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

collections:
  chokepoints:
    output: true
    permalink: /chokepoints/:name/

plugins:
  - jekyll-seo-tag

# Site-wide social preview card (og:image / twitter:image via jekyll-seo-tag).
# Pages can override with their own `image:` front matter.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/social/og.png

twitter:
  card: summary_large_image

# Files/dirs Jekyll should not copy or process into _site/
exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - schema/
  - templates/
  - chokepoints/
  - sigma-rules/
  - intel/
  - README.md
  - CONTRIBUTING.md
  - CHANGELOG.md
  - FRAMEWORK.md
  - vendor/
  - node_modules/
  - "*.gemspec"
  - ".github/"
